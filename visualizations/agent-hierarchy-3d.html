let selected = null, hovered = null, activeView = 'all';
const clock = new THREE.Clock();

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
  camera.position.set(0, 2, 20);

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x0b0a0f);
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 8;
  controls.maxDistance = 40;
  controls.target.set(0, -1, 0);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(-999,-999);

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dir = new THREE.DirectionalLight(0xffffff, 0.3);
  dir.position.set(5, 10, 7);
  scene.add(dir);

  createNodes();
  createConnections();
  createStars();
  createTierRings();
  buildLegend();

  renderer.domElement.addEventListener('mousemove', onMouseMove);
  renderer.domElement.addEventListener('click', onClick);
  window.addEventListener('resize', onResize);

  // View controls
  document.querySelectorAll('.ctrl').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.ctrl').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      setView(b.dataset.view);
    });
  });

  // Panel connection clicks
  document.getElementById('p-connections').addEventListener('click', e => {
    if (e.target.classList.contains('p-conn')) {
      const id = e.target.dataset.id;
      if (meshMap[id]) selectNode(id);
    }
  });

  animate();
}

function createNodes() {

      transparent: true, opacity: 0.92, shininess: 80
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(...n.pos);
    mesh.userData = n;
    scene.add(mesh);
    meshMap[n.id] = mesh;

    // Outer glow
    const glowGeo = new THREE.SphereGeometry(n.size * 2.2, 16, 16);
    const glowMat = new THREE.MeshBasicMaterial({ color: n.color, transparent: true, opacity: 0.06 });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    mesh.add(glow);
    glowMap[n.id] = glow;

    // Ring around node
    const ringGeo = new THREE.RingGeometry(n.size * 1.3, n.size * 1.4, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: n.color, transparent: true, opacity: 0.1, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    mesh.add(ring);

    // Label sprite
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 512; canvas.height = 128;
    ctx.clearRect(0,0,512,128);

    // Code
    ctx.fillStyle = '#' + n.color.toString(16).padStart(6,'0');
    ctx.font = 'bold 28px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(n.code, 256, 44);

    // Name
    ctx.fillStyle = '#8a8594';
    ctx.font = '18px Inter, system-ui, sans-serif';
    const shortName = n.name.length > 28 ? n.name.substring(0, 26) + '…' : n.name;
    ctx.fillText(shortName, 256, 80);

    const tex = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.85 });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(3.5, 0.88, 1);
    sprite.position.y = n.size + 0.65;
    mesh.add(sprite);
    labelMap[n.id] = sprite;
  });
}

function createConnections() {
  connections.forEach(c => {
    const from = meshMap[c.from], to = meshMap[c.to];
    if (!from || !to) return;

    const points = [];
    const start = from.position.clone();
    const end = to.position.clone();
    const mid = start.clone().add(end).multiplyScalar(0.5);
    mid.y += 0.4;
    // Slight outward curve
    const dir = new THREE.Vector3().subVectors(end, start).normalize();
    const perp = new THREE.Vector3(-dir.z, 0, dir.x).multiplyScalar(0.3);
    mid.add(perp);

    const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
    const curvePoints = curve.getPoints(30);

    const geo = new THREE.BufferGeometry().setFromPoints(curvePoints);
    const mat = new THREE.LineBasicMaterial({
      color: c.color, transparent: true, opacity: c.dash ? 0.12 : 0.18
    });
    if (c.dash) {
      // Fake dash with LineDashedMaterial
      const dmat = new THREE.LineDashedMaterial({
        color: c.color, transparent: true, opacity: 0.12,
        dashSize: 0.3, gapSize: 0.15
      });
      const line = new THREE.Line(geo, dmat);
      line.computeLineDistances();
      line.userData = { from: c.from, to: c.to };
      scene.add(line);
      connectionLines.push(line);
    } else {
      const line = new THREE.Line(geo, mat);
      line.userData = { from: c.from, to: c.to };
      scene.add(line);
      connectionLines.push(line);
    }
  });
}

function createStars() {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(2000 * 3);
  for (let i = 0; i < 2000; i++) {
    pos[i*3] = (Math.random()-0.5)*100;
    pos[i*3+1] = (Math.random()-0.5)*100;
    pos[i*3+2] = (Math.random()-0.5)*100;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color:0x333333, size:0.06 })));
}

function createTierRings() {
  // Horizontal disc rings at each tier Y level for visual grounding
  const tiers = [
    { y:6, r:1.5, color:C.green },     // CEO
    { y:3.5, r:6, color:C.blue },       // Roles
    { y:1, r:7, color:C.yellow },       // Primary agents
    { y:-1.5, r:9, color:C.orange },    // Domain agents
    { y:-3.5, r:6, color:C.slate },     // Extensions
    { y:-5.5, r:8, color:C.purple },    // Ops
    { y:-7.5, r:6.5, color:C.white },   // Infra
  ];
  tiers.forEach(t => {
    const geo = new THREE.RingGeometry(t.r - 0.02, t.r + 0.02, 64);
    const mat = new THREE.MeshBasicMaterial({ color: t.color, transparent: true, opacity: 0.04, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(geo, mat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = t.y;
    scene.add(ring);
  });
}

// ============================================================
// INTERACTION
// ============================================================
function onMouseMove(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const meshes = Object.values(meshMap).filter(m => m.visible);
  const hits = raycaster.intersectObjects(meshes);

  if (hits.length > 0) {
    const id = hits[0].object.userData.id;
    if (hovered !== id) {
      // Reset previous
      if (hovered && meshMap[hovered]) {
        meshMap[hovered].material.emissiveIntensity = 0.3;
        glowMap[hovered].material.opacity = 0.06;
      }
      hovered = id;
      meshMap[id].material.emissiveIntensity = 0.6;
      glowMap[id].material.opacity = 0.15;
      renderer.domElement.style.cursor = 'pointer';

      // Highlight connections
      highlightConnections(id);
    }
  } else {
    if (hovered) {
      meshMap[hovered].material.emissiveIntensity = 0.3;
      glowMap[hovered].material.opacity = 0.06;
      hovered = null;
      renderer.domElement.style.cursor = 'grab';
      resetConnectionHighlight();
    }
  }
}

function highlightConnections(id) {
  const node = nodes.find(n => n.id === id);
  if (!node) return;
  const connected = new Set(node.connects || []);
  connected.add(id);

  Object.entries(meshMap).forEach(([nid, mesh]) => {
    if (connected.has(nid) || nid === id) {
      mesh.material.opacity = 0.95;
      if (labelMap[nid]) labelMap[nid].material.opacity = 0.9;
    } else {
      mesh.material.opacity = 0.15;
      if (labelMap[nid]) labelMap[nid].material.opacity = 0.2;
    }
  });

  connectionLines.forEach(line => {
    const involves = line.userData.from === id || line.userData.to === id;
    line.material.opacity = involves ? 0.5 : 0.03;
  });
}

function resetConnectionHighlight() {
  Object.entries(meshMap).forEach(([nid, mesh]) => {
    mesh.material.opacity = 0.92;
    if (labelMap[nid]) labelMap[nid].material.opacity = 0.85;
  });
  connectionLines.forEach(line => {
    line.material.opacity = line.material.dashSize ? 0.12 : 0.18;
  });
}

function onClick(e) {
  if (!hovered) { closePanel(); return; }
  selectNode(hovered);
}

function selectNode(id) {
  const node = nodes.find(n => n.id === id);
  if (!node) return;
  selected = id;

  // Animate camera toward node
  const target = meshMap[id].position.clone();
  const camTarget = target.clone().add(new THREE.Vector3(3, 2, 8));
  smoothMoveCam(camTarget, target);

  // Fill panel
  const colorHex = '#' + node.color.toString(16).padStart(6,'0');
  document.getElementById('p-tier').textContent = node.tier;
  document.getElementById('p-tier').style.color = colorHex;
  document.getElementById('p-code').textContent = node.code;
  document.getElementById('p-code').style.color = colorHex;
  document.getElementById('p-name').textContent = node.name;
  document.getElementById('p-desc').textContent = node.desc;

  const detailsEl = document.getElementById('p-details');
  detailsEl.innerHTML = '';
  if (node.details) {
    const sec = document.createElement('div');
    sec.className = 'p-section';
    sec.textContent = 'Details';
    detailsEl.appendChild(sec);
    node.details.forEach(d => {
      const p = document.createElement('div');
      p.className = 'p-detail';
      p.textContent = d;
      if (d.startsWith('──')) { p.style.color = colorHex; p.style.fontWeight = '700'; p.style.marginTop = '10px'; }
      detailsEl.appendChild(p);
    });
  }

  const urlWrap = document.getElementById('p-url-wrap');
  urlWrap.innerHTML = '';
  if (node.url) {
    const a = document.createElement('a');
    a.className = 'p-url';
    a.href = node.url;
    a.target = '_blank';
    a.textContent = node.url.replace('https://','');
    a.style.color = colorHex;
    a.style.borderColor = colorHex + '30';
    a.style.background = colorHex + '10';
    urlWrap.appendChild(a);
  }

  const connEl = document.getElementById('p-connections');
  connEl.innerHTML = '';
  const connLabel = document.getElementById('p-conn-label');
  if (node.connects && node.connects.length > 0) {
    connLabel.style.display = '';
    node.connects.forEach(cid => {
      const cn = nodes.find(n => n.id === cid);
      if (!cn) return;
      const btn = document.createElement('span');
      btn.className = 'p-conn';
      btn.dataset.id = cid;
      btn.textContent = cn.code;
      btn.style.borderColor = '#' + cn.color.toString(16).padStart(6,'0') + '40';
      connEl.appendChild(btn);
    });
  } else {
    connLabel.style.display = 'none';
  }

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  selected = null;
}

function smoothMoveCam(pos, target) {
  const start = { cx:camera.position.x, cy:camera.position.y, cz:camera.position.z,
                  tx:controls.target.x, ty:controls.target.y, tz:controls.target.z };
  const end = { cx:pos.x, cy:pos.y, cz:pos.z, tx:target.x, ty:target.y, tz:target.z };
  let t = 0;
  function step() {
    t += 0.04;
    if (t > 1) t = 1;
    const e = 1 - Math.pow(1 - t, 3); // ease out cubic
    camera.position.set(
      start.cx + (end.cx - start.cx) * e,
      start.cy + (end.cy - start.cy) * e,
      start.cz + (end.cz - start.cz) * e
    );
    controls.target.set(
      start.tx + (end.tx - start.tx) * e,
      start.ty + (end.ty - start.ty) * e,
      start.tz + (end.tz - start.tz) * e
    );
    if (t < 1) requestAnimationFrame(step);
  }
  step();
}

function setView(view) {
  activeView = view;
  nodes.forEach(n => {
    const mesh = meshMap[n.id];
    let vis = true;
    if (view === 'financial') vis = n.group === 'financial' || n.id === 'ceo';
    else if (view === 'physical') vis = n.group === 'physical' || n.id === 'ceo' || n.id === 'pi';
    else if (view === 'ops') vis = n.group === 'ops' || n.id === 'ceo';
    else if (view === 'infra') vis = n.group === 'infra';
    mesh.visible = vis;
  });

  connectionLines.forEach(line => {
    const fVis = meshMap[line.userData.from]?.visible;
    const tVis = meshMap[line.userData.to]?.visible;
    line.visible = fVis && tVis;
  });
}

function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

function buildLegend() {
  const el = document.getElementById('legend');
  [
    {l:'Founder',c:'#22C55E'},{l:'CEO Role',c:'#60A5FA'},{l:'Primary Agent',c:'#FFE500'},
    {l:'Domain Agent',c:'#F97316'},{l:'Extension',c:'#94A3B8'},{l:'Ops',c:'#A78BFA'},{l:'Infra',c:'#d0cbbc'}
  ].forEach(i => {
    const d = document.createElement('div');
    d.className = 'leg';
    d.innerHTML = `<span class="dot" style="background:${i.c}"></span>${i.l}`;
    el.appendChild(d);
  });
}

// ============================================================
// ANIMATE
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Gentle float on agents
  ['pi','tt','ttp'].forEach((id,i) => {
    if (meshMap[id]) meshMap[id].position.y = nodes.find(n=>n.id===id).pos[1] + Math.sin(t*1.2+i*2)*0.12;
  });

  // Pulse CEO
  if (meshMap.ceo) {
    const s = 1 + Math.sin(t * 2) * 0.06;
    meshMap.ceo.scale.set(s,s,s);
  }

  // Slow rotate glow rings
  Object.values(meshMap).forEach(mesh => {
    if (mesh.children[1]) mesh.children[1].rotation.z = t * 0.3;
  });

  controls.update();
  renderer.render(scene, camera);
}

init();
</script>
