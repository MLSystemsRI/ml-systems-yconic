function computeSnagCascade(phases){
  const stalled=new Set(),depths={};
  const allTasks={},depOf={};
  phases.forEach(ph=>{ph.t.forEach(t=>{allTasks[t.id]=t;t.dp.forEach(d=>{if(!depOf[d])depOf[d]=[];depOf[d].push(t.id)})})});
  const stalledPhases=new Set();
  SNAGS.forEach(s=>{
    if(!allTasks[s.task])return;
    stalled.add(s.task);depths[s.task]=0;
    const queue=[{id:s.task,depth:0}];
    while(queue.length){
      const{id,depth}=queue.shift();
      (depOf[id]||[]).forEach(did=>{
        if(!stalled.has(did)){stalled.add(did);depths[did]=depth+1;queue.push({id:did,depth:depth+1})}
      });
    }
    stalledPhases.add(s.phase);
  });
  phases.forEach(ph=>{
    if(ph.bb.some(b=>stalledPhases.has(b))){
      stalledPhases.add(ph.id);
      const maxD=Math.max(...Object.values(depths),0);
      ph.t.forEach(t=>{if(!stalled.has(t.id)){stalled.add(t.id);depths[t.id]=maxD+1}});
    }
  });
  return{stalled,depths,stalledPhases};
}

function cascadeColor(depth){

  if(depth===3)return 0xffaa30;
  return 0xffd060;
}

// ═══════════════════ ENGINE ═══════════════════
function computeProj(phases){
  const pd={},ps={},pe={};
  const ids=new Set(phases.map(p=>p.id));
  phases.forEach(p=>{pd[p.id]=Math.round((p.dr[0]+p.dr[1])/2)});
  phases.forEach(p=>{
    const bb=p.bb.filter(b=>ids.has(b)&&pe[b]!==undefined);
    ps[p.id]=bb.length?Math.max(...bb.map(b=>pe[b]))+1:1;
    pe[p.id]=ps[p.id]+pd[p.id]-1;
  });
  const all=[];
  phases.forEach(ph=>{const pS=ps[ph.id],tm={};ph.t.forEach(t=>{tm[t.id]=t});const ls={};
    function g(i){if(ls[i]!==undefined)return ls[i];const t=tm[i];if(!t.dp.length){ls[i]=0;return 0}let m=0;t.dp.forEach(d=>{if(tm[d]){const e=g(d)+tm[d].d;if(e>m)m=e}});ls[i]=m;return m}
    ph.t.forEach(t=>{const l=g(t.id);all.push({pi:ph.id,ti:t.id,n:t.n,s:pS+l,e:pS+l+t.d-1,d:t.d,cp:t.cp,df:t.df,ai:t.ai})})});
  return{ps,pe,td:Math.max(...Object.values(pe)),all};
}

function buildRProj(phases,S){
  const DG={};S.all.forEach(t=>{for(let d=t.s;d<=t.e;d++){const k=d+'-'+t.pi;if(!DG[k])DG[k]=[];DG[k].push(t)}});
  const R=[];phases.forEach(ph=>{let c=null;
    for(let d=S.ps[ph.id];d<=S.pe[ph.id];d++){const tk=DG[d+'-'+ph.id]||[],n=tk.length;
      if(!n){if(c){R.push(c);c=null}continue}
      const sp=c&&(n>c.pk*2.5||n<c.av*0.3);
      if(!c||sp){if(c)R.push(c);c={pi:ph.id,ds:d,de:d,bd:{[d]:tk},pk:n,tot:n,dc:1,av:n,cp:tk.some(t=>t.cp),df:tk.some(t=>t.df),ai:tk.some(t=>t.ai),ids:new Set(tk.map(t=>t.ti))}}
      else{c.de=d;c.bd[d]=tk;c.pk=Math.max(c.pk,n);c.tot+=n;c.dc++;c.av=c.tot/c.dc;if(tk.some(t=>t.cp))c.cp=1;if(tk.some(t=>t.df))c.df=1;if(tk.some(t=>t.ai))c.ai=1;tk.forEach(t=>c.ids.add(t.ti))}}
    if(c)R.push(c)});
  R.forEach(r=>{r.ut=[];const s=new Set();for(let d=r.ds;d<=r.de;d++){(r.bd[d]||[]).forEach(t=>{if(!s.has(t.ti)){s.add(t.ti);r.ut.push(t)}})}r.int=r.av});
  const mx=Math.max(...R.map(r=>r.int),1);R.forEach(r=>{r.br=0.12+(r.int/mx)*0.88});return R;
}

const NOISE_GLSL=`
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;i=mod(i,289.0);vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));float n_=1.0/7.0;vec3 ns=n_*D.wyz-D.xzx;vec4 j=p-49.0*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));}`;

const fresnelVert=`varying vec3 vN;varying vec3 vV;void main(){vN=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(position,1.0);vV=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;}`;
const fresnelFrag=`uniform vec3 uColor;uniform float uOpacity;uniform float uPower;uniform float uPulse;void main(){float f=pow(1.0-max(dot(vN,vV),0.0),uPower);gl_FragColor=vec4(uColor,f*uOpacity*uPulse);}`;

const nebulaVert=NOISE_GLSL+`uniform float uTime;uniform float uNoiseScale;uniform float uNoiseAmp;varying float vNoise;varying vec3 vN;varying vec3 vV;
void main(){float n=snoise(position*uNoiseScale+vec3(uTime*0.12));vec3 pos=position+normal*n*uNoiseAmp;vNoise=n;vN=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(pos,1.0);vV=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;}`;
const nebulaFrag=`uniform vec3 uColor;uniform vec3 uColor2;uniform float uOpacity;varying float vNoise;varying vec3 vN;varying vec3 vV;
void main(){vec3 col=mix(uColor,uColor2,vNoise*0.5+0.5);float rim=pow(1.0-max(dot(vN,vV),0.0),2.2);gl_FragColor=vec4(col,uOpacity*(0.35+vNoise*0.25+rim*0.3));}`;

    if(s>0&&s<segs){p.x+=(Math.random()-0.5)*jAmt;p.y+=(Math.random()-0.5)*jAmt;p.z+=(Math.random()-0.5)*jAmt*0.4;}

  return new THREE.CatmullRomCurve3(pts);
}
function addBoltTubes(curve,radius,opacity,hasCorona,group){

// ═══════════════════ VERTICAL SPINE — Semantic Connections ═══════════════════
// Methodology: classify each phase spine by cross-project relationship
// Green = milestone transfer (both projects completed this phase)
// Gold = builder credits (DfD/CP-heavy phases where crew experience transfers)
// Red = pain points (snag phases or punch list concentration)
const spineMeshes=[];
const spineGlows=[]; // glow tubes for meaningful connections

function getSpineRelation(phaseId, piA, piB){
  const projA=PROJECTS[piA],projB=PROJECTS[piB];
  const aComplete=phaseId<=projA.currentPhase;
  const bComplete=phaseId<=projB.currentPhase;
  const phase=BP.find(p=>p.id===phaseId);
  if(!phase)return{type:'none',color:0x22D3EE,opacity:0.04,glowOp:0};
  // Pain point: snag phase or punch list concentration
  const isSnagPhase=SNAGS.some(s=>s.phase===phaseId);
  const punchCount=PUNCH_LIST.filter(p=>p.phase===phaseId&&!p.resolved).length;
  const isPainPoint=isSnagPhase||punchCount>=2;
  // Builder credit: DfD-heavy or CP-heavy phases (structural knowledge transfer)
  const dfCount=phase.t.filter(t=>t.df).length;
  const cpCount=phase.t.filter(t=>t.cp).length;
  const isBuilderCredit=dfCount>=2||cpCount>=4;
  // Milestone: both projects completed this phase
  const isMilestone=aComplete&&bComplete;
  const oneComplete=aComplete||bComplete;
  if(isPainPoint&&oneComplete)return{type:'pain',color:0xff3030,opacity:0.25,glowOp:0.06};
  if(isBuilderCredit&&isMilestone)return{type:'credit',color:0xffd080,opacity:0.22,glowOp:0.05};
  if(isMilestone)return{type:'milestone',color:0x22C55E,opacity:0.18,glowOp:0.04};
  if(oneComplete)return{type:'partial',color:0x22C55E,opacity:0.07,glowOp:0};
  return{type:'none',color:0x22D3EE,opacity:0.04,glowOp:0};
}

PROJECTS.forEach((proj,pi)=>{
  if(pi===0)return;
  const y0=(pi-1)*PROJ_SPACING;
  const y1=pi*PROJ_SPACING;
  // Core spine (always cyan)
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute([0,y0,0,0,y1,0],3));
  const line=new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x22D3EE,transparent:true,opacity:0.15}));
  scene.add(line);
  spineMeshes.push({line,pi,phaseId:0,relation:{type:'core'}});
  // Phase spines — color-coded by relationship
  BP.forEach(p=>{
    const pos=phasePos[p.id];
    const rel=getSpineRelation(p.id,pi-1,pi);
    const g2=new THREE.BufferGeometry();
    g2.setAttribute('position',new THREE.Float32BufferAttribute([pos.x,y0,pos.z,pos.x,y1,pos.z],3));
    const l2=new THREE.Line(g2,new THREE.LineBasicMaterial({color:rel.color,transparent:true,opacity:rel.opacity}));
    scene.add(l2);
    spineMeshes.push({line:l2,pi,phaseId:p.id,relation:rel});
    // Glow tube for meaningful connections (pain/credit/milestone)
    if(rel.glowOp>0){
      const mid=new THREE.Vector3(pos.x,(y0+y1)/2,pos.z);
      const curve=new THREE.CatmullRomCurve3([
        new THREE.Vector3(pos.x,y0,pos.z),mid,new THREE.Vector3(pos.x,y1,pos.z)]);

const snagData=computeSnagCascade(BP);
const snagTendrils=[];const snagSparks2=[];const punchOrbs=[];

function buildCascadeTendrils(){
  const{stalled,depths,stalledPhases}=snagData;
  const sortedPhases=[...stalledPhases].sort((a,b)=>a-b);
  for(let i=0;i<sortedPhases.length-1;i++){
    const a=sortedPhases[i],b=sortedPhases[i+1];
    const pA=phasePos[a],pB=phasePos[b];
    if(!pA||!pB)continue;
    const depth=Math.min(...BP.find(p=>p.id===b).t.map(t=>depths[t.id]||99));
    const col=new THREE.Color(cascadeColor(depth));
    // Follow circumference for cascade tendrils
    let angleA=pA.angle,angleB=pB.angle;
    if(angleB-angleA>Math.PI)angleB-=Math.PI*2;
    if(angleA-angleB>Math.PI)angleA-=Math.PI*2;
    const steps=20;const pts=[];
    for(let s=0;s<=steps;s++){
      const f=s/steps;const ang=angleA+(angleB-angleA)*f;
      const r=CR+Math.sin(f*Math.PI)*1.0;
      pts.push(new THREE.Vector3(Math.cos(ang)*r,Math.sin(f*Math.PI)*0.3,Math.sin(ang)*r));
    }
    const curve=new THREE.CatmullRomCurve3(pts);
    const tMesh=new THREE.Mesh(new THREE.TubeGeometry(curve,24,0.045,6,false),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false}));
    tMesh.visible=false;scene.add(tMesh);snagTendrils.push(tMesh);
    const gMesh=new THREE.Mesh(new THREE.TubeGeometry(curve,24,0.13,6,false),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.06,blending:THREE.AdditiveBlending,depthWrite:false}));
    gMesh.visible=false;scene.add(gMesh);snagTendrils.push(gMesh);
    for(let j=0;j<5;j++){
      const sG=new THREE.SphereGeometry(0.035,6,6);
      const sM=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.9,blending:THREE.AdditiveBlending});
      const sp=new THREE.Mesh(sG,sM);sp.userData={curve,t:j/5,speed:0.003+Math.random()*0.004};
      sp.position.copy(curve.getPoint(sp.userData.t));sp.visible=false;scene.add(sp);snagSparks2.push(sp);
      const sg=new THREE.Mesh(sG,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.3,blending:THREE.AdditiveBlending}));
      sg.scale.setScalar(3);sg.position.copy(sp.position);sg.userData={parent:sp};sg.visible=false;scene.add(sg);snagSparks2.push(sg);
    }
  }
}

  h+=`<div class="tm">${tcnt} tasks \u00B7 ${cpCount} CP \u00B7 ${aiCount} AI</div>`;

  if(tcnt>8)h+=`<div class="tt" style="color:#3a4060">+ ${tcnt-8} more</div>`;
  h+=`<div class="dsig"><div class="dsig-item"><div class="dsig-label">AI ${aiPct}%</div><div class="dsig-bar"><div class="dsig-fill" style="width:${aiPct}%;background:#A78BFA"></div></div></div>`;
  h+=`<div class="dsig-item"><div class="dsig-label">CP ${cpPct}%</div><div class="dsig-bar"><div class="dsig-fill" style="width:${cpPct}%;background:#d4a54a"></div></div></div></div>`;
  const tip=document.getElementById('tip');tip.innerHTML=h;tip.classList.add('visible');
  let tx=ev.clientX+16,ty=ev.clientY+12;if(tx+400>W)tx=ev.clientX-410;if(ty+280>H)ty=ev.clientY-290;

    if(o.projIdx!==0){o._snagStalled=false;o._snagAllStalled=false;return;}
    const hasStalled=o.phase.t.some(t=>snagData.stalled.has(t.id));
    const allStalled=o.phase.t.every(t=>snagData.stalled.has(t.id));
    o._snagStalled=snagM&&hasStalled;
    o._snagAllStalled=snagM&&allStalled;
  });
  const resolved=PUNCH_LIST.filter(p=>p.resolved).length;
  const total=PUNCH_LIST.length;
  const punchStat=document.getElementById('punch-stat');
  if(punchStat)punchStat.innerHTML=snagM?`<span class="sv" style="color:${resolved===total?'#22c55e':'#ff3030'}">${resolved}/${total}</span> punch`:'';
}

// ═══════════════════ ANIMATE ═══════════════════
const clk=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);const t=clk.getElapsedTime();

  // Orbital camera (slowly orbiting, slightly elevated)
  const ang=camOrbit+(dragging?0:t*0.04);
  cam.position.x=tgt.x+Math.sin(ang)*Math.cos(camTilt)*camDist;
  cam.position.y=tgt.y+Math.sin(camTilt)*camDist;
  cam.position.z=tgt.z+Math.cos(ang)*Math.cos(camTilt)*camDist;
  cam.lookAt(tgt);

  topLight.intensity=0.5+Math.sin(t*0.8)*0.06;

  // Central core breathing (all projects)
  const corePulse=1+Math.sin(t*0.7)*0.08;
  allCores.forEach((core,ci)=>{
    core.layers.forEach((l,i)=>{
      const baseS=2*coreScales[i];
      l.scale.setScalar(baseS*corePulse*(1+Math.sin(t*1.2+i*1.5)*0.03));
    });
    core.fMat.uniforms.uPulse.value=0.85+Math.sin(t*0.9)*0.15;
    core.nMat.uniforms.uTime.value=t;
    core.light.intensity=1.5+Math.sin(t*0.7)*0.3;
    const cShift=Math.sin(t*0.3+ci*0.5)*0.1;
    const baseR=core.accent.r,baseG=core.accent.g,baseB=core.accent.b;
    core.layers[0].material.color.setRGB(baseR+cShift*0.05,baseG+cShift*0.02,baseB-cShift*0.02);
  });

  // Phase orb breathing
  orbAnims.forEach((o,i)=>{
    const{layers,hit,phase,rad,x,y,z,seed,aiCore,aiLight,cpCore,nMesh,nMat,fMat,aiRatio,cpRatio,dimFactor}=o;
    const breathSpeed=dimFactor<1?0.1:0.3;
    const br=fnoise(t*breathSpeed,seed)*0.08;
    const hMul=hit.userData.hovered?1.6:1;
    const hAge=hit.userData.hovered?t-hit.userData.hoverStart:0;
    const hBloom=hit.userData.hovered?1+Math.max(0,0.4-hAge*0.7):1;
    const bS=[0.35,0.8,1.5];

    layers.forEach((l,li)=>{
      const bri=fnoise(t*(dimFactor<1?0.15:0.4),seed+li*2.3);
      if(dimFactor>=1) l.material.color.copy(o.origColors[li]);
      else l.material.color.setHex(0x080810);
      l.scale.setScalar(rad*bS[li]*(1+bri*0.04)*hBloom);
      if(!cpM&&!aiM){
        if(dimFactor>=1) l.material.opacity=GL[li].op*(1+bri*0.2)*hMul*dimFactor;
        else l.material.opacity=[0.25,0.15,0.06][li];
      }
      l.position.set(x,y,z);
    });

    // Dark nodes: light fights darkness
    if(dimFactor<1&&!o._snagAllStalled){
      const fight=Math.pow(Math.max(0,Math.sin(t*2.0+seed*0.7)),8);
      const flicker=Math.random()>0.97?0.4:0;
      const intensity=fight*0.2+flicker;
      layers.forEach((l,li)=>{
        l.material.color.lerp(o.origColors[li],intensity);
        l.material.opacity=[0.25,0.15,0.06][li]+intensity*0.3;
      });
      if(fMat){
        fMat.uniforms.uPulse.value=0.08+fight*0.6+flicker*0.4;
      }
      if(nMat){
        nMat.uniforms.uNoiseAmp.value=0.35+fight*0.15;
      }
    }

    if(aiCore){const p=0.55+Math.sin(t*2.2+seed)*0.45;
      aiCore.scale.setScalar((rad*0.18+aiRatio*0.12)*(1+p*0.15)*hBloom);
      aiCore.material.opacity=aiRatio*(0.4+p*0.35)*(aiM?1.5:1)*(dimFactor<1?0.05:1);
      aiCore.position.set(x,y,z);
      if(aiLight){aiLight.intensity=aiRatio*(0.35+p*0.4)*(aiM?2:1)*(dimFactor<1?0.05:1);aiLight.position.set(x,y,z)}}
    if(cpCore){const w=0.65+Math.sin(t*1.1+seed*0.5)*0.35;
      cpCore.scale.setScalar((rad*0.25+cpRatio*0.15)*(1+w*0.1));cpCore.material.opacity=(0.3+cpRatio*0.35)*w*(cpM?1.8:1)*(dimFactor<1?0.05:1);
      cpCore.position.set(x,y,z)}
    if(nMat){nMat.uniforms.uTime.value=t;nMesh.position.set(x,y,z)}
    if(fMat&&dimFactor>=1){fMat.uniforms.uPulse.value=(0.85+fnoise(t*0.55,seed+20)*0.15)*hMul*hBloom}

    // Snag: heartbeat shockwave
    if(o._snagAllStalled){
      const heartbeat=Math.pow(Math.max(0,Math.sin(t*3.5+seed)),8);
      layers.forEach((layer,li)=>{
        layer.scale.setScalar(rad*bS[li]*(1+heartbeat*0.4));
        layer.material.color.lerp(new THREE.Color(0xff2020),0.03+heartbeat*0.1);
        layer.material.opacity=GL[li].op*(0.3+heartbeat*0.7);
      });
      if(nMat){nMat.uniforms.uNoiseAmp.value=0.15+heartbeat*0.2;nMat.uniforms.uColor.value.lerp(new THREE.Color(0xff3030),0.03)}
      if(fMat){fMat.uniforms.uColor.value.lerp(new THREE.Color(0xff2020),0.04);fMat.uniforms.uPulse.value=0.4+heartbeat*0.8}
    }else if(o._snagStalled){
      const pulse=0.5+Math.sin(t*2.5+seed)*0.5;
      layers.forEach((layer,li)=>{if(li>=1){layer.material.color.lerp(new THREE.Color(0xff4040),0.01+pulse*0.01)}});
    }
  });

  // CP mode animations
  if(cpMode===1){
    cpHighwaySparks.forEach(s=>{
      if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=0.6+Math.sin(t*4+s.userData.t*10)*0.35}
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
  }
  if(cpMode===2){
    orbAnims.forEach(o=>{
      const r=o.cpRatio;
      o.layers.forEach((l,li)=>{
        if(r>0.3)l.material.color.lerp(new THREE.Color(0xffd080),r*0.6);
        else l.material.color.lerp(new THREE.Color(0x1a2040),0.4);
      });
    });
  }
  if(cpMode===3){
    const waveAngle=((t*0.4)%(Math.PI*2))-Math.PI/2;
    orbAnims.forEach(o=>{
      const pAngle=phasePos[o.phase.id].angle;
      let diff=pAngle-waveAngle;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
      const proximity=Math.max(0,1-Math.abs(diff)/0.6);
      const hasCp=o.phase.t.some(t=>t.cp);
      o.layers.forEach((l,li)=>{
        if(hasCp){l.material.opacity=GL[li].op*(0.3+proximity*3)*o.dimFactor;l.material.color.lerp(new THREE.Color(0xffd080),proximity*0.5);}
        else{l.material.opacity=GL[li].op*0.04*o.dimFactor;}
      });
    });
  }
  if(cpMode===4){
    orbAnims.forEach(o=>{
      const hasCp=o.phase.t.some(t=>t.cp);
      const targetY=hasCp?2.5:-2;
      if(!o._cpRevealY)o._cpRevealY=0;
      o._cpRevealY+=(targetY-o._cpRevealY)*0.04;
      o.layers.forEach((l,li)=>{
        l.position.y=o.y+o._cpRevealY;
        l.material.opacity+=(GL[li].op*(hasCp?2.5:0.03)*o.dimFactor-l.material.opacity)*0.04;
        if(hasCp)l.material.color.lerp(new THREE.Color(0xffd080),0.01);
      });
      if(o.nMesh)o.nMesh.position.y=o.y+o._cpRevealY;
      if(o.cpCore)o.cpCore.position.y=o.y+o._cpRevealY;
      if(o.aiCore){o.aiCore.position.y=o.y+o._cpRevealY;if(o.aiLight)o.aiLight.position.y=o.y+o._cpRevealY;}
    });
  }

  // Wifi web electrical flicker (matches Phase Jump pattern at half intensity)
  const wifiStrike=Math.sin(t*6)>0.9?1.4:1.0;
  wifiArcs.forEach(m=>{
    const base=m.userData._baseOp;
    if(m.userData.isBolt){m.material.opacity=base*(0.6+Math.random()*0.4)*wifiStrike;}
    else if(m.userData.isFork){m.material.opacity=base*(Math.random()>0.3?1.0:0.2)*wifiStrike;}
    else{m.material.opacity=base*(0.5+Math.random()*0.5)*wifiStrike;}
  });

  // Connection sparks
  connSparks.forEach(s=>{
    if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=0.6+Math.sin(t*4+s.userData.t*10)*0.35}
    else if(s.userData.parent)s.position.copy(s.userData.parent.position)
  });

  grnd.material.emissiveIntensity=0.015+Math.sin(t*0.35)*0.005;

  // Semantic spine glow animation
  spineGlows.forEach(sg=>{
    const rel=sg.relation;
    if(rel.type==='pain'){
      // Red pain points pulse urgently
      sg.mesh.material.opacity=sg.baseOp*(0.6+Math.sin(t*3.5+sg.phaseId)*0.4);
    }else if(rel.type==='credit'){
      // Gold builder credits shimmer steadily
      sg.mesh.material.opacity=sg.baseOp*(0.7+Math.sin(t*1.2+sg.phaseId*0.5)*0.3);
    }else{
      // Green milestones breathe slowly
      sg.mesh.material.opacity=sg.baseOp*(0.8+Math.sin(t*0.6+sg.phaseId*0.3)*0.2);
    }
    // Update glow Y positions for slider/equity split
    if(sg.mesh.geometry.boundingSphere){
      // Glow tubes are static geometry — their scene parent handles position
    }
  });

  // Snag cascade sparks + punch list
  if(snagM){
    snagSparks2.forEach(s=>{
      if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=.6+Math.sin(t*5+s.userData.t*12)*.35}
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
    punchOrbs.forEach(o=>{
      if(o.userData.pl){
        const a=t*o.userData.speed+o.userData.angle;
        o.position.x=o.userData.cx+Math.cos(a)*o.userData.orbitR;
        o.position.y=o.userData.cy+Math.sin(a)*o.userData.orbitR*0.5;
        o.position.z=o.userData.cz;
        if(!o.userData.pl.resolved)o.material.opacity=0.55+Math.sin(t*3+o.userData.angle)*0.35;
      }else if(o.userData.parentOrb)o.position.copy(o.userData.parentOrb.position);
    });
  }

  // Phase Jump: lightning flicker
  if(jumpM){
    const strike=Math.sin(t*8)>0.92?1.6:1.0;
    jumpArcs.forEach(m=>{if(m.visible){
      const base=m.userData.baseOp||0.5;
      if(m.userData.isBolt){m.material.opacity=base*(0.65+Math.random()*0.35)*strike;}
      else if(m.userData.isFork){m.material.opacity=base*(Math.random()>0.25?1.0:0.15)*strike;}
      else{m.material.opacity=base*(0.5+Math.random()*0.5)*strike;}
    }});
    jumpArcSparks.forEach(s=>{
      if(s.userData.curve){
        s.userData.t+=s.userData.speed*s.userData.dir;
        if(s.userData.t>1){s.userData.t=1;s.userData.dir=-1;}
        else if(s.userData.t<0){s.userData.t=0;s.userData.dir=1;}
        s.position.copy(s.userData.curve.getPoint(s.userData.t));
        s.material.opacity=Math.random()>0.8?1.0:0.5+Math.random()*0.4;
        s.position.y+=(Math.random()-0.5)*0.4;
      }else if(s.userData.parent)s.position.copy(s.userData.parent.position);
    });
    orbAnims.forEach(oa=>{if(oa._jumpHighlight)oa.layers.forEach((l,li)=>{if(li>=1)l.material.color.lerp(new THREE.Color(0xFFE500),0.01)})});
  }

  // Proj Intel node pulse + strand sparks
  if(aiM){
    const aiPulse=1+Math.sin(t*1.5)*0.1;
    aiNodeCore.scale.setScalar(1.0*aiPulse);
    aiNodeGlow.scale.setScalar(1.8*(1+Math.sin(t*0.8)*0.06));
    aiNodeCorona.scale.setScalar(3.0*(1+Math.sin(t*0.5)*0.04));
    aiNodeLight.intensity=1.0+Math.sin(t*1.5)*0.25;
    aiStrandSparks.forEach(s=>{
      if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=0.5+Math.sin(t*3+s.userData.t*8)*0.35}
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
  }

  // ═══ Equity Transfer animations ═══
  if(eqM){
    // Smooth split interpolation
    let splitChanged=false;
    for(let pi=0;pi<PROJECTS.length;pi++){
      const diff=eqSplitTarget[pi]-eqSplitCurrent[pi];
      if(Math.abs(diff)>0.01){
        eqSplitCurrent[pi]+=diff*0.06;
        splitChanged=true;
      }else{eqSplitCurrent[pi]=eqSplitTarget[pi];}
    }
    if(splitChanged){
      projGroups.forEach((g,pi)=>{g.position.y=pi*PROJ_SPACING*stackVal+eqSplitCurrent[pi];});
      spineMeshes.forEach(s=>{
        const posAttr=s.line.geometry.getAttribute('position');
        posAttr.setY(0,(s.pi-1)*PROJ_SPACING*stackVal+eqSplitCurrent[s.pi-1]);
        posAttr.setY(1,s.pi*PROJ_SPACING*stackVal+eqSplitCurrent[s.pi]);
        posAttr.needsUpdate=true;
      });
    }

    // Value coronas pulse
    eqCoronas.forEach(c=>{
      const pulse=0.5+Math.sin(t*0.8+c.pi*1.2)*0.15;
      const baseOp=0.06+c.completion*0.12;
      c.inner.material.opacity=baseOp*(1+pulse);
      c.outer.material.opacity=baseOp*0.3*(1+pulse);
      c.inner.scale.setScalar((2+c.completion*4)*(1+Math.sin(t*0.5+c.pi)*0.04));
      c.outer.scale.setScalar((2+c.completion*4)*1.4*(1+Math.sin(t*0.5+c.pi)*0.04));
    });

    // Equity thread position + pulse (stretches between seller top and buyer bottom)
    const sellerTopY=1*PROJ_SPACING*stackVal+eqSplitCurrent[1]; // project 1 position
    const buyerBotY=2*PROJ_SPACING*stackVal+eqSplitCurrent[2]; // project 2 position
    const threadMidY=(sellerTopY+buyerBotY)/2;
    const threadHeight=Math.max(0.1,buyerBotY-sellerTopY);
    eqThread.position.set(0,threadMidY,0);
    eqThread.scale.set(1,threadHeight,1);
    eqThread.material.opacity=0.5+Math.sin(t*2)*0.2;
    eqThreadGlow.position.set(0,threadMidY,0);
    eqThreadGlow.scale.set(1,threadHeight,1);
    eqThreadGlow.material.opacity=0.06+Math.sin(t*2)*0.03;

    // Thread sparks flow between halves
    eqThreadSparks.forEach(s=>{
      if(s.userData.parent){
        s.position.copy(s.userData.parent.position);
        s.material.opacity=s.userData.parent.material.opacity*0.4;
      }else{
        s.userData.t=(s.userData.t+s.userData.speed)%1;
        const sy=sellerTopY+(buyerBotY-sellerTopY)*s.userData.t;
        s.position.set((Math.random()-0.5)*0.15,sy,(Math.random()-0.5)*0.15);
        s.material.opacity=0.5+Math.sin(t*3+s.userData.t*8)*0.3;
      }
    });

    // Summary orb above the stack
    const summaryY=(PROJECTS.length-1)*PROJ_SPACING*stackVal+eqSplitCurrent[PROJECTS.length-1]+8;
    const summaryPulse=1+Math.sin(t*1.2)*0.08;
    const avgComp=PROJECTS.reduce((s,p)=>s+p.currentPhase,0)/PROJECTS.length/9;
    const summaryR=1.2+avgComp*1.5;
    eqSummaryOrb.position.set(0,summaryY,0);
    eqSummaryOrb.scale.setScalar(summaryR*summaryPulse);
    eqSummaryOrb.material.opacity=0.25+Math.sin(t*0.8)*0.08;
    eqSummaryGlow.position.set(0,summaryY,0);
    eqSummaryGlow.scale.setScalar(summaryR*1.8*summaryPulse);
    eqSummaryGlow.material.opacity=0.06+Math.sin(t*0.8)*0.02;
    eqSummaryFresnel.position.set(0,summaryY,0);
    eqSummaryFresnel.scale.setScalar(summaryR*1.3*summaryPulse);
    eqSummaryFresnel.material.uniforms.uPulse.value=0.7+Math.sin(t*1.5)*0.3;
    eqLSpr.position.set(0,summaryY+summaryR*1.8+1,0);

    // Seller / Buyer labels
    sellerSpr.position.set(CR+3,0*PROJ_SPACING*stackVal+eqSplitCurrent[0]-2,0);
    buyerSpr.position.set(CR+3,2*PROJ_SPACING*stackVal+eqSplitCurrent[2]-2,0);

    // Cash flow sparks — green energy flowing upward
    cashFlowSparks.forEach(s=>{
      if(s.userData.parent){
        s.position.copy(s.userData.parent.position);
        s.material.opacity=s.userData.parent.material.opacity*0.35;
      }else{
        s.userData.t=(s.userData.t+s.userData.speed)%1;
        const si=s.userData.spineIdx%spineMeshes.length;
        const spine=spineMeshes[si];
        if(spine){
          const posAttr=spine.line.geometry.getAttribute('position');
          const y0=posAttr.getY(0),y1=posAttr.getY(1);
          const x0=posAttr.getX(0),z0=posAttr.getZ(0);
          s.position.set(x0+(Math.random()-0.5)*0.1,y0+(y1-y0)*s.userData.t,z0+(Math.random()-0.5)*0.1);
          s.material.opacity=0.4+Math.sin(t*4+s.userData.t*6)*0.3;
        }
      }
    });

    // Dark nodes in equity mode: completed phases glow GOLD (proven value)
    // Future phases pulse with BUYER BLUE (opportunity) instead of phase color
    orbAnims.forEach(o=>{
      if(o.dimFactor>=1){
        // Completed phases: gold tint for proven value
        o.layers.forEach((l,li)=>{
          l.material.color.lerp(new THREE.Color(0xffd080),0.02);
        });
      }else{
        // Future phases: fight with buyer's blue instead of phase color
        const fight=Math.pow(Math.max(0,Math.sin(t*2.0+o.seed*0.7)),8);
        const flicker=Math.random()>0.97?0.4:0;
        const intensity=fight*0.25+flicker;
        const buyerBlue=new THREE.Color(0x60A5FA);
        o.layers.forEach((l,li)=>{
          l.material.color.lerp(buyerBlue,intensity);
        });
      }
    });
  }else{
    // When equity mode is off, smoothly return split to zero
    let splitChanged=false;
    for(let pi=0;pi<PROJECTS.length;pi++){
      if(Math.abs(eqSplitCurrent[pi])>0.01){
        eqSplitCurrent[pi]*=0.92;
        splitChanged=true;
      }else{eqSplitCurrent[pi]=0;}
    }
    if(splitChanged){
      projGroups.forEach((g,pi)=>{g.position.y=pi*PROJ_SPACING*stackVal+eqSplitCurrent[pi];});
      spineMeshes.forEach(s=>{
        const posAttr=s.line.geometry.getAttribute('position');
        posAttr.setY(0,(s.pi-1)*PROJ_SPACING*stackVal+eqSplitCurrent[s.pi-1]);
        posAttr.setY(1,s.pi*PROJ_SPACING*stackVal+eqSplitCurrent[s.pi]);
        posAttr.needsUpdate=true;
      });
    }
  }

  rnd.render(scene,cam);
}
animate();
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;cam.aspect=W/H;cam.updateProjectionMatrix();rnd.setSize(W,H)});
</script>
</body>
