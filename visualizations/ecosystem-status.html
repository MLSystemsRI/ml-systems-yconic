const repos = STATE.repos || [];
const clean = repos.filter(r => r.isGit && r.status === 'clean' && r.ahead === 0);
const dirty = repos.filter(r => r.isGit && r.status === 'dirty');
const unpushed = repos.filter(r => r.isGit && r.ahead > 0);
const noGit = repos.filter(r => r.exists && !r.isGit);
const missing = repos.filter(r => !r.exists);

  <div class="summary-card"><div class="num" style="color:#22C55E">${clean.length}</div><p>Clean</p></div>

// Push queue

if (unpushed.length === 0) {
  pushEl.innerHTML = '<p style="font-size:11px;color:#5a566a;padding:8px 0">All repos in sync with remote.</p>';
} else {
  pushEl.innerHTML = unpushed.map(r => `
    <div class="push-item">
      <span>${r.name}</span>
      <span class="push-count">${r.ahead} commit${r.ahead > 1 ? 's' : ''} ahead</span>

}

  <div class="num">${STATE.pendingResearch}</div>
  <p>${STATE.pendingResearch === 0 ? 'No pending research files' : 'files waiting in Sal Research/'}</p>
`;

// Repo grid
function getStatusClass(r) {
  if (!r.exists) return 'missing';
  if (!r.isGit) return 'nogit';
  if (r.ahead > 0) return 'unpushed';
  if (r.status === 'dirty') return 'dirty';
  return 'clean';
}

function getStatusLabel(r) {
  if (!r.exists) return 'Missing';
  if (!r.isGit) return 'No Git';
  if (r.ahead > 0) return `${r.ahead} Unpushed`;
  if (r.status === 'dirty') return 'Uncommitted';
  return 'Clean';
}

document.getElementById('repoGrid').innerHTML = repos
  .sort((a, b) => {
    const order = { missing: 0, dirty: 1, unpushed: 2, nogit: 3, clean: 4 };
    return (order[getStatusClass(a)] || 4) - (order[getStatusClass(b)] || 4);
  })
  .map(r => {
    const sc = getStatusClass(r);
    const details = r.isGit ? `
      <div class="detail">
        <strong>Branch:</strong> <span class="val">${r.branch}</span><br>
        <strong>Last:</strong> <span class="val">${r.lastCommit}</span> ${r.lastCommitMsg || ''}<br>
        <strong>Date:</strong> ${r.lastCommitDate ? new Date(r.lastCommitDate).toLocaleDateString() : 'unknown'}<br>
        ${r.uncommitted > 0 ? `<strong>Modified:</strong> <span class="val">${r.uncommitted}</span> files<br>` : ''}
        ${r.untracked > 0 ? `<strong>Untracked:</strong> <span class="val">${r.untracked}</span> files<br>` : ''}
        ${r.hasRemote ? `<strong>Remote:</strong> ${r.ahead > 0 ? '<span class="val">↑' + r.ahead + '</span>' : ''}${r.behind > 0 ? ' <span class="val">↓' + r.behind + '</span>' : ''}${r.ahead === 0 && r.behind === 0 ? 'in sync' : ''}` : '<strong>Remote:</strong> none'}
      </div>
    ` : r.exists ? '<div class="detail">Directory exists, no git repo</div>' : '<div class="detail">Directory not found</div>';

    return `
      <div class="card card-border-${sc}">
        <div class="card-header">
          <h3>${r.name}</h3>
          <span class="badge badge-${sc}">${getStatusLabel(r)}</span>
        </div>
        ${details}
      </div>
    `;
  }).join('');
