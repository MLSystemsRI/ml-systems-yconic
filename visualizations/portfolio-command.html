function computeSnagCascade(phases){
  const stalled=new Set(),depths={};
  const allTasks={},depOf={};
  phases.forEach(ph=>{ph.t.forEach(t=>{allTasks[t.id]=t;t.dp.forEach(d=>{if(!depOf[d])depOf[d]=[];depOf[d].push(t.id)})})});
  const stalledPhases=new Set();
  SNAGS.forEach(s=>{
    if(!allTasks[s.task])return; // skip if task not in this project's phases
    stalled.add(s.task);depths[s.task]=0;
    const queue=[{id:s.task,depth:0}];
    while(queue.length){
      const{id,depth}=queue.shift();
      (depOf[id]||[]).forEach(did=>{
        if(!stalled.has(did)){stalled.add(did);depths[did]=depth+1;queue.push({id:did,depth:depth+1})}
      });
    }
    stalledPhases.add(s.phase);
  });
  phases.forEach(ph=>{
    if(ph.bb.some(b=>stalledPhases.has(b))){
      stalledPhases.add(ph.id);
      const maxD=Math.max(...Object.values(depths),0);
      ph.t.forEach(t=>{if(!stalled.has(t.id)){stalled.add(t.id);depths[t.id]=maxD+1}});
    }
  });
  return{stalled,depths,stalledPhases};
}

function cascadeColor(depth){
  if(depth<=1)return 0xff3030;
  if(depth===2)return 0xff6030;
  if(depth===3)return 0xffaa30;
  return 0xffd060;
}

// ═══════════════════ ENGINE (parameterized) ═══════════════════
function computeProj(phases){
  const pd={},ps={},pe={};
  const ids=new Set(phases.map(p=>p.id));
  phases.forEach(p=>{pd[p.id]=Math.round((p.dr[0]+p.dr[1])/2)});
  phases.forEach(p=>{
    const bb=p.bb.filter(b=>ids.has(b)&&pe[b]!==undefined);
    ps[p.id]=bb.length?Math.max(...bb.map(b=>pe[b]))+1:1;
    pe[p.id]=ps[p.id]+pd[p.id]-1;
  });
  const all=[];
  phases.forEach(ph=>{const pS=ps[ph.id],tm={};ph.t.forEach(t=>{tm[t.id]=t});const ls={};
    function g(i){if(ls[i]!==undefined)return ls[i];const t=tm[i];if(!t.dp.length){ls[i]=0;return 0}let m=0;t.dp.forEach(d=>{if(tm[d]){const e=g(d)+tm[d].d;if(e>m)m=e}});ls[i]=m;return m}
    ph.t.forEach(t=>{const l=g(t.id);all.push({pi:ph.id,ti:t.id,n:t.n,s:pS+l,e:pS+l+t.d-1,d:t.d,cp:t.cp,df:t.df,ai:t.ai})})});
  return{ps,pe,td:Math.max(...Object.values(pe)),all};
}

function buildRProj(phases,S){
  const DG={};S.all.forEach(t=>{for(let d=t.s;d<=t.e;d++){const k=d+'-'+t.pi;if(!DG[k])DG[k]=[];DG[k].push(t)}});
  const R=[];phases.forEach(ph=>{let c=null;
    for(let d=S.ps[ph.id];d<=S.pe[ph.id];d++){const tk=DG[d+'-'+ph.id]||[],n=tk.length;
      if(!n){if(c){R.push(c);c=null}continue}
      const sp=c&&(n>c.pk*2.5||n<c.av*0.3);
      if(!c||sp){if(c)R.push(c);c={pi:ph.id,ds:d,de:d,bd:{[d]:tk},pk:n,tot:n,dc:1,av:n,cp:tk.some(t=>t.cp),df:tk.some(t=>t.df),ai:tk.some(t=>t.ai),ids:new Set(tk.map(t=>t.ti))}}
      else{c.de=d;c.bd[d]=tk;c.pk=Math.max(c.pk,n);c.tot+=n;c.dc++;c.av=c.tot/c.dc;if(tk.some(t=>t.cp))c.cp=1;if(tk.some(t=>t.df))c.df=1;if(tk.some(t=>t.ai))c.ai=1;tk.forEach(t=>c.ids.add(t.ti))}}
    if(c)R.push(c)});
  R.forEach(r=>{r.ut=[];const s=new Set();for(let d=r.ds;d<=r.de;d++){(r.bd[d]||[]).forEach(t=>{if(!s.has(t.ti)){s.add(t.ti);r.ut.push(t)}})}r.int=r.av});
  const mx=Math.max(...R.map(r=>r.int),1);R.forEach(r=>{r.br=0.12+(r.int/mx)*0.88});return R;
}

// ═══════════════════ WIFI WEB (per-project Z-lane) ═══════════════════
const wifiMeshes=[];const wifiSparks=[];
function makeBoltCurveWifi(p1,p2,segs,jAmt){
  const pts=[];for(let s=0;s<=segs;s++){const f=s/segs;const p=new THREE.Vector3().lerpVectors(p1,p2,f);
    if(s>0&&s<segs){p.x+=(Math.random()-0.5)*jAmt;p.y+=(Math.random()-0.5)*jAmt;p.z+=(Math.random()-0.5)*jAmt*0.3;}
    pts.push(p);}return new THREE.CatmullRomCurve3(pts);
}

// ═══════════════════ LATERAL WEB (cross-lane same-phase connections) ═══════════════════
const lateralMeshes=[];const lateralSparks=[];
function buildLateralWeb(){
  // For each phase present in multiple projects, connect same-phase nodes across Z-lanes
  const phaseIds=new Set();
  projects.forEach(proj=>{proj.phases.forEach(ph=>{phaseIds.add(ph.id)})});
  phaseIds.forEach(phId=>{
    // Collect projects that have this phase
    const projs=projects.filter(p=>p.phases.some(ph=>ph.id===phId));
    if(projs.length<2)return;
    // Connect every adjacent pair (sorted by Z for clean lateral lines)
    const sorted=[...projs].sort((a,b)=>a.baseZ-b.baseZ);
    for(let i=0;i<sorted.length-1;i++){
      const pA=sorted[i],pB=sorted[i+1];
      const xA=PX[phId],yA=dY((pA.S.ps[phId]+pA.S.pe[phId])/2),zA=pA.z;
      const xB=PX[phId],yB=dY((pB.S.ps[phId]+pB.S.pe[phId])/2),zB=pB.z;
      // Lightning bolt curve between same phase across lanes
      const mainCurve=makeBoltCurveWifi(
        new THREE.Vector3(xA,yA,zA),
        new THREE.Vector3(xB,yB,zB),
        8,0.15
      );
      // Core bolt (white)
      const core=new THREE.Mesh(new THREE.TubeGeometry(mainCurve,16,0.004,4,false),
        new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.45,blending:THREE.AdditiveBlending,depthWrite:false}));
      scene.add(core);lateralMeshes.push(core);
      // Glow (yellow #FFE500)
      const glow=new THREE.Mesh(new THREE.TubeGeometry(mainCurve,16,0.020,4,false),
        new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.054,blending:THREE.AdditiveBlending,depthWrite:false}));
      scene.add(glow);lateralMeshes.push(glow);
      // 2 fork tendrils per lateral connection
      for(let f=0;f<2;f++){
        const ft=0.2+Math.random()*0.6;const fStart=mainCurve.getPoint(ft);
        const fLen=0.15+Math.random()*0.25;const side=Math.random()>0.5?1:-1;
        const fEnd=new THREE.Vector3(
          fStart.x+(Math.random()-0.5)*fLen*0.3,
          fStart.y+side*fLen*0.5,
          fStart.z+(Math.random()-0.5)*fLen
        );
        const fCurve=makeBoltCurveWifi(fStart,fEnd,4,0.1);
        const fMesh=new THREE.Mesh(new THREE.TubeGeometry(fCurve,8,0.002,3,false),
          new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending,depthWrite:false}));
        scene.add(fMesh);lateralMeshes.push(fMesh);
      }
      // Traveling spark on lateral bolt
      const spGeo=new THREE.SphereGeometry(0.012,6,6);
      const sp=new THREE.Mesh(spGeo,new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending}));
      sp.userData={curve:mainCurve,t:Math.random(),speed:0.002+Math.random()*0.003,rSeed:Math.random()*100,isLateral:true};
      sp.position.copy(mainCurve.getPoint(sp.userData.t));scene.add(sp);lateralSparks.push(sp);
      const spG=new THREE.Mesh(spGeo,new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending}));
      spG.scale.setScalar(3);spG.position.copy(sp.position);spG.userData={parent:sp};scene.add(spG);lateralSparks.push(spG);
    }
    // Also connect non-adjacent pairs for full webbing (skip 1 connections)
    for(let i=0;i<sorted.length;i++){
      for(let j=i+2;j<sorted.length;j++){
        const pA=sorted[i],pB=sorted[j];
        const xA=PX[phId],yA=dY((pA.S.ps[phId]+pA.S.pe[phId])/2),zA=pA.z;
        const xB=PX[phId],yB=dY((pB.S.ps[phId]+pB.S.pe[phId])/2),zB=pB.z;
        const mainCurve=makeBoltCurveWifi(
          new THREE.Vector3(xA,yA,zA),
          new THREE.Vector3(xB,yB,zB),
          10,0.2
        );
        // Thinner core for long-range connections
        const core=new THREE.Mesh(new THREE.TubeGeometry(mainCurve,16,0.003,4,false),
          new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.3,blending:THREE.AdditiveBlending,depthWrite:false}));
        scene.add(core);lateralMeshes.push(core);
        const glow=new THREE.Mesh(new THREE.TubeGeometry(mainCurve,16,0.016,4,false),
          new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.035,blending:THREE.AdditiveBlending,depthWrite:false}));
        scene.add(glow);lateralMeshes.push(glow);
        // 1 fork tendril for long-range
        const ft=0.3+Math.random()*0.4;const fStart=mainCurve.getPoint(ft);

// ═══════════════════ SEMANTIC SPINES (inter-lane Z connections) ═══════════════════
const spineMeshes=[];const spineSparks=[];
function getSpineRelation(phaseId,piA,piB){
  const projA=projects[piA],projB=projects[piB];
  if(!projA||!projB)return{type:'none',color:0x22d3ee,op:0.06};
  const aComplete=phaseId<=projA.currentPhase,bComplete=phaseId<=projB.currentPhase;
  const aHasPhase=projA.phases.some(p=>p.id===phaseId),bHasPhase=projB.phases.some(p=>p.id===phaseId);
  if(!aHasPhase||!bHasPhase)return null;
  // Pain: snag phase or 2+ unresolved punch items
  const unresPunch=PUNCH_LIST.filter(p=>!p.resolved&&p.phase===phaseId).length;
  const isSnagPhase=SNAGS.some(s=>s.phase===phaseId);
  if(isSnagPhase||unresPunch>=2)return{type:'pain',color:0xff3030,op:0.5,speed:0.008};
  // Credit: DfD>=2 or CP>=4 and both completed
  if(aComplete&&bComplete){
    const phData=BP.find(p=>p.id===phaseId);
    if(phData){const dfdC=phData.t.filter(t2=>t2.df).length;const cpC=phData.t.filter(t2=>t2.cp).length;
      if(dfdC>=2||cpC>=4)return{type:'credit',color:0xFFD700,op:0.45,speed:0.004};}
  }
  // Milestone: both completed
  if(aComplete&&bComplete)return{type:'milestone',color:0x22c55e,op:0.35,speed:0.003};
  // Partial: one completed
  if(aComplete||bComplete)return{type:'partial',color:0x22c55e,op:0.12,speed:0.002};
  // None: dim cyan
  return{type:'none',color:0x22d3ee,op:0.06,speed:0.001};
}
// Build spines between adjacent project lanes
for(let pi=0;pi<projects.length-1;pi++){
  const pA=projects[pi],pB=projects[pi+1];
  const commonPhases=pA.phases.filter(p=>pB.phases.some(p2=>p2.id===p.id));
  commonPhases.forEach(ph=>{
    const rel=getSpineRelation(ph.id,pi,pi+1);
    if(!rel)return;
    const ax=PX[ph.id],ay=dY((pA.S.ps[ph.id]+pA.S.pe[ph.id])/2),az=pA.z;
    const bx=PX[ph.id],by=dY((pB.S.ps[ph.id]+pB.S.pe[ph.id])/2),bz=pB.z;
    const mid=new THREE.Vector3(ax,(ay+by)/2,(az+bz)/2);
    const curve=new THREE.CatmullRomCurve3([new THREE.Vector3(ax,ay,az),mid,new THREE.Vector3(bx,by,bz)]);
    // Glow tube
    const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,12,rel.type==='pain'?0.035:rel.type==='credit'?0.03:0.018,6,false),
      new THREE.MeshBasicMaterial({color:rel.color,transparent:true,opacity:rel.op,blending:THREE.AdditiveBlending,depthWrite:false}));
    tube.userData={spineType:rel.type,projA:pi,projB:pi+1,phaseId:ph.id};
    scene.add(tube);spineMeshes.push(tube);
    // Outer glow
    const outerR=rel.type==='pain'?0.12:rel.type==='credit'?0.10:0.06;
    const outer=new THREE.Mesh(new THREE.TubeGeometry(curve,12,outerR,6,false),
      new THREE.MeshBasicMaterial({color:rel.color,transparent:true,opacity:rel.op*0.15,blending:THREE.AdditiveBlending,depthWrite:false}));
    outer.userData={spineType:rel.type};scene.add(outer);spineMeshes.push(outer);
    // Pulse spark
    if(rel.speed){
      const spGeo=new THREE.SphereGeometry(0.025,6,6);
      const sp=new THREE.Mesh(spGeo,new THREE.MeshBasicMaterial({color:rel.color,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending}));
      sp.userData={curve,t:Math.random(),speed:rel.speed,spineType:rel.type};
      sp.position.copy(curve.getPoint(sp.userData.t));scene.add(sp);spineSparks.push(sp);
      const sg=new THREE.Mesh(spGeo,new THREE.MeshBasicMaterial({color:rel.color,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending}));
      sg.scale.setScalar(2.5);sg.position.copy(sp.position);sg.userData={parent:sp};scene.add(sg);spineSparks.push(sg);
    }
  });

const jumpArcs=[];const jumpArcSparks=[];
function makeBoltCurve(p1,p2,segs,jAmt){
  const pts=[];
  for(let s=0;s<=segs;s++){const f=s/segs;const p=new THREE.Vector3().lerpVectors(p1,p2,f);
    if(s>0&&s<segs){p.x+=(Math.random()-0.5)*jAmt;p.y+=(Math.random()-0.5)*jAmt;p.z+=(Math.random()-0.5)*jAmt*0.4;}
    pts.push(p);}
  return new THREE.CatmullRomCurve3(pts);
}
function addBoltTubes(curve,radius,opacity,hasCorona){
  const core=new THREE.Mesh(new THREE.TubeGeometry(curve,20,radius,4,false),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:opacity,blending:THREE.AdditiveBlending,depthWrite:false}));
  core.visible=false;core.userData={baseOp:opacity,isBolt:true};scene.add(core);jumpArcs.push(core);
  const glow=new THREE.Mesh(new THREE.TubeGeometry(curve,20,radius*5,4,false),
    new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:opacity*0.12,blending:THREE.AdditiveBlending,depthWrite:false}));
  glow.visible=false;glow.userData={baseOp:opacity*0.12};scene.add(glow);jumpArcs.push(glow);
  if(hasCorona){const corona=new THREE.Mesh(new THREE.TubeGeometry(curve,20,radius*15,4,false),
    new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:opacity*0.025,blending:THREE.AdditiveBlending,depthWrite:false}));
    corona.visible=false;corona.userData={baseOp:opacity*0.025};scene.add(corona);jumpArcs.push(corona);}
}
function buildJumpArcs(){
  projects.forEach(proj=>{
    const z=proj.z;
    const pIds=new Set(proj.phases.map(p=>p.id));
    PHASE_JUMPS.forEach(j=>{
      if(!pIds.has(j.from)||!pIds.has(j.to))return;
      if(!proj.S.pe[j.from]||!proj.S.ps[j.to])return;
      const xA=PX[j.from],xB=PX[j.to];
      const yA=dY(proj.S.pe[j.from]),yB=dY(proj.S.ps[j.to]);
    const midY=Math.max(yA,yB)+1.2;
    // ── Main arced bolt ──
    const mainPts=[];const segs=14;
    for(let s=0;s<=segs;s++){const f=s/segs;
      const bx=xA+(xB-xA)*f;const by=yA+(midY-yA)*4*f*(1-f)+(yB-yA)*f;
      const bz=z+(s===0||s===segs?0:(Math.random()-0.5)*0.5);
      const jit=s===0||s===segs?0:(Math.random()-0.5)*0.4;
      mainPts.push(new THREE.Vector3(bx+jit*0.3,by+jit*0.4,bz));}
    const mainCurve=new THREE.CatmullRomCurve3(mainPts);
    addBoltTubes(mainCurve,0.008,0.9,true);
    // 1 traveling spark (back-and-forth on main bolt)
    const spk=new THREE.Mesh(new THREE.SphereGeometry(0.015,6,6),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.95,blending:THREE.AdditiveBlending}));
    spk.userData={curve:mainCurve,t:0,speed:0.035+Math.random()*0.03,dir:1,isLightning:true};
    spk.visible=false;scene.add(spk);jumpArcSparks.push(spk);
    const spkG=new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6),new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.4,blending:THREE.AdditiveBlending}));
    spkG.userData={parent:spk};spkG.visible=false;scene.add(spkG);jumpArcSparks.push(spkG);
    // ── L1 branches (5-7 forking off main bolt) ──
    const numL1=5+Math.floor(Math.random()*3);
    for(let b=0;b<numL1;b++){
      const bt=0.08+Math.random()*0.84;const bStart=mainCurve.getPoint(bt);const tang=mainCurve.getTangent(bt);
      const side=Math.random()>0.5?1:-1;const bLen=0.3+Math.random()*0.7;
      const bEnd=new THREE.Vector3(bStart.x+tang.x*bLen*0.2+(Math.random()-0.5)*bLen*0.8,
        bStart.y+side*bLen*(0.4+Math.random()*0.5),bStart.z+(Math.random()-0.5)*bLen*0.3);
      // Fork glow at branch point
      const fg=new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6),
        new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending}));
      fg.position.copy(bStart);fg.visible=false;fg.userData={isFork:true,baseOp:0.6};scene.add(fg);jumpArcs.push(fg);
      const l1Curve=makeBoltCurve(bStart,bEnd,6,0.25);
      addBoltTubes(l1Curve,0.004,0.5,false);
      // ── L2 sub-branches (0-2 per L1) ──
      const numL2=Math.floor(Math.random()*3);
      for(let s2=0;s2<numL2;s2++){
        const st2=0.25+Math.random()*0.5;const sStart=l1Curve.getPoint(st2);
        const sLen=0.15+Math.random()*0.3;
        const sEnd=new THREE.Vector3(sStart.x+(Math.random()-0.5)*sLen,sStart.y+(Math.random()-0.5)*sLen,sStart.z+(Math.random()-0.5)*sLen*0.3);
        const l2Curve=makeBoltCurve(sStart,sEnd,3,0.15);
        addBoltTubes(l2Curve,0.002,0.25,false);
        // ── L3 wisps (finest tendrils, 50% chance) ──
        if(Math.random()>0.5){const wt=0.4+Math.random()*0.4;const wStart=l2Curve.getPoint(wt);const wLen=0.1+Math.random()*0.15;
          const wEnd=new THREE.Vector3(wStart.x+(Math.random()-0.5)*wLen,wStart.y+(Math.random()-0.5)*wLen,wStart.z+(Math.random()-0.5)*wLen*0.2);
          const l3Curve=makeBoltCurve(wStart,wEnd,2,0.1);addBoltTubes(l3Curve,0.001,0.15,false);}
      }
    }
  });
  });
}

  const tip=document.getElementById('tip');tip.innerHTML=h;tip.classList.add('visible');

// ═══════════════════ ANIMATE ═══════════════════
const clk=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);const t=clk.getElapsedTime();

  // Orbital camera
  const ang=camOrbit+(dragging?0:t*0.03);
  cam.position.x=Math.sin(ang)*Math.cos(camTilt)*camDist;
  cam.position.y=Math.sin(camTilt)*camDist+3;
  cam.position.z=Math.cos(ang)*Math.cos(camTilt)*camDist;
  cam.lookAt(tgt);

  topLight.intensity=0.7+Math.sin(t*0.8)*0.08;

  // Aura breathing
  orbAnims.forEach((o,i)=>{
    const{layers,hit,r,rad,bx,by,bz,b,seed,aiCore,aiLight,cpCore,nMesh,nMat,fMat}=o;
    const sx=fnoise(t*0.3,seed)*0.2,sy=fnoise(t*0.45,seed+7)*0.12;
    hit.position.x=bx+sx;hit.position.y=by+sy;

    const hMul=hit.userData.hovered?1.6:1;
    const hAge=hit.userData.hovered?t-hit.userData.hoverStart:0;
    const hBloom=hit.userData.hovered?1+Math.max(0,0.4-hAge*0.7):1;
    const cpB=1+r.cpRatio*0.4,aiR=1+r.aiRatio*0.5;
    const bS=[0.35,0.7,1.2,1.9],bO=GL.map(gl=>b*gl.op);

    layers.forEach((l,li)=>{
      l.material.color.copy(o.origColors[li]);
      const br=fnoise(t*0.4*aiR,seed+li*2.3);
      l.scale.setScalar(rad*bS[li]*(1+br*(0.04+li*0.02)*cpB)*hBloom);
      if(!cpM&&!aiM)l.material.opacity=bO[li]*(1+br*0.2)*hMul;
      const dr=li*0.03;
      l.position.x=bx+sx+fnoise(t*0.5+li*2,seed+i)*dr;
      l.position.y=by+sy+fnoise(t*0.4+li*1.8,seed+i+5)*dr;
      l.position.z=bz+fnoise(t*0.35+li*2.5,seed+i+10)*dr*0.5;
    });

    if(aiCore){const p=0.55+Math.sin(t*2.2*aiR+seed)*0.45;
      aiCore.scale.setScalar((rad*0.18+r.aiRatio*0.12)*(1+p*0.15)*hBloom);
      aiCore.material.opacity=r.aiRatio*(0.4+p*0.35)*(aiM?1.5:1);
      aiCore.position.set(bx+sx,by+sy,bz);
      if(aiLight){aiLight.intensity=r.aiRatio*(0.35+p*0.4)*(aiM?2:1);aiLight.position.set(bx+sx,by+sy,bz)}}
    if(cpCore){const w=0.65+Math.sin(t*1.1+seed*0.5)*0.35;
      cpCore.scale.setScalar((rad*0.25+r.cpRatio*0.15)*(1+w*0.1*cpB));cpCore.material.opacity=(0.3+r.cpRatio*0.35)*w*(cpM?1.8:1);
      cpCore.position.set(bx+sx,by+sy,bz)}
    if(nMat){nMat.uniforms.uTime.value=t;nMesh.position.set(bx+sx,by+sy,bz)}
    if(fMat){fMat.uniforms.uPulse.value=(0.85+fnoise(t*0.55,seed+20)*0.15)*hMul*hBloom}
    // ── SNAG: stalled/moving visual modifications (project 0 only) ──
    if(o._snagAllStalled){
      // Red ripple wave — layers expand outward in sequence
      layers.forEach((layer,li)=>{
        const wave=Math.sin(t*4-li*1.2+seed*0.1); // wave travels outward through layers
        const ripple=Math.max(0,wave)*0.3;
        layer.scale.setScalar(rad*bS[li]*(1+ripple));
        layer.material.color.lerp(new THREE.Color(0xff2020),0.02+ripple*0.08);
        layer.material.opacity=bO[li]*(0.2+Math.abs(wave)*0.5);
      });
      if(nMat){nMat.uniforms.uNoiseAmp.value=0.15+Math.sin(t*3)*0.15;nMat.uniforms.uColor.value.lerp(new THREE.Color(0xff3030),0.02)}
      if(fMat){fMat.uniforms.uColor.value.lerp(new THREE.Color(0xff2020),0.04);fMat.uniforms.uPulse.value=0.4+Math.abs(Math.sin(t*2))*0.8}
    }else if(o._snagStalled){
      // Partial stall — outer layers pulse red gently
      const pulse=0.5+Math.sin(t*2.5+seed)*0.5;
      layers.forEach((layer,li)=>{if(li>=2){layer.material.color.lerp(new THREE.Color(0xff4040),0.01+pulse*0.01)}});
    }
    // ── Dark fighting nodes: phases beyond currentPhase ──
    if(o.dimFactor<1&&!o._snagAllStalled){
      const fight=Math.pow(Math.max(0,Math.sin(t*2.0+seed*0.7)),8);
      const flicker=Math.random()>0.97?0.4:0;
      const intensity=fight*0.2+flicker;
      layers.forEach((l,li)=>{
        l.material.color.lerp(o.origColors[li],intensity);
        l.material.opacity=[0.25,0.15,0.06,0.02][li]+intensity*0.3;
      });
      if(fMat)fMat.uniforms.uPulse.value=0.08+fight*0.6+flicker*0.4;
      if(nMat)nMat.uniforms.uNoiseAmp.value=0.35+fight*0.15;
    }
  });

  // ── CP Mode animations ──
  if(cpMode===1){
    // Highway: spark flow along tubes
    cpHighwaySparks.forEach(s=>{
      if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=0.6+Math.sin(t*4+s.userData.t*10)*0.35}
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
  }
  if(cpMode===2){
    // Heat: color lerp toward gold based on CP ratio
    const gold=new THREE.Color(0xffd080),cool=new THREE.Color(0x1a1a3a);
    orbAnims.forEach(o=>{
      const cpRatio=o.r.ut.filter(t2=>t2.cp).length/Math.max(o.r.ut.length,1);
      const bOps=GL.map(gl=>o.b*gl.op);
      o.layers.forEach((l,li)=>{
        l.material.color.copy(o.origColors[li]).lerp(cpRatio>0.3?gold:cool,cpRatio>0.3?cpRatio*0.6:0.4);
        l.material.opacity=bOps[li]*(0.1+cpRatio*2.5);
      });
    });
  }
  if(cpMode===3){
    // Pulse: golden wave sweeps along X axis
    const xMin=orbAnims.reduce((m,o)=>Math.min(m,o.bx),Infinity);
    const xMax=orbAnims.reduce((m,o)=>Math.max(m,o.bx),-Infinity);
    const xRange=xMax-xMin||1;
    const wavePos=((t*0.3)%1); // 0..1 sweeping left to right
    const gold2=new THREE.Color(0xffd080);
    orbAnims.forEach(o=>{
      const normX=(o.bx-xMin)/xRange;
      const dist=Math.abs(normX-wavePos);
      const wave=Math.max(0,1-dist*4); // sharp falloff
      const bOps=GL.map(gl=>o.b*gl.op);
      if(o.r.cp){
        o.layers.forEach((l,li)=>{
          l.material.opacity=bOps[li]*(0.15+wave*2.5);
          if(wave>0.1)l.material.color.copy(o.origColors[li]).lerp(gold2,wave*0.7);
        });
      }else{
        o.layers.forEach((l,li)=>{l.material.opacity=bOps[li]*0.04});
      }
    });
  }
  if(cpMode===4){
    // Reveal: CP regions lift up, non-CP sink down (smooth interpolation)
    orbAnims.forEach(o=>{
      const targetY=o.r.cp?2.5:-2;
      if(o._cpRevealY===undefined)o._cpRevealY=0;
      o._cpRevealY+=(targetY-o._cpRevealY)*0.04; // smooth lerp
      const bOps=GL.map(gl=>o.b*gl.op);
      o.layers.forEach((l,li)=>{
        l.position.y+=o._cpRevealY;
        l.material.opacity=o.r.cp?bOps[li]*2.0:bOps[li]*0.08;
      });
      if(o.hit)o.hit.position.y+=o._cpRevealY;
      if(o.aiCore)o.aiCore.position.y+=o._cpRevealY;
      if(o.aiLight)o.aiLight.position.y+=o._cpRevealY;
      if(o.cpCore)o.cpCore.position.y+=o._cpRevealY;
      if(o.nMesh)o.nMesh.position.y+=o._cpRevealY;
    });
  }

  // Sparks
  sparks.forEach(s=>{if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=0.6+Math.sin(t*4+s.userData.t*10)*0.35}
  else if(s.userData.parent)s.position.copy(s.userData.parent.position)});

  grnd.material.emissiveIntensity=0.012+Math.sin(t*0.35)*0.005;

  // ── Snag cascade sparks + punch list ──
  if(snagM){
    snagSparks2.forEach(s=>{
      if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=.6+Math.sin(t*5+s.userData.t*12)*.35}
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
    punchOrbs.forEach(o=>{
      if(o.userData.pl){
        const a=t*o.userData.speed+o.userData.angle;
        o.position.x=o.userData.cx+Math.cos(a)*o.userData.orbitR;
        o.position.y=o.userData.cy+Math.sin(a)*o.userData.orbitR*0.5;
        o.position.z=o.userData.z;
        if(!o.userData.pl.resolved)o.material.opacity=0.55+Math.sin(t*3+o.userData.angle)*0.35;
      }else if(o.userData.parentOrb)o.position.copy(o.userData.parentOrb.position);
    });
  }

  // ── Phase Jump: branching lightning flicker ──
  if(jumpM){
    // Global re-strike flash (occasional bright burst like real lightning)
    const strike=Math.sin(t*8)>0.92?1.6:1.0;
    jumpArcs.forEach(m=>{if(m.visible){
      const base=m.userData.baseOp||0.5;
      if(m.userData.isBolt){m.material.opacity=base*(0.65+Math.random()*0.35)*strike;}
      else if(m.userData.isFork){m.material.opacity=base*(Math.random()>0.25?1.0:0.15)*strike;}
      else{m.material.opacity=base*(0.5+Math.random()*0.5)*strike;}
    }});
    // Traveling spark (back-and-forth on main bolt)
    jumpArcSparks.forEach(s=>{
      if(s.userData.curve){
        s.userData.t+=s.userData.speed*s.userData.dir;
        if(s.userData.t>1){s.userData.t=1;s.userData.dir=-1;}
        else if(s.userData.t<0){s.userData.t=0;s.userData.dir=1;}
        s.position.copy(s.userData.curve.getPoint(s.userData.t));
        s.material.opacity=Math.random()>0.8?1.0:0.5+Math.random()*0.4;
        s.position.y+=(Math.random()-0.5)*0.4;
      }else if(s.userData.parent)s.position.copy(s.userData.parent.position);
    });
    orbAnims.forEach(oa=>{if(oa._jumpHighlight)oa.layers.forEach((l,li)=>{if(li>=2)l.material.color.lerp(new THREE.Color(0xFFE500),0.01)})});
  }
  // ── Proj Intel node pulse + strand sparks ──
  if(aiM){
    const aiPulse=1+Math.sin(t*1.5)*0.1;
    aiNodeCore.scale.setScalar(1.0*aiPulse);
    aiNodeGlow.scale.setScalar(1.8*(1+Math.sin(t*0.8)*0.06));
    aiNodeCorona.scale.setScalar(3.0*(1+Math.sin(t*0.5)*0.04));
    aiNodeLight.intensity=1.0+Math.sin(t*1.5)*0.25;
    aiStrandSparks.forEach(s=>{
      if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=0.5+Math.sin(t*3+s.userData.t*8)*0.35}
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
  }

  // ── Wifi Web flicker ──
  const wifiStrike=Math.sin(t*6)>0.9?1.4:1.0;
  wifiMeshes.forEach((m,mi)=>{
    const baseOp=m.userData._baseOp||(m.userData._baseOp=m.material.opacity);
    const rFlick=Math.random()>0.95?0.3:0;
    m.material.opacity=baseOp*(0.7+Math.sin(t*3+mi*0.7)*0.3)*wifiStrike+rFlick*baseOp;
  });
  wifiSparks.forEach(s=>{
    if(s.userData.curve){
      s.userData.t=(s.userData.t+s.userData.speed)%1;
      s.position.copy(s.userData.curve.getPoint(s.userData.t));
      s.material.opacity=(0.4+Math.sin(t*5+s.userData.rSeed)*0.35)*wifiStrike;
    }else if(s.userData.parent)s.position.copy(s.userData.parent.position);
  });

  // ── Lateral Web flicker (matches wifi web timing) ──
  lateralMeshes.forEach((m,mi)=>{
    const baseOp=m.userData._baseOp||(m.userData._baseOp=m.material.opacity);
    const rFlick=Math.random()>0.95?0.3:0;
    m.material.opacity=baseOp*(0.7+Math.sin(t*3+mi*0.9)*0.3)*wifiStrike+rFlick*baseOp;
  });
  lateralSparks.forEach(s=>{
    if(s.userData.curve){
      s.userData.t=(s.userData.t+s.userData.speed)%1;
      s.position.copy(s.userData.curve.getPoint(s.userData.t));
      s.material.opacity=(0.4+Math.sin(t*5+s.userData.rSeed)*0.35)*wifiStrike;
    }else if(s.userData.parent)s.position.copy(s.userData.parent.position);
  });

  // ── Semantic Spine pulses ──
  spineSparks.forEach(s=>{
    if(s.userData.curve){
      s.userData.t=(s.userData.t+s.userData.speed)%1;
      s.position.copy(s.userData.curve.getPoint(s.userData.t));
      if(s.userData.spineType==='pain')s.material.opacity=0.6+Math.sin(t*6+s.userData.t*12)*0.35;
      else if(s.userData.spineType==='credit')s.material.opacity=0.5+Math.sin(t*3+s.userData.t*8)*0.4;
      else if(s.userData.spineType==='milestone')s.material.opacity=0.4+Math.sin(t*1.5+s.userData.t*6)*0.3;
      else s.material.opacity=0.3+Math.sin(t*2+s.userData.t*4)*0.2;
    }else if(s.userData.parent)s.position.copy(s.userData.parent.position);
  });
  // Spine tube breathing
  spineMeshes.forEach(m=>{
    if(m.userData.spineType==='pain'){m.material.opacity=0.35+Math.sin(t*4)*0.15;}
    else if(m.userData.spineType==='credit'){m.material.opacity=0.3+Math.sin(t*2)*0.15+Math.sin(t*7)*0.05;}
    else if(m.userData.spineType==='milestone'){m.material.opacity=0.25+Math.sin(t*1.2)*0.1;}
  });

  // ── Collapse slider: reposition all Z-dependent objects ──
  // (We update proj.z in onCollapse; here we lerp orb positions toward new Z)
  orbAnims.forEach(o=>{
    const proj=projects[o.projIdx];
    const targetZ=proj.z;
    // Smoothly interpolate bz toward target
    o.bz+=(targetZ-o.bz)*0.08;
    // Update hit, layers, cores, etc. z positions
    o.hit.position.z=o.bz;
    o.layers.forEach(l=>{l.position.z=o.bz});
    if(o.nMesh)o.nMesh.position.z=o.bz;
    if(o.aiCore)o.aiCore.position.z=o.bz;
    if(o.aiLight)o.aiLight.position.z=o.bz;
    if(o.cpCore)o.cpCore.position.z=o.bz;
  });

  // ── Equity Transfer mode ──
  if(equityM){
    // Shift seller (0,1) toward camera, buyer (2,3) away
    const eqSep=3.0;
    projects.forEach((proj,pi)=>{
      const shift=pi<2?-eqSep:eqSep;
      proj.z+=(proj.baseZ*stackVal+shift-proj.z)*0.04;
    });
    // Coronas pulse
    equityCoronas.forEach(c=>{
      const p=1+Math.sin(t*1.8+c.userData.projIdx*1.5)*0.15;
      c.scale.setScalar(c.userData.baseRad*p);
      c.position.z=projects[c.userData.projIdx].z;
      // Gold tint for completed projects, buyer blue for future dark nodes
      if(c.userData.projIdx<2){c.material.color.setHex(0xFFD700);c.material.opacity=0.12+Math.sin(t*2)*0.04;}
      else{c.material.color.setHex(0x60a5fa);c.material.opacity=0.08+Math.sin(t*2.5)*0.03;}
    });
    // Summary orb pulse
    const sPulse=1+Math.sin(t*1.2)*0.12;
    summaryOrb.scale.setScalar((0.5+avgCompletion*0.8)*sPulse);
    summaryOrb.material.opacity=0.3+Math.sin(t*1.5)*0.1;
    summaryGlow.scale.setScalar((1.0+avgCompletion*1.2)*(1+Math.sin(t*0.8)*0.06));
    // Cash flow sparks
    equitySparks.forEach(s=>{
      if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=0.5+Math.sin(t*4+s.userData.t*10)*0.35}
      else if(s.userData.parent)s.position.copy(s.userData.parent.position);
    });
    // Dark nodes: completed → gold tint, future → fight with buyer blue
    orbAnims.forEach(o=>{
      if(o.dimFactor<1&&o.projIdx>=2){
        // Buyer future nodes: fight with blue tint
        const fight=Math.pow(Math.max(0,Math.sin(t*2.5+o.seed*0.5)),6);
        o.layers.forEach((l,li)=>{l.material.color.lerp(new THREE.Color(0x60a5fa),fight*0.15)});
      }else if(o.dimFactor>=1&&o.projIdx<2){
        // Seller completed nodes: gold tint
        o.layers.forEach((l,li)=>{l.material.color.lerp(new THREE.Color(0xFFD700),0.015)});
      }
    });
    // Position equity labels
    const eqL=document.getElementById('eqLabels');
    const sPos=new THREE.Vector3(OX-2,OY+2,projects[0].z);sPos.project(cam);
    const bPos=new THREE.Vector3(OX-2,OY+2,projects[2].z);bPos.project(cam);
    const sl=document.getElementById('eqSeller');sl.style.left=((sPos.x+1)/2*W)+'px';sl.style.top=((-sPos.y+1)/2*H)+'px';
    const bl=document.getElementById('eqBuyer');bl.style.left=((bPos.x+1)/2*W)+'px';bl.style.top=((-bPos.y+1)/2*H)+'px';
  }

  rnd.render(scene,cam);
}
animate();
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;cam.aspect=W/H;cam.updateProjectionMatrix();rnd.setSize(W,H)});
</script>
</body>
</html>
