}
const sG=new THREE.BufferGeometry();sG.setAttribute('position',new THREE.BufferAttribute(sP,3));sG.setAttribute('color',new THREE.BufferAttribute(sC,3));
scene.add(new THREE.Points(sG,new THREE.PointsMaterial({size:0.25,vertexColors:true,sizeAttenuation:true})));

// ═══ NEBULA ═══
function nebula(color,x,y,z,sz,op){
  const cv=document.createElement('canvas');cv.width=cv.height=256;const cx=cv.getContext('2d');
  const g=cx.createRadialGradient(128,128,0,128,128,128);g.addColorStop(0,color);g.addColorStop(.5,color.replace(')',',0.3)').replace('rgb','rgba'));g.addColorStop(1,'transparent');
  cx.fillStyle=g;cx.fillRect(0,0,256,256);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false}));
  s.position.set(x,y,z);s.scale.set(sz,sz,1);scene.add(s);
}
nebula('rgb(34,197,94)',-25,8,-30,40,.08);nebula('rgb(96,165,250)',20,-6,-35,50,.06);
nebula('rgb(249,115,22)',-10,-12,-25,30,.05);nebula('rgb(20,184,166)',8,10,-28,35,.06);

// ═══ BUILD NODES ═══
const nodeMap = {};
const nodeMeshes = [];
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

NODES.forEach(n => {
  const group = new THREE.Group();
  group.position.set(n.x, n.y, n.z);

  // Sphere
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(n.size, 32, 32),
    new THREE.MeshStandardMaterial({
      color: n.color, emissive: n.color,
      emissiveIntensity: n.id === 'ml' ? 2.0 : 1.2,
      roughness: 0.2, metalness: 0.1
    })
  );
  group.add(sphere);

  // Glow shell
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(n.size * 1.6, 8, 8),
    new THREE.MeshBasicMaterial({ color: n.color, transparent: true, opacity: 0.1, blending: THREE.AdditiveBlending, depthWrite: false })
  );
  group.add(glow);

  // Atmosphere
  const atmo = new THREE.Mesh(
    new THREE.SphereGeometry(n.size * 2.8, 12, 12),
    new THREE.MeshBasicMaterial({ color: n.color, transparent: true, opacity: 0.03, blending: THREE.AdditiveBlending, depthWrite: false })
  );
  group.add(atmo);

  // Label sprite
  const lines = n.label.split('\n');
  const cv = document.createElement('canvas'); cv.width = 256; cv.height = 48 * lines.length;
  const cx = cv.getContext('2d');
  cx.font = '700 28px system-ui, sans-serif';
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillStyle = '#' + n.color.toString(16).padStart(6, '0');
  lines.forEach((line, li) => cx.fillText(line, 128, 24 + li * 44));
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true }));
  sprite.position.set(0, n.size + 1.0 + (lines.length - 1) * 0.3, 0);
  sprite.scale.set(3.5, 1.0 * lines.length, 1);
  group.add(sprite);

  scene.add(group);
  nodeMap[n.id] = { group, sphere, glow, atmo, sprite, data: n };
  nodeMeshes.push({ mesh: sphere, group, id: n.id, data: n });
});

// ═══ BUILD EDGES ═══
const edgeMeshes = [];

EDGES.forEach(e => {
  const fromNode = NODES.find(n => n.id === e.from);
  const toNode = NODES.find(n => n.id === e.to);
  const p1 = new THREE.Vector3(fromNode.x, fromNode.y, fromNode.z);
  const p2 = new THREE.Vector3(toNode.x, toNode.y, toNode.z);

  // Curved arc — lift midpoint perpendicular to the line
  const mid = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const lift = new THREE.Vector3(-dir.z, dir.length() * 0.15, dir.x).normalize().multiplyScalar(dir.length() * 0.12);
  mid.add(lift);

  const curve = new THREE.CatmullRomCurve3([p1, mid, p2]);

  // Edge tube
  const tube = new THREE.Mesh(
    new THREE.TubeGeometry(curve, 32, 0.025, 4, false),
    new THREE.MeshBasicMaterial({ color: e.color, transparent: true, opacity: 0.2 })
  );
  scene.add(tube);

  // Edge glow tube (wider, fainter)
  const tubeGlow = new THREE.Mesh(
    new THREE.TubeGeometry(curve, 32, 0.08, 4, false),
    new THREE.MeshBasicMaterial({ color: e.color, transparent: true, opacity: 0.04, blending: THREE.AdditiveBlending, depthWrite: false })
  );
  scene.add(tubeGlow);

  // Edge label at midpoint
  const lcv = document.createElement('canvas'); lcv.width = 256; lcv.height = 32;
  const lcx = lcv.getContext('2d');
  lcx.font = '600 16px system-ui, sans-serif';
  lcx.textAlign = 'center'; lcx.textBaseline = 'middle';
  lcx.fillStyle = '#' + e.color.toString(16).padStart(6, '0');
  lcx.globalAlpha = 0.6;
  lcx.fillText(e.label, 128, 16);
  const lSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(lcv), transparent: true }));
  lSprite.position.copy(mid).add(new THREE.Vector3(0, 0.5, 0));
  lSprite.scale.set(3, 0.4, 1);
  scene.add(lSprite);

  edgeMeshes.push({ tube, tubeGlow, lSprite, category: e.category, curve });
});

// ═══ FLOW PARTICLES along edges ═══
const FLOW_PC = 300;
const flowPos = new Float32Array(FLOW_PC * 3);
const flowCol = new Float32Array(FLOW_PC * 3);
const flowData = [];
const colorLookup = { 0x22C55E:[0.13,0.77,0.37], 0xF97316:[0.98,0.45,0.09], 0x60A5FA:[0.38,0.65,0.98], 0x14B8A6:[0.08,0.72,0.65] };

for (let i = 0; i < FLOW_PC; i++) {
  const ei = Math.floor(rng() * EDGES.length);
  const edge = EDGES[ei];
  const rgb = colorLookup[edge.color] || [0.8, 0.8, 0.8];
  flowCol[i*3] = rgb[0]; flowCol[i*3+1] = rgb[1]; flowCol[i*3+2] = rgb[2];
  flowData.push({ edgeIdx: ei, t: rng(), speed: 0.003 + rng() * 0.008, category: edge.category });
}
const flowGeo = new THREE.BufferGeometry();
flowGeo.setAttribute('position', new THREE.BufferAttribute(flowPos, 3));
flowGeo.setAttribute('color', new THREE.BufferAttribute(flowCol, 3));
const flowParticles = new THREE.Points(flowGeo, new THREE.PointsMaterial({
  size: 0.12, vertexColors: true, sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false
}));
scene.add(flowParticles);

// ═══ HOVER / INFO PANEL ═══
const infoPanel = document.getElementById('info');
let hoveredNode = null;

container.addEventListener('mousemove', (ev) => {
  const rect = container.getBoundingClientRect();
  mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
});

function updateHover() {
  raycaster.setFromCamera(mouse, camera);
  let closest = null;
  let closestDist = Infinity;
  for (const nm of nodeMeshes) {
    const worldPos = new THREE.Vector3();
    nm.group.getWorldPosition(worldPos);
    const dist = raycaster.ray.distanceToPoint(worldPos);
    if (dist < nm.data.size * 2 && dist < closestDist) {
      closestDist = dist;
      closest = nm;
    }
  }
  if (closest && closest.id !== hoveredNode) {
    hoveredNode = closest.id;
    const n = closest.data;
    // Find connections
    const connections = EDGES.filter(e => e.from === n.id || e.to === n.id);
    const catColors = { talent:'#22C55E', material:'#F97316', regulatory:'#60A5FA', community:'#14B8A6' };
    let html = `<div class="ip-name" style="color:#${n.color.toString(16).padStart(6,'0')}">${n.label.replace('\n',' ')}</div>`;
    html += `<div class="ip-type">${n.type}</div>`;
    html += `<div style="color:#7a7e9a;font-size:10px;margin-bottom:8px">${n.desc}</div>`;
    if (connections.length > 0) {
      html += `<div style="font-size:8px;color:#5a566a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Connections</div>`;
      connections.forEach(c => {
        const other = c.from === n.id ? c.to : c.from;
        const otherNode = NODES.find(nd => nd.id === other);
        html += `<div class="ip-row"><span class="ip-dot" style="background:${catColors[c.category]}"></span>${otherNode.label.replace('\n',' ')} — ${c.label}</div>`;
      });
    }
    infoPanel.innerHTML = html;
    infoPanel.classList.add('visible');
  } else if (!closest) {
    hoveredNode = null;
    infoPanel.classList.remove('visible');
  }
}

// ═══ RESIZE ═══
window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  renderer.setSize(w, h); composer.setSize(w, h);
});

// ═══ ANIMATION ═══
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // ── Node breathing + spin ──
  NODES.forEach(n => {
    const nm = nodeMap[n.id];
    const breath = 1.0 + 0.08 * Math.sin(t * 1.2 + n.x);
    nm.sphere.scale.setScalar(breath);
    nm.sphere.rotation.y = t * 0.15 + n.x * 0.1;

    // Filter dimming
    if (activeFilter && n.category !== activeFilter && n.category !== 'core') {
      nm.sphere.material.emissiveIntensity = 0.15;
      nm.glow.material.opacity = 0.02;
      nm.sprite.material.opacity = 0.15;
    } else {
      nm.sphere.material.emissiveIntensity = n.id === 'ml' ? 2.0 + 0.5 * Math.sin(t * 2) : 1.2;
      nm.glow.material.opacity = 0.1 + 0.03 * Math.sin(t + n.y);
      nm.sprite.material.opacity = 1.0;
    }

    // Gentle float (subtle vertical oscillation)
    nm.group.position.y = n.y + Math.sin(t * 0.5 + n.x * 0.3 + n.z * 0.2) * 0.3;
  });

  // ── Edge filter dimming ──
  edgeMeshes.forEach(em => {
    if (activeFilter && em.category !== activeFilter) {
      em.tube.material.opacity = 0.03;
      em.tubeGlow.material.opacity = 0.005;
      em.lSprite.material.opacity = 0.08;
    } else {
      em.tube.material.opacity = 0.2 + 0.05 * Math.sin(t * 0.8);
      em.tubeGlow.material.opacity = 0.04;
      em.lSprite.material.opacity = 0.6;
    }
  });

  // ── Flow particles ──
  const fp = flowParticles.geometry.attributes.position.array;
  const fc = flowParticles.geometry.attributes.color.array;
  for (let i = 0; i < FLOW_PC; i++) {
    const d = flowData[i];
    d.t = (d.t + d.speed) % 1;
    const em = edgeMeshes[d.edgeIdx];
    const pt = em.curve.getPoint(d.t);
    fp[i*3] = pt.x; fp[i*3+1] = pt.y; fp[i*3+2] = pt.z;

    // Dim particles for filtered edges
    if (activeFilter && d.category !== activeFilter) {
      fc[i*3] *= 0.97; fc[i*3+1] *= 0.97; fc[i*3+2] *= 0.97; // fade toward black
    } else {
      const edge = EDGES[d.edgeIdx];
      const rgb = colorLookup[edge.color] || [0.8,0.8,0.8];
      fc[i*3] = rgb[0]; fc[i*3+1] = rgb[1]; fc[i*3+2] = rgb[2];
    }
  }
  flowParticles.geometry.attributes.position.needsUpdate = true;
  flowParticles.geometry.attributes.color.needsUpdate = true;

  updateHover();
  controls.update();
  composer.render();
}
animate();
</script>
