<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const rng = mulberry32(88);

// ═══ TOGGLE STATE ═══
let custodianBoost = false, publicBoost = false, privateBoost = false;
window.tgCustodian = () => { custodianBoost = !custodianBoost; document.getElementById('bc').classList.toggle('active', custodianBoost); };
window.tgPublic = () => { publicBoost = !publicBoost; document.getElementById('bp').classList.toggle('active', publicBoost); };
window.tgPrivate = () => { privateBoost = !privateBoost; document.getElementById('bv').classList.toggle('active', privateBoost); };

// ═══ SCENE ═══
const container = document.getElementById('c');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020110);
scene.fog = new THREE.FogExp2(0x020110, 0.0015);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 600);
camera.position.set(12, 8, 22);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.6;
container.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(container.clientWidth, container.clientHeight), 0.9, 0.4, 0.45));
composer.addPass(new ShaderPass({
  uniforms:{tDiffuse:{value:null},darkness:{value:0.5},offset:{value:1.2}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`uniform sampler2D tDiffuse;uniform float darkness;uniform float offset;varying vec2 vUv;void main(){vec4 c=texture2D(tDiffuse,vUv);vec2 uv=(vUv-0.5)*vec2(offset);gl_FragColor=vec4(c.rgb*clamp(1.0-dot(uv,uv)*darkness,0.0,1.0),c.a);}`
}));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.04;
controls.autoRotate = true; controls.autoRotateSpeed = 0.25;
controls.target.set(0, 0, 0); controls.maxDistance = 80; controls.minDistance = 6;

// ═══ LIGHTS ═══
scene.add(new THREE.AmbientLight(0x303050, 2.0));
const lights = [
  [0x22C55E, 3.0, [-20, 8, 0]],
  [0xFFE500, 1.4, [-10, -12, 10]],
  [0x60A5FA, 2.5, [15, -5, 18]],
  [0xA78BFA, 1.8, [0, 15, -15]],
];
lights.forEach(([c, i, p]) => { const l = new THREE.PointLight(c, i, 80); l.position.set(...p); scene.add(l); });
const pulseLight = new THREE.PointLight(0xffffff, 2.0, 12);
scene.add(pulseLight);

// ═══ STARFIELD (4000) ═══
const SC = 4000, sP = new Float32Array(SC*3), sC = new Float32Array(SC*3);
for(let i=0;i<SC;i++){
  const th=rng()*Math.PI*2, ph=Math.acos(2*rng()-1), rd=100+rng()*80;
  sP[i*3]=rd*Math.sin(ph)*Math.cos(th); sP[i*3+1]=rd*Math.sin(ph)*Math.sin(th); sP[i*3+2]=rd*Math.cos(ph);
  const b=0.3+rng()*0.7, tn=rng();
  sC[i*3]=b*(tn>.7?.75:1); sC[i*3+1]=b*(tn>.4?.88:1); sC[i*3+2]=b;
}
const sG=new THREE.BufferGeometry(); sG.setAttribute('position',new THREE.BufferAttribute(sP,3)); sG.setAttribute('color',new THREE.BufferAttribute(sC,3));
scene.add(new THREE.Points(sG, new THREE.PointsMaterial({size:0.3,vertexColors:true,sizeAttenuation:true})));

// ═══ NEBULA ═══
function nebula(color,x,y,z,sz,op){
  const cv=document.createElement('canvas'); cv.width=cv.height=256; const cx=cv.getContext('2d');
  const g=cx.createRadialGradient(128,128,0,128,128,128); g.addColorStop(0,color); g.addColorStop(.5,color.replace(')',',0.3)').replace('rgb','rgba')); g.addColorStop(1,'transparent');
  cx.fillStyle=g; cx.fillRect(0,0,256,256);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false}));
  s.position.set(x,y,z); s.scale.set(sz,sz,1); scene.add(s);
}
nebula('rgb(34,197,94)',-35,10,-40,50,.1); nebula('rgb(96,165,250)',30,-12,-45,60,.08);
nebula('rgb(167,139,250)',5,20,-50,45,.07); nebula('rgb(255,229,0)',-15,-18,-35,35,.04);
nebula('rgb(34,197,94)',25,5,-30,40,.09); nebula('rgb(96,165,250)',-20,-8,-55,55,.05);

// ═══ LAYER 0: EQUITY CORE (Green) ═══
const coreGeo = new THREE.IcosahedronGeometry(1.2, 2);
const coreMat = new THREE.MeshStandardMaterial({ color:0x22C55E, emissive:0x22C55E, emissiveIntensity:2.0, roughness:0.1 });
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// Core glow shell
const coreGlow = new THREE.Mesh(
  new THREE.IcosahedronGeometry(2.0, 1),
  new THREE.MeshBasicMaterial({ color:0x22C55E, transparent:true, opacity:0.08, wireframe:true })
);
scene.add(coreGlow);

// Core inner ring
const coreRing = new THREE.Mesh(
  new THREE.TorusGeometry(1.8, 0.03, 8, 64),
  new THREE.MeshBasicMaterial({ color:0x22C55E, transparent:true, opacity:0.3 })
);
scene.add(coreRing);

// ═══ LAYER 1: CUSTODIAN SHIELD (Yellow wireframe sphere) ═══
const shieldGeo = new THREE.IcosahedronGeometry(3.5, 1);
const shieldMat = new THREE.MeshBasicMaterial({ color:0xFFE500, transparent:true, opacity:0.12, wireframe:true });
const shield = new THREE.Mesh(shieldGeo, shieldMat);
scene.add(shield);

// Second shield layer (finer)
const shield2 = new THREE.Mesh(
  new THREE.IcosahedronGeometry(3.8, 2),
  new THREE.MeshBasicMaterial({ color:0xFFE500, transparent:true, opacity:0.04, wireframe:true })
);
scene.add(shield2);

// ═══ LAYER 2: PUBLIC INSTITUTION RING (Blue torus + partner nodes) ═══
const publicRingGeo = new THREE.TorusGeometry(8, 0.04, 8, 120);
const publicRingMat = new THREE.MeshBasicMaterial({ color:0x60A5FA, transparent:true, opacity:0.25 });
const publicRing = new THREE.Mesh(publicRingGeo, publicRingMat);
publicRing.rotation.x = Math.PI / 2;
scene.add(publicRing);

// Second ring (thinner)
const publicRing2 = new THREE.Mesh(
  new THREE.TorusGeometry(8.3, 0.015, 6, 120),
  new THREE.MeshBasicMaterial({ color:0x60A5FA, transparent:true, opacity:0.08 })
);
publicRing2.rotation.x = Math.PI / 2;
scene.add(publicRing2);

// Partner nodes — 4 institutions orbiting on blue ring
const PARTNERS = [
  { label: 'URI', size: 0.65, angleOffset: 0 },            // Anchor — largest
  { label: 'RIHousing', size: 0.5, angleOffset: Math.PI / 2 },
  { label: 'Bldg Futures', size: 0.45, angleOffset: Math.PI },
  { label: 'RIRRC', size: 0.45, angleOffset: Math.PI * 3 / 2 },
];
const partnerNodes = [];

PARTNERS.forEach((p) => {
  // Node sphere
  const node = new THREE.Mesh(
    new THREE.SphereGeometry(p.size, 32, 32),
    new THREE.MeshStandardMaterial({ color:0x60A5FA, emissive:0x60A5FA, emissiveIntensity:1.5, roughness:0.3 })
  );
  scene.add(node);

  // Node glow
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(p.size * 1.6, 8, 8),
    new THREE.MeshBasicMaterial({ color:0x60A5FA, transparent:true, opacity:0.12 })
  );
  scene.add(glow);

  // Atmosphere
  const atmo = new THREE.Mesh(
    new THREE.SphereGeometry(p.size * 3, 12, 12),
    new THREE.MeshBasicMaterial({ color:0x60A5FA, transparent:true, opacity:0.04, blending:THREE.AdditiveBlending, depthWrite:false })
  );
  scene.add(atmo);

  // Label sprite
  const cv = document.createElement('canvas'); cv.width = 256; cv.height = 64;
  const cx = cv.getContext('2d');
  cx.font = '700 30px system-ui, sans-serif';
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillStyle = '#60A5FA';
  cx.fillText(p.label, 128, 32);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true }));
  sprite.scale.set(3.5, 0.9, 1);
  scene.add(sprite);

  partnerNodes.push({ node, glow, atmo, sprite, angleOffset: p.angleOffset });
});

// ═══ LAYER 3: VALUATION FLOOR (Green grid plane) ═══
const floorY = -5;
const gridHelper = new THREE.GridHelper(40, 40, 0x22C55E, 0x22C55E);
gridHelper.position.y = floorY;
gridHelper.material.opacity = 0.06;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// Brighter inner grid
const gridInner = new THREE.GridHelper(20, 20, 0x22C55E, 0x22C55E);
gridInner.position.y = floorY;
gridInner.material.opacity = 0.1;
gridInner.material.transparent = true;
scene.add(gridInner);

// Valuation floor label
const floorCv = document.createElement('canvas'); floorCv.width = 1024; floorCv.height = 128;
const floorCx = floorCv.getContext('2d');
floorCx.font = '700 64px system-ui, sans-serif';
floorCx.textAlign = 'center'; floorCx.textBaseline = 'middle';
floorCx.fillStyle = '#22C55E'; floorCx.globalAlpha = 0.3;
floorCx.fillText('$1B VALUATION FLOOR', 512, 64);
const floorSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(floorCv), transparent: true }));
floorSprite.position.set(0, floorY + 0.05, 0);
floorSprite.scale.set(22, 2.8, 1);
floorSprite.material.rotation = -Math.PI / 2;
scene.add(floorSprite);

// ═══ LAYER 4: PRIVATE CAPITAL GATE (Purple outer ring) ═══
const privateRingGeo = new THREE.TorusGeometry(14, 0.04, 8, 120);
const privateRingMat = new THREE.MeshBasicMaterial({ color:0xA78BFA, transparent:true, opacity:0.1 });
const privateRing = new THREE.Mesh(privateRingGeo, privateRingMat);
privateRing.rotation.x = Math.PI / 2;
scene.add(privateRing);

// Second private ring
const privateRing2 = new THREE.Mesh(
  new THREE.TorusGeometry(14.4, 0.015, 6, 120),
  new THREE.MeshBasicMaterial({ color:0xA78BFA, transparent:true, opacity:0.04 })
);
privateRing2.rotation.x = Math.PI / 2;
scene.add(privateRing2);

// Gate bridges: one from each partner node position outward to private ring
PARTNERS.forEach((p) => {
  const pts = [];
  for (let i = 0; i <= 40; i++) {
    const bt = i / 40;
    const r = 8 + bt * 6;
    const y = Math.sin(bt * Math.PI) * 2;
    const angle = p.angleOffset;
    pts.push(new THREE.Vector3(r * Math.cos(angle), y, r * Math.sin(angle)));
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  scene.add(new THREE.Mesh(
    new THREE.TubeGeometry(curve, 40, 0.02, 4, false),
    new THREE.MeshBasicMaterial({ color:0xA78BFA, transparent:true, opacity:0.1 })
  ));
});

// Gate label
const gateCv = document.createElement('canvas'); gateCv.width = 512; gateCv.height = 64;
const gateCx = gateCv.getContext('2d');
gateCx.font = '700 28px system-ui, sans-serif';
gateCx.textAlign = 'center'; gateCx.textBaseline = 'middle';
gateCx.fillStyle = '#A78BFA'; gateCx.globalAlpha = 0.4;
gateCx.fillText('PRIVATE CAPITAL GATE', 256, 32);
const gateSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(gateCv), transparent: true }));
gateSprite.position.set(0, 2.5, -14);
gateSprite.scale.set(10, 1.3, 1);
scene.add(gateSprite);

// ═══ EQUITY RIPPLES (expanding from core) ═══
const ripples = [];
for (let i = 0; i < 6; i++) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(1, 0.02, 6, 80),
    new THREE.MeshBasicMaterial({ color: 0x22C55E, transparent: true, opacity: 0.4 })
  );
  ring.userData = { age: i * 1.5 };
  scene.add(ring);
  ripples.push(ring);
}

// ═══ PARTICLE SYSTEMS ═══

// Green particles: Core -> partner nodes (equity partnership flow)
const EQ_PC = 160;
const eqPos = new Float32Array(EQ_PC * 3);
const eqCol = new Float32Array(EQ_PC * 3);
const eqData = [];
for (let i = 0; i < EQ_PC; i++) {
  eqPos[i*3] = 0; eqPos[i*3+1] = 0; eqPos[i*3+2] = 0;
  eqCol[i*3] = 0.13; eqCol[i*3+1] = 0.77; eqCol[i*3+2] = 0.37;
  eqData.push({ t: rng(), speed: 0.01 + rng() * 0.02, offset: (rng() - 0.5) * 0.8, target: Math.floor(rng() * 4) });
}
const eqGeo = new THREE.BufferGeometry();
eqGeo.setAttribute('position', new THREE.BufferAttribute(eqPos, 3));
eqGeo.setAttribute('color', new THREE.BufferAttribute(eqCol, 3));
const eqParticles = new THREE.Points(eqGeo, new THREE.PointsMaterial({ size: 0.15, vertexColors: true, sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false }));
scene.add(eqParticles);

// Yellow particles: orbit custodian shield surface
const CU_PC = 200;
const cuPos = new Float32Array(CU_PC * 3);
const cuCol = new Float32Array(CU_PC * 3);
const cuData = [];
for (let i = 0; i < CU_PC; i++) {
  const a = rng() * Math.PI * 2;
  const elev = (rng() - 0.5) * Math.PI;
  cuPos[i*3] = 3.5 * Math.cos(a) * Math.cos(elev);
  cuPos[i*3+1] = 3.5 * Math.sin(elev);
  cuPos[i*3+2] = 3.5 * Math.sin(a) * Math.cos(elev);
  cuCol[i*3] = 1.0; cuCol[i*3+1] = 0.90; cuCol[i*3+2] = 0.0;
  cuData.push({ a, elev, speed: 0.15 + rng() * 0.4, r: 3.3 + rng() * 0.4 });
}
const cuGeo = new THREE.BufferGeometry();
cuGeo.setAttribute('position', new THREE.BufferAttribute(cuPos, 3));
cuGeo.setAttribute('color', new THREE.BufferAttribute(cuCol, 3));
const cuParticles = new THREE.Points(cuGeo, new THREE.PointsMaterial({ size: 0.08, vertexColors: true, sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false }));
scene.add(cuParticles);

// Purple particles: URI -> Private ring (capital follows public)
const PV_PC = 80;
const pvPos = new Float32Array(PV_PC * 3);
const pvCol = new Float32Array(PV_PC * 3);
const pvData = [];
for (let i = 0; i < PV_PC; i++) {
  pvPos[i*3] = 8; pvPos[i*3+1] = 0; pvPos[i*3+2] = 0;
  pvCol[i*3] = 0.65; pvCol[i*3+1] = 0.55; pvCol[i*3+2] = 0.98;
  pvData.push({ t: rng(), speed: 0.005 + rng() * 0.015, offset: (rng() - 0.5) * 0.6 });
}
const pvGeo = new THREE.BufferGeometry();
pvGeo.setAttribute('position', new THREE.BufferAttribute(pvPos, 3));
pvGeo.setAttribute('color', new THREE.BufferAttribute(pvCol, 3));
const pvParticles = new THREE.Points(pvGeo, new THREE.PointsMaterial({ size: 0.12, vertexColors: true, sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false }));
scene.add(pvParticles);

// ═══ RESIZE ═══
window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  renderer.setSize(w, h); composer.setSize(w, h);
});

// ═══ ANIMATION ═══
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // ── Core pulse ──
  const pulse = 1.0 + 0.3 * Math.sin(t * 1.5);
  core.scale.setScalar(pulse);
  core.material.emissiveIntensity = 1.5 + Math.sin(t * 2) * 0.5;
  coreGlow.rotation.y = t * 0.3;
  coreGlow.rotation.x = t * 0.2;
  coreRing.rotation.x = t * 0.5;
  coreRing.rotation.z = t * 0.3;
  pulseLight.intensity = 1.5 + Math.sin(t * 2) * 1.0;

  // ── Custodian shield rotation ──
  const shieldBase = custodianBoost ? 0.25 : 0.12;
  shield.rotation.y = t * 0.15;
  shield.rotation.x = t * 0.1;
  shield.material.opacity = shieldBase + 0.03 * Math.sin(t * 0.8);
  shield2.rotation.y = -t * 0.1;
  shield2.rotation.z = t * 0.08;
  shield2.material.opacity = custodianBoost ? 0.12 : 0.04;

  // ── Partner nodes orbit on blue ring ──
  const baseAngle = t * 0.3;
  for (const pn of partnerNodes) {
    const a = baseAngle + pn.angleOffset;
    const px = 8 * Math.cos(a);
    const pz = 8 * Math.sin(a);
    pn.node.position.set(px, 0, pz);
    pn.glow.position.copy(pn.node.position);
    pn.atmo.position.copy(pn.node.position);
    pn.sprite.position.set(px, 1.5, pz);
    pn.node.rotation.y += 0.01;
    pn.node.material.emissiveIntensity = publicBoost ? 2.5 : 1.5;
  }

  // Public ring boost
  const pubBase = publicBoost ? 0.45 : 0.25;
  publicRing.material.opacity = pubBase + 0.05 * Math.sin(t * 1.2);
  publicRing2.material.opacity = publicBoost ? 0.18 : 0.08;

  // Private ring boost
  const privBase = privateBoost ? 0.25 : 0.1;
  privateRing.material.opacity = privBase + 0.03 * Math.sin(t * 0.6);
  privateRing2.material.opacity = privateBoost ? 0.12 : 0.04;

  // ── Equity ripples ──
  for (const rp of ripples) {
    rp.userData.age += 0.008;
    if (rp.userData.age > 8) rp.userData.age = 0;
    const s = 2 + rp.userData.age * 3;
    rp.scale.set(s, s, s);
    rp.material.opacity = Math.max(0, 0.35 * (1 - rp.userData.age / 8));
    rp.rotation.x = Math.PI / 2 + Math.sin(rp.userData.age * 0.5) * 0.3;
    rp.rotation.z = rp.userData.age * 0.1;
  }

  // ── Green particles: Core -> partner nodes ──
  const ep = eqParticles.geometry.attributes.position.array;
  for (let i = 0; i < EQ_PC; i++) {
    const d = eqData[i];
    d.t = (d.t + d.speed) % 1;
    // Each particle targets one of 4 partner nodes
    const tgt = partnerNodes[d.target];
    const tx = tgt.node.position.x;
    const tz = tgt.node.position.z;
    ep[i*3] = tx * d.t + d.offset * Math.sin(t * 2 + i);
    ep[i*3+1] = d.offset * Math.sin(d.t * Math.PI * 3);
    ep[i*3+2] = tz * d.t + d.offset * Math.cos(t * 2 + i);
  }
  eqParticles.geometry.attributes.position.needsUpdate = true;

  // ── Yellow particles: orbit custodian shield ──
  const cp = cuParticles.geometry.attributes.position.array;
  for (let i = 0; i < CU_PC; i++) {
    const d = cuData[i];
    d.a += d.speed * 0.008;
    const r = d.r + (custodianBoost ? 0.3 : 0) * Math.sin(t + d.a);
    cp[i*3]   = r * Math.cos(d.a) * Math.cos(d.elev);
    cp[i*3+1] = r * Math.sin(d.elev) * (1 + 0.1 * Math.sin(t + d.a));
    cp[i*3+2] = r * Math.sin(d.a) * Math.cos(d.elev);
  }
  cuParticles.geometry.attributes.position.needsUpdate = true;
  cuParticles.material.size = custodianBoost ? 0.14 : 0.08;

  // ── Purple particles: Public ring -> Private ring ──
  const pp = pvParticles.geometry.attributes.position.array;
  for (let i = 0; i < PV_PC; i++) {
    const d = pvData[i];
    d.t = (d.t + d.speed) % 1;
    // Flow outward from public ring (r=8) to private ring (r=14)
    const r = 8 + d.t * 6;
    const angle = baseAngle + (i / PV_PC) * Math.PI * 2 + d.offset;
    const y = Math.sin(d.t * Math.PI) * 2 + d.offset * Math.sin(t + i);
    pp[i*3]   = r * Math.cos(angle);
    pp[i*3+1] = y;
    pp[i*3+2] = r * Math.sin(angle);
  }
  pvParticles.geometry.attributes.position.needsUpdate = true;
  pvParticles.material.size = privateBoost ? 0.2 : 0.12;

  // ── Floor pulse ──
  gridHelper.material.opacity = 0.06 + 0.02 * Math.sin(t * 0.5);
  gridInner.material.opacity = 0.1 + 0.03 * Math.sin(t * 0.7);

  controls.update();
  composer.render();
}
animate();
</script>
</body>
</html>
