<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const rng = mulberry32(77);

const container = document.getElementById('c');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020110);
scene.fog = new THREE.FogExp2(0x020110, 0.0015);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 600);
camera.position.set(18, 12, 32);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.6;
container.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(container.clientWidth, container.clientHeight), 0.9, 0.4, 0.45));
composer.addPass(new ShaderPass({
  uniforms:{tDiffuse:{value:null},darkness:{value:0.5},offset:{value:1.2}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`uniform sampler2D tDiffuse;uniform float darkness;uniform float offset;varying vec2 vUv;void main(){vec4 c=texture2D(tDiffuse,vUv);vec2 uv=(vUv-0.5)*vec2(offset);gl_FragColor=vec4(c.rgb*clamp(1.0-dot(uv,uv)*darkness,0.0,1.0),c.a);}`
}));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.04;
controls.autoRotate = true; controls.autoRotateSpeed = 0.25;
controls.target.set(0, 0, 0); controls.maxDistance = 80; controls.minDistance = 6;

// ═══ LIGHTS ═══
scene.add(new THREE.AmbientLight(0x303050, 2.0));
const lights = [
  [0x22C55E, 3.0, [-20, 8, 0]],
  [0x60A5FA, 2.5, [15, -5, 18]],
  [0xA78BFA, 1.8, [0, 15, -15]],
  [0xFFE500, 1.4, [-10, -12, 10]],
];
lights.forEach(([c, i, p]) => { const l = new THREE.PointLight(c, i, 80); l.position.set(...p); scene.add(l); });
const pulseLight = new THREE.PointLight(0xffffff, 2.0, 12);
scene.add(pulseLight);

// ═══ STARFIELD (4000) ═══
const SC = 4000, sP = new Float32Array(SC*3), sC = new Float32Array(SC*3);
for(let i=0;i<SC;i++){
  const th=rng()*Math.PI*2, ph=Math.acos(2*rng()-1), rd=100+rng()*80;
  sP[i*3]=rd*Math.sin(ph)*Math.cos(th); sP[i*3+1]=rd*Math.sin(ph)*Math.sin(th); sP[i*3+2]=rd*Math.cos(ph);
  const b=0.3+rng()*0.7, tn=rng();
  sC[i*3]=b*(tn>.7?.75:1); sC[i*3+1]=b*(tn>.4?.88:1); sC[i*3+2]=b;
}
const sG=new THREE.BufferGeometry(); sG.setAttribute('position',new THREE.BufferAttribute(sP,3)); sG.setAttribute('color',new THREE.BufferAttribute(sC,3));
scene.add(new THREE.Points(sG, new THREE.PointsMaterial({size:0.3,vertexColors:true,sizeAttenuation:true})));

// ═══ NEBULA ═══
function nebula(color,x,y,z,sz,op){
  const cv=document.createElement('canvas'); cv.width=cv.height=256; const cx=cv.getContext('2d');
  const g=cx.createRadialGradient(128,128,0,128,128,128); g.addColorStop(0,color); g.addColorStop(.5,color.replace(')',',0.3)').replace('rgb','rgba')); g.addColorStop(1,'transparent');
  cx.fillStyle=g; cx.fillRect(0,0,256,256);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false}));
  s.position.set(x,y,z); s.scale.set(sz,sz,1); scene.add(s);
}
nebula('rgb(34,197,94)',-35,10,-40,50,.1); nebula('rgb(96,165,250)',30,-12,-45,60,.08);
nebula('rgb(167,139,250)',5,20,-50,45,.07); nebula('rgb(255,229,0)',-15,-18,-35,35,.04);
nebula('rgb(34,197,94)',25,5,-30,40,.09); nebula('rgb(96,165,250)',-20,-8,-55,55,.05);

// ═══ CENTRAL CORE ═══
const coreGeo = new THREE.IcosahedronGeometry(1.2, 2);
const coreMat = new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xffffff, emissiveIntensity:2.0, roughness:0.1 });
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);
// Core glow shell
const coreGlow = new THREE.Mesh(
  new THREE.IcosahedronGeometry(2.0, 1),
  new THREE.MeshBasicMaterial({ color:0x60A5FA, transparent:true, opacity:0.08, wireframe:true })
);
scene.add(coreGlow);
// Core inner ring
const coreRing = new THREE.Mesh(
  new THREE.TorusGeometry(1.8, 0.03, 8, 64),
  new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.3 })
);
scene.add(coreRing);

// ═══ PLANET TEXTURES (themed per neural net) ═══
function createPlanetTexture(type) {
  const cv = document.createElement('canvas'); cv.width = cv.height = 512;
  const ctx = cv.getContext('2d');
  const S = 512;

  if (type === 'physical') {
    // Terrain + construction blueprint — earthy base with structural grid
    ctx.fillStyle = '#143a1e'; ctx.fillRect(0, 0, S, S);
    // Terrain patches (varied greens)
    for (let i = 0; i < 2000; i++) {
      const x = rng() * S, y = rng() * S, s = 2 + rng() * 8;
      const g = 80 + Math.floor(rng() * 120);
      ctx.fillStyle = `rgba(${20 + Math.floor(rng()*30)},${g},${30 + Math.floor(rng()*40)},${0.3 + rng() * 0.5})`;
      ctx.fillRect(x, y, s, s);
    }
    // Blueprint grid
    ctx.strokeStyle = 'rgba(120,255,160,0.35)'; ctx.lineWidth = 1;
    for (let g = 0; g < S; g += 32) {
      ctx.beginPath(); ctx.moveTo(g, 0); ctx.lineTo(g, S); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, g); ctx.lineTo(S, g); ctx.stroke();
    }
    // Bright grid intersections
    for (let gx = 0; gx < S; gx += 32) for (let gy = 0; gy < S; gy += 32) {
      if (rng() > 0.3) {
        ctx.fillStyle = `rgba(100,255,140,${0.5 + rng() * 0.4})`;
        ctx.fillRect(gx - 2, gy - 2, 5, 5);
      }
    }
    // Building footprint outlines
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 25; i++) {
      ctx.strokeStyle = `rgba(100,255,140,${0.25 + rng() * 0.3})`;
      ctx.strokeRect(rng() * (S-60), rng() * (S-60), 15 + rng() * 45, 12 + rng() * 35);
    }
    // Topographic contour arcs
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 10; i++) {
      ctx.strokeStyle = `rgba(80,220,120,${0.15 + rng() * 0.2})`;
      ctx.beginPath();
      ctx.arc(rng() * S, rng() * S, 30 + rng() * 100, rng() * Math.PI * 2, rng() * Math.PI * 2 + Math.PI);
      ctx.stroke();
    }
  }

  else if (type === 'financial') {
    // Circuit board + data streams — deep blue with bright traces
    ctx.fillStyle = '#0c2248'; ctx.fillRect(0, 0, S, S);
    // Scan lines
    for (let y = 0; y < S; y += 4) {
      ctx.fillStyle = `rgba(96,165,250,${0.08 + rng() * 0.15})`;
      ctx.fillRect(0, y, S, 1);
    }
    // Major circuit traces
    for (let i = 0; i < 25; i++) {
      ctx.strokeStyle = `rgba(100,180,255,${0.3 + rng() * 0.35})`;
      ctx.lineWidth = 1 + rng() * 1.5;
      ctx.beginPath();
      let tx = rng() * S, ty = rng() * S;
      ctx.moveTo(tx, ty);
      for (let j = 0; j < 6; j++) {
        if (rng() > 0.5) tx += (rng() > 0.5 ? 1 : -1) * (20 + rng() * 60);
        else ty += (rng() > 0.5 ? 1 : -1) * (20 + rng() * 60);
        ctx.lineTo(tx, ty);
      }
      ctx.stroke();
      // Terminal node (bright)
      ctx.fillStyle = `rgba(140,200,255,${0.6 + rng() * 0.3})`;
      ctx.beginPath(); ctx.arc(tx, ty, 3 + rng() * 2, 0, Math.PI * 2); ctx.fill();
    }
    // Data points
    for (let i = 0; i < 200; i++) {
      ctx.fillStyle = `rgba(100,180,255,${0.15 + rng() * 0.4})`;
      ctx.beginPath(); ctx.arc(rng() * S, rng() * S, 1 + rng() * 2, 0, Math.PI * 2); ctx.fill();
    }
    // $ symbols
    ctx.font = 'bold 16px system-ui'; ctx.textAlign = 'center';
    for (let i = 0; i < 20; i++) {
      ctx.fillStyle = `rgba(120,190,255,${0.15 + rng() * 0.2})`;
      ctx.fillText('$', rng() * (S-20) + 10, rng() * (S-20) + 10);
    }
  }

  else if (type === 'dance') {
    // Movement + rhythm — deep purple with flowing arcs and energy
    ctx.fillStyle = '#1e0c3a'; ctx.fillRect(0, 0, S, S);
    // Bold flowing arcs (dance paths)
    for (let i = 0; i < 18; i++) {
      ctx.strokeStyle = `rgba(180,150,255,${0.2 + rng() * 0.3})`;
      ctx.lineWidth = 1.5 + rng() * 2.5;
      ctx.beginPath();
      const acx = S/2 + (rng() - 0.5) * S * 0.8, acy = S/2 + (rng() - 0.5) * S * 0.8;
      ctx.arc(acx, acy, 30 + rng() * 120, rng() * Math.PI * 2, rng() * Math.PI * 2 + Math.PI * (0.5 + rng()));
      ctx.stroke();
    }
    // Rhythmic sine waves
    for (let w = 0; w < 10; w++) {
      ctx.strokeStyle = `rgba(170,140,255,${0.12 + rng() * 0.18})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      const yBase = 40 + w * 45;
      for (let x = 0; x < S; x += 3) {
        const y = yBase + Math.sin(x * 0.025 + w * 1.5) * (15 + rng() * 15);
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    // Energy particles (bright radial glow)
    for (let i = 0; i < 80; i++) {
      const px = rng() * S, py = rng() * S, pr = 4 + rng() * 10;
      const grad = ctx.createRadialGradient(px, py, 0, px, py, pr);
      grad.addColorStop(0, `rgba(190,160,255,${0.4 + rng() * 0.45})`);
      grad.addColorStop(0.5, `rgba(167,139,250,${0.15 + rng() * 0.15})`);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(px - pr, py - pr, pr * 2, pr * 2);
    }
  }

  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

const planetTextures = [
  createPlanetTexture('physical'),
  createPlanetTexture('financial'),
  createPlanetTexture('dance'),
];

// ═══ 3 NEURAL NET ORBITAL RINGS + 9 NODES ═══
const NETS = [
  { name:'Physical', color:0x22C55E, nodes:['ML1','ML2','ML3'], tiltX:0,          tiltZ:0 },
  { name:'Financial',color:0x60A5FA, nodes:['LM','FA','AE'],    tiltX:Math.PI/3,  tiltZ:Math.PI/6 },
  { name:'Dance',    color:0xA78BFA, nodes:['CR','EV','GW'],    tiltX:-Math.PI/4, tiltZ:Math.PI/3 },
];
const ORBIT_R = 14;
const orbitalGroups = [];
const allNodes = []; // {mesh, net, curve} for data packets
const nodeRings = [];
const nodeSpheres = [];
const connectionCurves = [];

NETS.forEach((net, ni) => {
  const group = new THREE.Group();
  group.rotation.x = net.tiltX;
  group.rotation.z = net.tiltZ;

  // Orbital ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(ORBIT_R, 0.025, 8, 120),
    new THREE.MeshBasicMaterial({ color: net.color, transparent: true, opacity: 0.2 })
  );
  group.add(ring);

  // Second ring (thinner, slightly offset)
  const ring2 = new THREE.Mesh(
    new THREE.TorusGeometry(ORBIT_R + 0.4, 0.012, 6, 120),
    new THREE.MeshBasicMaterial({ color: net.color, transparent: true, opacity: 0.08 })
  );
  group.add(ring2);

  // 3 nodes on the ring
  net.nodes.forEach((label, i) => {
    const angle = (i / 3) * Math.PI * 2;
    const nx = ORBIT_R * Math.cos(angle);
    const nz = ORBIT_R * Math.sin(angle);

    // Node sphere (textured planet)
    const nodeTex = planetTextures[ni];
    const node = new THREE.Mesh(
      new THREE.SphereGeometry(0.6, 32, 32),
      new THREE.MeshStandardMaterial({
        map: nodeTex,
        emissiveMap: nodeTex,
        emissive: 0xffffff,
        emissiveIntensity: 1.5,
        roughness: 0.6,
        metalness: 0.1,
      })
    );
    node.position.set(nx, 0, nz);
    node.userData = { spinSpeed: 0.12 + rng() * 0.15 };
    group.add(node);
    nodeSpheres.push(node);

    // Node glow
    const glow = new THREE.Mesh(
      new THREE.SphereGeometry(1.0, 8, 8),
      new THREE.MeshBasicMaterial({ color: net.color, transparent: true, opacity: 0.1 })
    );
    glow.position.copy(node.position);
    group.add(glow);

    // Outer atmosphere haze
    const atmo = new THREE.Mesh(
      new THREE.SphereGeometry(1.8, 12, 12),
      new THREE.MeshBasicMaterial({ color: net.color, transparent: true, opacity: 0.035, blending: THREE.AdditiveBlending, depthWrite: false })
    );
    atmo.position.copy(node.position);
    group.add(atmo);

    // Second atmosphere layer (wider, fainter)
    const atmo2 = new THREE.Mesh(
      new THREE.SphereGeometry(2.5, 10, 10),
      new THREE.MeshBasicMaterial({ color: net.color, transparent: true, opacity: 0.015, blending: THREE.AdditiveBlending, depthWrite: false })
    );
    atmo2.position.copy(node.position);
    group.add(atmo2);

    // Orbiting ring
    const nodeRing = new THREE.Mesh(
      new THREE.TorusGeometry(1.3, 0.015, 6, 48),
      new THREE.MeshBasicMaterial({ color: net.color, transparent: true, opacity: 0.22 })
    );
    nodeRing.position.copy(node.position);
    nodeRing.rotation.x = Math.PI / 3 + ni * 0.5;
    nodeRing.rotation.z = i * Math.PI / 3;
    nodeRing.userData = { speed: 0.4 + ni * 0.15 };
    group.add(nodeRing);
    nodeRings.push(nodeRing);

    // Inner hot core
    const hotCore = new THREE.Mesh(
      new THREE.SphereGeometry(0.18, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 })
    );
    hotCore.position.copy(node.position);
    group.add(hotCore);

    // Label sprite
    const cv = document.createElement('canvas'); cv.width = 128; cv.height = 48;
    const cx = cv.getContext('2d');
    cx.font = '700 28px system-ui, sans-serif';
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillStyle = '#' + net.color.toString(16).padStart(6, '0');
    cx.fillText(label, 64, 24);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true }));
    sprite.position.set(nx, 1.8, nz);
    sprite.scale.set(3, 1.2, 1);
    group.add(sprite);

    allNodes.push({ position: node.position, group, net: ni });
  });

  // Connections between nodes on same ring (curved arcs)
  for (let i = 0; i < 3; i++) {
    const a1 = (i / 3) * Math.PI * 2;
    const a2 = ((i + 1) / 3) * Math.PI * 2;
    const pts = [];
    for (let j = 0; j <= 30; j++) {
      const t = j / 30;
      const a = a1 + t * (a2 - a1);
      const r = ORBIT_R + Math.sin(t * Math.PI) * 2; // arc outward
      pts.push(new THREE.Vector3(r * Math.cos(a), Math.sin(t * Math.PI) * 1.5, r * Math.sin(a)));
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    const tube = new THREE.Mesh(
      new THREE.TubeGeometry(curve, 30, 0.02, 4, false),
      new THREE.MeshBasicMaterial({ color: net.color, transparent: true, opacity: 0.25 })
    );
    group.add(tube);
    connectionCurves.push({ curve, group, color: net.color });
  }

  scene.add(group);
  orbitalGroups.push(group);
});

// Cross-ring connections (through center — synaptic bridges)
for (let i = 0; i < 3; i++) {
  for (let j = i + 1; j < 3; j++) {
    const c1 = NETS[i].color, c2 = NETS[j].color;
    const mixColor = new THREE.Color(c1).lerp(new THREE.Color(c2), 0.5);
    // Connect node 0 of ring i to node 0 of ring j, via center
    const pts = [
      new THREE.Vector3(ORBIT_R, 0, 0).applyEuler(new THREE.Euler(NETS[i].tiltX, 0, NETS[i].tiltZ)),
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(ORBIT_R, 0, 0).applyEuler(new THREE.Euler(NETS[j].tiltX, 0, NETS[j].tiltZ)),
    ];
    const curve = new THREE.CatmullRomCurve3(pts);
    scene.add(new THREE.Mesh(
      new THREE.TubeGeometry(curve, 30, 0.015, 4, false),
      new THREE.MeshBasicMaterial({ color: mixColor, transparent: true, opacity: 0.15 })
    ));
    connectionCurves.push({ curve, group: scene, color: mixColor.getHex() });
  }
}

// ═══ TRIPLE HELIX (3 Neural Nets) + VALUE CHAIN INTERTWINE ═══
const HELIX_R = 5.5, HELIX_TURNS = 4, HELIX_H = 28;
function helixPts(offset, radius) {
  const r = radius || HELIX_R;
  const pts = [];
  for (let i = 0; i <= 200; i++) {
    const t = i / 200;
    const a = t * Math.PI * 2 * HELIX_TURNS + offset;
    const y = (t - 0.5) * HELIX_H;
    pts.push(new THREE.Vector3(r * Math.cos(a), y, r * Math.sin(a)));
  }
  return new THREE.CatmullRomCurve3(pts);
}

// 3 Neural Net strands at 120° offsets
const strandPhysical  = helixPts(0);                       // Green — Physical
const strandFinancial = helixPts(Math.PI * 2 / 3);         // Blue — Financial
const strandDance     = helixPts(Math.PI * 4 / 3);         // Purple — Dance
const netStrands = [strandPhysical, strandFinancial, strandDance];

const STRAND_CONFIGS = [
  { curve: strandPhysical,  color: 0x22C55E },
  { curve: strandFinancial, color: 0x60A5FA },
  { curve: strandDance,     color: 0xA78BFA },
];
STRAND_CONFIGS.forEach(({ curve, color }) => {
  scene.add(new THREE.Mesh(
    new THREE.TubeGeometry(curve, 200, 0.06, 6, false),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.6, roughness: 0.3 })
  ));
});

// Value Chain — dollar bill chain flowing through the helix (neural web style)
const vcPts = [];
const VC_FREQ = HELIX_TURNS * 3;
for (let i = 0; i <= 300; i++) {
  const t = i / 300;
  const y = (t - 0.5) * HELIX_H;
  const rOsc = HELIX_R * (0.65 + 0.55 * Math.sin(t * Math.PI * 2 * VC_FREQ));
  const a = t * Math.PI * 2 * (HELIX_TURNS + 1.5);
  vcPts.push(new THREE.Vector3(rOsc * Math.cos(a), y, rOsc * Math.sin(a)));
}
const vcCurve = new THREE.CatmullRomCurve3(vcPts);

// Neural web backbone — white core + yellow FFE500 glow (synaptic-core wifi web style)
scene.add(new THREE.Mesh(
  new THREE.TubeGeometry(vcCurve, 300, 0.008, 4, false),
  new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending, depthWrite: false })
));
scene.add(new THREE.Mesh(
  new THREE.TubeGeometry(vcCurve, 300, 0.04, 4, false),
  new THREE.MeshBasicMaterial({ color: 0xFFE500, transparent: true, opacity: 0.045, blending: THREE.AdditiveBlending, depthWrite: false })
));
scene.add(new THREE.Mesh(
  new THREE.TubeGeometry(vcCurve, 300, 0.12, 4, false),
  new THREE.MeshBasicMaterial({ color: 0xFFE500, transparent: true, opacity: 0.015, blending: THREE.AdditiveBlending, depthWrite: false })
));

// Dollar bill texture (canvas-drawn)
const billCv = document.createElement('canvas'); billCv.width = 64; billCv.height = 32;
const billCx = billCv.getContext('2d');
billCx.fillStyle = '#0a3a1a'; billCx.fillRect(0, 0, 64, 32);
billCx.strokeStyle = '#22C55E'; billCx.lineWidth = 1.5; billCx.strokeRect(3, 3, 58, 26);
billCx.font = 'bold 14px system-ui'; billCx.fillStyle = '#4ade80';
billCx.textAlign = 'center'; billCx.textBaseline = 'middle'; billCx.fillText('$', 32, 16);
const billTex = new THREE.CanvasTexture(billCv);

// Tiny dollar bill chain — 70 sprites flowing along the value chain weave
const BILL_COUNT = 70;
const billMeshes = [];
for (let i = 0; i < BILL_COUNT; i++) {
  const bill = new THREE.Sprite(new THREE.SpriteMaterial({
    map: billTex, transparent: true, opacity: 0.8,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
  }));
  bill.scale.set(0.3, 0.15, 1);
  const bt = i / BILL_COUNT;
  bill.position.copy(vcCurve.getPoint(bt));
  bill.userData = { t: bt };
  scene.add(bill);
  billMeshes.push(bill);
}

// Lateral web sparks — yellow connections from chain to each neural net strand
for (let i = 0; i < HELIX_TURNS * 4; i++) {
  const t = (i + 0.3) / (HELIX_TURNS * 4);
  const chainPt = vcCurve.getPoint(t);
  for (let s = 0; s < 3; s++) {
    const strandPt = netStrands[s].getPoint(t);
    if (chainPt.distanceTo(strandPt) < HELIX_R * 0.9) {
      const mid = chainPt.clone().lerp(strandPt, 0.5).add(new THREE.Vector3(0, (rng()-0.5)*0.4, 0));
      const sparkCurve = new THREE.CatmullRomCurve3([chainPt.clone(), mid, strandPt.clone()]);
      scene.add(new THREE.Mesh(
        new THREE.TubeGeometry(sparkCurve, 8, 0.004, 3, false),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending, depthWrite: false })
      ));
      scene.add(new THREE.Mesh(
        new THREE.TubeGeometry(sparkCurve, 8, 0.025, 3, false),
        new THREE.MeshBasicMaterial({ color: 0xFFE500, transparent: true, opacity: 0.025, blending: THREE.AdditiveBlending, depthWrite: false })
      ));
    }
  }
}

// Cross-rungs: connect adjacent net strands periodically
const helixGroup = new THREE.Group();
const rungMat = new THREE.MeshBasicMaterial({ color: 0xFFE500, transparent: true, opacity: 0.08, blending: THREE.AdditiveBlending, depthWrite: false });
for (let i = 0; i < HELIX_TURNS * 6; i++) {
  const t = (i + 0.5) / (HELIX_TURNS * 6);
  for (let s = 0; s < 3; s++) {
    const p1 = netStrands[s].getPoint(t);
    const p2 = netStrands[(s + 1) % 3].getPoint(t);
    const mid = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
    const len = p1.distanceTo(p2);
    const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
    const geo = new THREE.CylinderGeometry(0.012, 0.012, len, 4);
    const mesh = new THREE.Mesh(geo, rungMat);
    mesh.position.copy(mid);
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    helixGroup.add(mesh);
  }
}
scene.add(helixGroup);

// ═══ EQUITY RIPPLES ═══
const ripples = [];
for (let i = 0; i < 6; i++) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(1, 0.02, 6, 80),
    new THREE.MeshBasicMaterial({ color: 0x22C55E, transparent: true, opacity: 0.4 })
  );
  ring.userData = { age: i * 1.5 };
  scene.add(ring);
  ripples.push(ring);
}

// ═══ DATA PACKETS (traveling along connections) ═══
const packetGeo = new THREE.SphereGeometry(0.12, 6, 6);
const packets = [];
for (let i = 0; i < 18; i++) {
  const cc = connectionCurves[i % connectionCurves.length];
  const color = typeof cc.color === 'number' ? cc.color : (cc.color instanceof THREE.Color ? cc.color.getHex() : 0xffffff);
  const mesh = new THREE.Mesh(packetGeo, new THREE.MeshBasicMaterial({ color }));
  mesh.userData = { curveIdx: i % connectionCurves.length, t: rng(), speed: 0.15 + rng() * 0.3 };
  scene.add(mesh);
  packets.push(mesh);
}

// ═══ HELIX FLOW PARTICLES ═══
const allHelixCurves = [strandPhysical, strandFinancial, strandDance, vcCurve];
const helixColors = [[0.13,0.77,0.37],[0.38,0.65,0.98],[0.65,0.55,0.98],[1.0,0.90,0.0]];
const HPC = 250, hpP = new Float32Array(HPC * 3), hpC = new Float32Array(HPC * 3), hpD = [];
for (let i = 0; i < HPC; i++) {
  const si = Math.floor(rng() * 4); // 0=physical, 1=financial, 2=dance, 3=vc
  const t = rng();
  const curve = allHelixCurves[si];
  const pt = curve.getPoint(t);
  hpP[i*3] = pt.x; hpP[i*3+1] = pt.y; hpP[i*3+2] = pt.z;
  hpC[i*3] = helixColors[si][0]; hpC[i*3+1] = helixColors[si][1]; hpC[i*3+2] = helixColors[si][2];
  hpD.push({ t, speed: 0.02 + rng() * 0.04, strand: si });
}
const hpG = new THREE.BufferGeometry();
hpG.setAttribute('position', new THREE.BufferAttribute(hpP, 3));
hpG.setAttribute('color', new THREE.BufferAttribute(hpC, 3));
const helixParticles = new THREE.Points(hpG, new THREE.PointsMaterial({ size: 0.12, vertexColors: true, sizeAttenuation: true }));
scene.add(helixParticles);

// ═══ CORE ORBIT PARTICLES ═══
const CPC = 300, cpP = new Float32Array(CPC * 3), cpC = new Float32Array(CPC * 3), cpD = [];
for (let i = 0; i < CPC; i++) {
  const a = rng() * Math.PI * 2, r = 1.5 + rng() * 4, elev = (rng() - 0.5) * Math.PI;
  cpP[i*3] = r * Math.cos(a) * Math.cos(elev);
  cpP[i*3+1] = r * Math.sin(elev);
  cpP[i*3+2] = r * Math.sin(a) * Math.cos(elev);
  const b = 0.5 + rng() * 0.5;
  cpC[i*3] = b * 0.8; cpC[i*3+1] = b * 0.9; cpC[i*3+2] = b;
  cpD.push({ a, r, elev, speed: 0.2 + rng() * 0.5 });
}
const cpG = new THREE.BufferGeometry();
cpG.setAttribute('position', new THREE.BufferAttribute(cpP, 3));
cpG.setAttribute('color', new THREE.BufferAttribute(cpC, 3));
scene.add(new THREE.Points(cpG, new THREE.PointsMaterial({ size: 0.1, vertexColors: true, sizeAttenuation: true })));

// ═══ RESIZE ═══
window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  renderer.setSize(w, h); composer.setSize(w, h);
});

// ═══ ANIMATION ═══
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Core pulse
  const pulse = 1.0 + 0.3 * Math.sin(t * 1.5);
  core.scale.setScalar(pulse);
  core.material.emissiveIntensity = 1.5 + Math.sin(t * 2) * 0.5;
  coreGlow.rotation.y = t * 0.3;
  coreGlow.rotation.x = t * 0.2;
  coreRing.rotation.x = t * 0.5;
  coreRing.rotation.z = t * 0.3;
  pulseLight.intensity = 1.5 + Math.sin(t * 2) * 1.0;

  // Orbital rings rotate
  orbitalGroups[0].rotation.y = t * 0.15;
  orbitalGroups[1].rotation.y = t * 0.1;
  orbitalGroups[2].rotation.y = t * 0.12;

  // DNA helix slowly rotates
  helixGroup.rotation.y = t * 0.05;

  // Equity ripples expand and fade
  for (const rp of ripples) {
    rp.userData.age += 0.008;
    if (rp.userData.age > 8) rp.userData.age = 0;
    const s = 2 + rp.userData.age * 3;
    rp.scale.set(s, s, s);
    rp.material.opacity = Math.max(0, 0.35 * (1 - rp.userData.age / 8));
    rp.rotation.x = Math.PI / 2 + Math.sin(rp.userData.age * 0.5) * 0.3;
    rp.rotation.z = rp.userData.age * 0.1;
  }

  // Data packets travel along connections
  for (const p of packets) {
    p.userData.t = (p.userData.t + p.userData.speed * 0.008) % 1;
    const cc = connectionCurves[p.userData.curveIdx];
    const pt = cc.curve.getPoint(p.userData.t);
    if (cc.group === scene) {
      p.position.copy(pt);
    } else {
      p.position.copy(pt.clone().applyMatrix4(cc.group.matrixWorld));
    }
  }

  // Helix flow particles
  const hPos = helixParticles.geometry.attributes.position.array;
  for (let i = 0; i < HPC; i++) {
    const d = hpD[i];
    d.t = (d.t + d.speed * 0.008) % 1;
    const curve = allHelixCurves[d.strand];
    const pt = curve.getPoint(d.t);
    hPos[i*3] = pt.x; hPos[i*3+1] = pt.y; hPos[i*3+2] = pt.z;
  }
  helixParticles.geometry.attributes.position.needsUpdate = true;

  // Dollar bill chain flow
  for (const bill of billMeshes) {
    bill.userData.t = (bill.userData.t + 0.002) % 1;
    const bpt = vcCurve.getPoint(bill.userData.t);
    bill.position.copy(bpt);
    bill.material.opacity = 0.6 + 0.3 * Math.sin(t * 2.5 + bill.userData.t * Math.PI * 10);
  }

  // Node sphere + ring rotation
  for (const ns of nodeSpheres) {
    ns.rotation.y += ns.userData.spinSpeed * 0.008;
  }
  for (const nr of nodeRings) {
    nr.rotation.y += nr.userData.speed * 0.008;
  }

  // Core orbit particles
  const cPos = cpG.attributes.position.array;
  for (let i = 0; i < CPC; i++) {
    const d = cpD[i];
    d.a += d.speed * 0.008;
    cPos[i*3]   = d.r * Math.cos(d.a) * Math.cos(d.elev);
    cPos[i*3+1] = d.r * Math.sin(d.elev) * (1 + 0.1 * Math.sin(t + d.a));
    cPos[i*3+2] = d.r * Math.sin(d.a) * Math.cos(d.elev);
  }
  cpG.attributes.position.needsUpdate = true;

  controls.update();
  composer.render();
}
animate();
</script>
</body>
</html>
