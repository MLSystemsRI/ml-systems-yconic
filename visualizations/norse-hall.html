function computeSnagCascade(){
  const stalled=new Set(),depths={};
  // Build full dependency graph across all phases
  const allTasks={},depOf={};
  P.forEach(ph=>{ph.t.forEach(t=>{allTasks[t.id]=t;t.dp.forEach(d=>{if(!depOf[d])depOf[d]=[];depOf[d].push(t.id)})})});
  // Cross-phase: if phase bb contains a blocked phase, all tasks in downstream phase are blocked
  const stalledPhases=new Set();
  SNAGS.forEach(s=>{
    stalled.add(s.task);depths[s.task]=0;
    // BFS from snagged task
    const queue=[{id:s.task,depth:0}];
    while(queue.length){
      const{id,depth}=queue.shift();
      (depOf[id]||[]).forEach(did=>{
        if(!stalled.has(did)){stalled.add(did);depths[did]=depth+1;queue.push({id:did,depth:depth+1})}
      });
    }
    stalledPhases.add(s.phase);
  });
  // Cross-phase cascade: phases blocked by snagged phase
  P.forEach(ph=>{
    if(ph.bb.some(b=>stalledPhases.has(b))){
      stalledPhases.add(ph.id);
      const maxD=Math.max(...Object.values(depths),0);
      ph.t.forEach(t=>{if(!stalled.has(t.id)){stalled.add(t.id);depths[t.id]=maxD+1}});
    }
  });
  return{stalled,depths,stalledPhases};
}

function cascadeColor(depth){
  if(depth<=0)return 0xff3030;
  if(depth===1)return 0xff3030;
  if(depth===2)return 0xff6030;
  if(depth===3)return 0xffaa30;
  return 0xffd060;
}

  const all=[];P.forEach(ph=>{const pS=ps[ph.id],tm={};ph.t.forEach(t=>{tm[t.id]=t});const ls={};
  function g(i){if(ls[i]!==undefined)return ls[i];const t=tm[i];if(!t.dp.length){ls[i]=0;return 0}let m=0;t.dp.forEach(d=>{if(tm[d]){const e=g(d)+tm[d].d;if(e>m)m=e}});ls[i]=m;return m}
  ph.t.forEach(t=>{const l=g(t.id);all.push({pi:ph.id,ti:t.id,n:t.n,s:pS+l,e:pS+l+t.d-1,d:t.d,cp:t.cp,df:t.df,ai:t.ai})})});

function buildR(){

  for(let d=S.ps[ph.id];d<=S.pe[ph.id];d++){const tk=DG[d+'-'+ph.id]||[],n=tk.length;
    if(!n){if(c){R.push(c);c=null}continue}

    if(!c||sp){if(c)R.push(c);c={pi:ph.id,ds:d,de:d,bd:{[d]:tk},pk:n,tot:n,dc:1,av:n,cp:tk.some(t=>t.cp),df:tk.some(t=>t.df),ai:tk.some(t=>t.ai),ids:new Set(tk.map(t=>t.ti))}

const NOISE_GLSL=`
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
  i=mod(i,289.0);
  vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=1.0/7.0;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}`;

// ═══════════════════ WIFI WEB — PARABOLIC ARC CONNECTIONS ═══════════════════
// Connect all phase orbs to each other AND to origin with parabolic arcs
const wifiArcs=[];const wifiSparks=[];
function makeBoltCurve(ax,ay,bx2,by2,arcHeight,segs,az,bz2){
  az=az||0;bz2=bz2||0;
  const pts=[];
  for(let s=0;s<=segs;s++){
    const f=s/segs;
    const mx=ax+(bx2-ax)*f;
    const my=ay+(by2-ay)*f+arcHeight*4*f*(1-f);
    const mz=az+(bz2-az)*f+1.0*Math.sin(f*Math.PI);
    const jx=s===0||s===segs?0:(Math.random()-0.5)*0.3;
    const jy=s===0||s===segs?0:(Math.random()-0.5)*0.2;
    pts.push(new THREE.Vector3(mx+jx,my+jy,mz));
  }
  return new THREE.CatmullRomCurve3(pts);
}
// Phase centers for this project
const phCenters=P.map(ph=>({x:PX[ph.id],y:dY((S.ps[ph.id]+S.pe[ph.id])/2),z:PZ[ph.id]}));
// Connect every pair of phases
for(let a=0;a<phCenters.length;a++){
  for(let b2=a+1;b2<phCenters.length;b2++){
    const dist=Math.abs(phCenters[b2].x-phCenters[a].x);
    const arcH=dist*0.15+0.5; // higher arcs for longer connections
    const curve=makeBoltCurve(phCenters[a].x,phCenters[a].y,phCenters[b2].x,phCenters[b2].y,arcH,10,phCenters[a].z,phCenters[b2].z);
    // White core bolt
    const coreGeo=new THREE.TubeGeometry(curve,24,0.002,4,false);
    const coreMesh=new THREE.Mesh(coreGeo,new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.45,blending:THREE.AdditiveBlending,depthWrite:false}));
    scene.add(coreMesh);wifiArcs.push(coreMesh);
    // Yellow glow
    const glowGeo=new THREE.TubeGeometry(curve,24,0.010,4,false);
    const glowMesh=new THREE.Mesh(glowGeo,new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.054,blending:THREE.AdditiveBlending,depthWrite:false}));
    scene.add(glowMesh);wifiArcs.push(glowMesh);
    // 2 fork tendrils per connection (half-size Phase Jump arcs)
    for(let fk=0;fk<2;fk++){
      const forkCurve=makeBoltCurve(phCenters[a].x,phCenters[a].y,phCenters[b2].x,phCenters[b2].y,arcH*(0.5+fk*0.3),8,phCenters[a].z,phCenters[b2].z);
      const fGeo=new THREE.TubeGeometry(forkCurve,16,0.001,4,false);
      const fMesh2=new THREE.Mesh(fGeo,new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.025,blending:THREE.AdditiveBlending,depthWrite:false}));
      scene.add(fMesh2);wifiArcs.push(fMesh2);
    }
    // Spark
    if(a%2===0){
      const sGeo=new THREE.SphereGeometry(0.015,4,4);
      const sMat=new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending});
      const sp=new THREE.Mesh(sGeo,sMat);
      sp.userData={curve,t:Math.random(),speed:0.003+Math.random()*0.004,wifiSeed:a*10+b2};
      sp.position.copy(curve.getPoint(sp.userData.t));scene.add(sp);wifiSparks.push(sp);
    }
  }
}
// Connect each phase to origin
phCenters.forEach((pc,idx)=>{
  const curve=makeBoltCurve(0,OY,pc.x,pc.y,1.0,8,0,pc.z);

let snagActive=false;

function buildCascadeTendrils(){
  const{stalled,depths,stalledPhases}=computeSnagCascade();
  // Create red tendrils between consecutive stalled phases
  const sortedPhases=[...stalledPhases].sort((a,b)=>a-b);
  for(let i=0;i<sortedPhases.length-1;i++){
    const a=sortedPhases[i],b=sortedPhases[i+1];
    const xA=PX[a],xB=PX[b],yA=dY(S.pe[a]),yB=dY(S.ps[b]),zA=PZ[a],zB=PZ[b];
    const depth=Math.min(...P.find(p=>p.id===b).t.map(t=>depths[t.id]||99));
    const col=new THREE.Color(cascadeColor(depth));
    const curve=new THREE.CatmullRomCurve3([new THREE.Vector3(xA,yA,zA),new THREE.Vector3((xA+xB)/2,(yA+yB)/2,(zA+zB)/2+2.0),new THREE.Vector3(xB,yB,zB)]);
    const tGeo=new THREE.TubeGeometry(curve,28,0.025,6,false);
    const tMesh=new THREE.Mesh(tGeo,new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.6,metalness:0.5,roughness:0.3,transparent:true,opacity:0.8}));
    tMesh.visible=false;scene.add(tMesh);snagTendrils.push(tMesh);
    // Glow tube
    const gGeo=new THREE.TubeGeometry(curve,28,0.075,6,false);
    const gMesh=new THREE.Mesh(gGeo,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.1,blending:THREE.AdditiveBlending,depthWrite:false}));
    gMesh.visible=false;scene.add(gMesh);snagTendrils.push(gMesh);
    // Red sparks along tendril
    for(let j=0;j<3;j++){
      const sGeo=new THREE.SphereGeometry(0.04,6,6);
      const sMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.95,blending:THREE.AdditiveBlending});
      const spark=new THREE.Mesh(sGeo,sMat);spark.userData={curve,t:j/3,speed:0.004+Math.random()*0.004};
      spark.position.copy(curve.getPoint(spark.userData.t));spark.visible=false;scene.add(spark);snagSparks.push(spark);
      const glow=new THREE.Mesh(sGeo,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.4,blending:THREE.AdditiveBlending}));
      glow.scale.setScalar(3);glow.position.copy(spark.position);glow.userData={parent:spark};glow.visible=false;scene.add(glow);snagSparks.push(glow);
    }
  }
  return{stalled,depths};
}

function buildPunchListOrbs(){
  // Find P8 commissioning region center
  const p8Regions=R.filter(r=>r.pi===8);
  if(!p8Regions.length)return;
  const cx=PX[8],cy=dY((S.ps[8]+S.pe[8])/2),cz=PZ[8];

  PUNCH_LIST.forEach((pl,i)=>{
    const angle=(i/PUNCH_LIST.length)*Math.PI*2;
    const orbitR=2.2;
    const rad=pl.severity==='critical'?0.12:pl.severity==='major'?0.08:0.06;
    const col=pl.resolved?0x22c55e:pl.severity==='critical'?0xff3030:pl.severity==='major'?0xff6030:0xffd060;
    const opacity=pl.resolved?0.4:0.9;

    const orb=new THREE.Mesh(new THREE.SphereGeometry(rad,12,12),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:opacity,blending:THREE.AdditiveBlending,depthWrite:false}));
    orb.position.set(cx+Math.cos(angle)*orbitR,cy+Math.sin(angle)*orbitR*0.5,cz);
    orb.visible=false;orb.userData={pl,angle,orbitR,cx,cy,speed:0.3+i*0.05};
    scene.add(orb);punchOrbs.push(orb);

    // Glow halo for unresolved
    if(!pl.resolved){
      const halo=new THREE.Mesh(new THREE.SphereGeometry(rad*2.5,8,8),
        new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.15,blending:THREE.AdditiveBlending,depthWrite:false}));
      halo.position.copy(orb.position);halo.visible=false;halo.userData={parentOrb:orb};
      scene.add(halo);punchOrbs.push(halo);
    }

    // Critical items get Fresnel rim
    if(pl.severity==='critical'&&!pl.resolved){
      const fMat=new THREE.ShaderMaterial({
        uniforms:{uColor:{value:new THREE.Color(0xff3030)},uOpacity:{value:0.6},uPower:{value:2.0},uPulse:{value:1.0}},
        vertexShader:fresnelVert,fragmentShader:fresnelFrag,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
      const fMesh=new THREE.Mesh(new THREE.SphereGeometry(rad*1.5,12,12),fMat);
      fMesh.position.copy(orb.position);fMesh.visible=false;fMesh.userData={parentOrb:orb,fMat};
      scene.add(fMesh);punchOrbs.push(fMesh);
    }
  });

  // Progress aura around P8 — resolved=green, background=red
  const resolved=PUNCH_LIST.filter(p=>p.resolved).length;
  const total=PUNCH_LIST.length;
  const pctDone=resolved/total;
  // Green resolved aura (intensity scales with progress)
  const resolvedAura=new THREE.Mesh(new THREE.SphereGeometry(2.5,24,24),new THREE.MeshBasicMaterial({
    color:0x22c55e,transparent:true,opacity:0.04+pctDone*0.08,blending:THREE.AdditiveBlending,depthWrite:false}));
  resolvedAura.position.set(cx,cy,cz);resolvedAura.visible=false;scene.add(resolvedAura);
  punchTorusRing=resolvedAura;
  // Red background aura (dims as items get resolved)
  const bgAura=new THREE.Mesh(new THREE.SphereGeometry(2.8,24,24),new THREE.MeshBasicMaterial({
    color:0xff3030,transparent:true,opacity:0.03*(1-pctDone),blending:THREE.AdditiveBlending,depthWrite:false}));
  bgAura.position.set(cx,cy,cz);bgAura.visible=false;bgAura.userData={isBgRing:true};scene.add(bgAura);punchOrbs.push(bgAura);
}

const jumpArcs=[];const jumpArcSparks=[];const jumpSpines=[];const jumpSpineSparks=[];

function buildJumpArcs(){
  PHASE_JUMPS.forEach(j=>{
    const xA=PX[j.from],xB=PX[j.to],zA=PZ[j.from],zB=PZ[j.to];
    const yA=dY(S.pe[j.from]),yB=dY(S.ps[j.to]);
    // Lightning arc — jagged path with zig-zag offsets
    const midX=(xA+xB)/2,midY=Math.max(yA,yB)+1.2;
    // Build jagged lightning points between start and end
    const boltPts=[];
    const segs=12;
    for(let s=0;s<=segs;s++){
      const f=s/segs;
      // Base smooth path
      const bx=xA+(xB-xA)*f;
      const by=yA+(midY-yA)*4*f*(1-f)+(yB-yA)*f;
      const bz=zA+(zB-zA)*f+1.8*Math.sin(f*Math.PI);
      // Jagged lightning offset (none at endpoints)
      const jitter=s===0||s===segs?0:(Math.random()-0.5)*0.6;
      const jitterZ=s===0||s===segs?0:(Math.random()-0.5)*0.4;
      boltPts.push(new THREE.Vector3(bx+jitter*0.3,by+jitter,bz+jitterZ));
    }
    const curve=new THREE.CatmullRomCurve3(boltPts);
    // Hot white-yellow core bolt
    const tGeo=new THREE.TubeGeometry(curve,48,0.0125,6,false);
    const tMesh=new THREE.Mesh(tGeo,new THREE.MeshBasicMaterial({
      color:0xffffff,transparent:true,opacity:0.9,blending:THREE.AdditiveBlending,depthWrite:false}));
    tMesh.visible=false;scene.add(tMesh);jumpArcs.push(tMesh);
    // Yellow electric glow
    const gGeo=new THREE.TubeGeometry(curve,48,0.07,6,false);
    const gMesh=new THREE.Mesh(gGeo,new THREE.MeshBasicMaterial({
      color:0xFFE500,transparent:true,opacity:0.12,blending:THREE.AdditiveBlending,depthWrite:false}));
    gMesh.visible=false;scene.add(gMesh);jumpArcs.push(gMesh);
    // Wide outer corona
    const cGeo=new THREE.TubeGeometry(curve,48,0.175,6,false);
    const cMesh=new THREE.Mesh(cGeo,new THREE.MeshBasicMaterial({
      color:0xFFE500,transparent:true,opacity:0.03,blending:THREE.AdditiveBlending,depthWrite:false}));
    cMesh.visible=false;scene.add(cMesh);jumpArcs.push(cMesh);
    // Electric sparks — tiny, fast, phase-hopping
    for(let k=0;k<1;k++){
      const sGeo=new THREE.SphereGeometry(0.018,6,6);
      const sMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.95,blending:THREE.AdditiveBlending});
      const spark=new THREE.Mesh(sGeo,sMat);
      spark.userData={curve,t:k/6,speed:0.015+Math.random()*0.018,isLightning:true};
      spark.position.copy(curve.getPoint(spark.userData.t));spark.visible=false;scene.add(spark);jumpArcSparks.push(spark);
      // Yellow electric glow halo (smaller)
      const sg=new THREE.Mesh(sGeo,new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending}));
      sg.scale.setScalar(3);sg.position.copy(spark.position);sg.userData={parent:spark};sg.visible=false;scene.add(sg);jumpArcSparks.push(sg);
    }
  });
}

function buildFlowingSpines(){
  // YELLOW LIGHTNING EFFICIENCY SPINE — electric current weaving through all phases
  const ePts=[];
  P.forEach((ph,idx)=>{
    const x=PX[ph.id],pz=PZ[ph.id];
    const yTop=dY(S.ps[ph.id]);
    const yBot=dY(S.pe[ph.id]);
    const zOff=1.5+Math.sin(idx*1.2)*0.8;
    // Add micro-jitter for lightning character
    const jx=(Math.random()-0.5)*0.15,jy=(Math.random()-0.5)*0.1;
    ePts.push(new THREE.Vector3(x-0.5+jx,yTop+0.5+jy,pz+zOff));
    ePts.push(new THREE.Vector3(x+0.3+jx,(yTop+yBot)/2,pz+zOff*0.7));
    ePts.push(new THREE.Vector3(x-0.3+jx,yBot-0.3+jy,pz+zOff*0.4));
  });
  const eCurve=new THREE.CatmullRomCurve3(ePts);
  // Hot white core
  const eCore=new THREE.Mesh(new THREE.TubeGeometry(eCurve,120,0.0075,6,false),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false}));
  eCore.visible=false;scene.add(eCore);jumpSpines.push(eCore);
  // Yellow electric glow
  const eGlow=new THREE.Mesh(new THREE.TubeGeometry(eCurve,120,0.03,6,false),
    new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.12,blending:THREE.AdditiveBlending,depthWrite:false}));
  eGlow.visible=false;scene.add(eGlow);jumpSpines.push(eGlow);
  // Wide yellow corona
  const eCorona=new THREE.Mesh(new THREE.TubeGeometry(eCurve,120,0.09,6,false),
    new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.025,blending:THREE.AdditiveBlending,depthWrite:false}));
  eCorona.visible=false;scene.add(eCorona);jumpSpines.push(eCorona);
  // Electric sparks — tiny, fast, phase-hopping
  for(let k=0;k<2;k++){
    const sGeo=new THREE.SphereGeometry(0.013,6,6);
    const sMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.9,blending:THREE.AdditiveBlending});
    const sp=new THREE.Mesh(sGeo,sMat);
    sp.userData={curve:eCurve,t:k/12,speed:0.0045+Math.random()*0.006,isSpine:true,isElectric:true};
    sp.position.copy(eCurve.getPoint(sp.userData.t));sp.visible=false;scene.add(sp);jumpSpineSparks.push(sp);
    const sg=new THREE.Mesh(sGeo,new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.45,blending:THREE.AdditiveBlending}));
    sg.scale.setScalar(2.5);sg.position.copy(sp.position);sg.userData={parent:sp};sg.visible=false;scene.add(sg);jumpSpineSparks.push(sg);
  }

  // RED RISK SPINE — weaves on the other side
  const redPts=[];
  P.forEach((ph,idx)=>{
    const x=PX[ph.id],pz=PZ[ph.id];
    const yTop=dY(S.ps[ph.id]);
    const yBot=dY(S.pe[ph.id]);
    const zOff=-1.5-Math.sin(idx*1.4+0.7)*0.8;
    redPts.push(new THREE.Vector3(x+0.5,yTop+0.3,pz+zOff));
    redPts.push(new THREE.Vector3(x-0.2,(yTop+yBot)/2,pz+zOff*0.6));
    redPts.push(new THREE.Vector3(x+0.4,yBot-0.5,pz+zOff*0.3));
  });
  const redCurve=new THREE.CatmullRomCurve3(redPts);
  const rTube=new THREE.TubeGeometry(redCurve,120,0.01,6,false);
  const rSpine=new THREE.Mesh(rTube,new THREE.MeshBasicMaterial({
    color:0xff3030,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false}));
  rSpine.visible=false;scene.add(rSpine);jumpSpines.push(rSpine);
  // Red spine glow
  const rGlow=new THREE.Mesh(new THREE.TubeGeometry(redCurve,120,0.04,6,false),
    new THREE.MeshBasicMaterial({color:0xff3030,transparent:true,opacity:0.03,blending:THREE.AdditiveBlending,depthWrite:false}));
  rGlow.visible=false;scene.add(rGlow);jumpSpines.push(rGlow);
  // Red flowing sparks — half size, 3x speed
  for(let k=0;k<2;k++){
    const sGeo=new THREE.SphereGeometry(0.013,6,6);
    const sMat=new THREE.MeshBasicMaterial({color:0xff3030,transparent:true,opacity:0.75,blending:THREE.AdditiveBlending});
    const sp=new THREE.Mesh(sGeo,sMat);
    sp.userData={curve:redCurve,t:k/8,speed:0.0024+Math.random()*0.003,isSpine:true};
    sp.position.copy(redCurve.getPoint(sp.userData.t));sp.visible=false;scene.add(sp);jumpSpineSparks.push(sp);
    const sg=new THREE.Mesh(sGeo,new THREE.MeshBasicMaterial({color:0xff3030,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending}));
    sg.scale.setScalar(2);sg.position.copy(sp.position);sg.userData={parent:sp};sg.visible=false;scene.add(sg);jumpSpineSparks.push(sg);
  }
}

const clk=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);const t=clk.getElapsedTime();

  // Camera — spherical coords with pitch, zoom, damping, auto-rotate
  if(!dragging&&performance.now()-lastInteract>4000)autoRotate=true;
  const autoSway=autoRotate&&!dragging?Math.sin(t*.1)*.06:0;
  const cAng=rotA+autoSway;
  const dist=camDistBase*camZoom;
  cam.position.x=Math.sin(cAng)*Math.cos(rotB)*dist;
  cam.position.z=Math.cos(cAng)*Math.cos(rotB)*dist;
  cam.position.y=tgt.y+Math.sin(rotB)*dist+(autoRotate?Math.sin(t*.18)*.4:0);
  cam.lookAt(tgt);

  // Candle flicker
  candle.intensity=1.0+Math.sin(t*3)*.08+Math.sin(t*7.3)*.04;
  candle2.intensity=.5+Math.sin(t*2.5+1)*.06;

  // ── Aura breathing — asymmetric noise-driven + data-driven intensity ──
  orbAnims.forEach(({layers,hit,r,rad,ph,bx,by,bz,b,seed,aiCore,aiLight,cpCore,nebMesh,nebMat,shimmerMat,fMat,origColors},i)=>{
    // Organic sway (not uniform sine)
    const sx=fnoise(t*.35,seed)*0.22;
    const sy=fnoise(t*.5,seed+7)*0.12+fnoise(t*.25,seed+13)*0.06;
    hit.position.x=bx+sx;hit.position.y=by+sy;hit.position.z=bz;

    // Hover bloom multiplier
    const hMul=hit.userData.hovered?1.7:1;
    const hoverAge=hit.userData.hovered?t-hit.userData.hoverStart:0;
    const hoverBloom=hit.userData.hovered?1+Math.max(0,0.4-hoverAge*0.8):1; // Burst then settle

    // Data-driven breathing amplitude: CP orbs breathe deeper, AI orbs shimmer faster
    const cpBreathBoost=1+r.cpRatio*0.4;
    const aiShimmerRate=1+r.aiRatio*0.6;

    const bSizes=[0.3,0.55,0.85,1.2,1.7,2.3];
    const bOps=GL.map(gl=>b*gl.op);

    layers.forEach((layer,li)=>{
      // Reset color to original before any mode tinting
      if(origColors)layer.material.color.copy(origColors[li]);
      // Asymmetric breathing: layered noise, outer layers lag + breathe wider
      const breathPhase=fnoise(t*0.4*aiShimmerRate,seed+li*2.3-li*0.12);
      const breathAmp=(0.04+li*0.02)*cpBreathBoost;
      layer.scale.setScalar(rad*bSizes[li]*(1+breathPhase*breathAmp)*hoverBloom);
      // Opacity swell with breath
      if(!cpM&&!aiM)layer.material.opacity=bOps[li]*(1+breathPhase*.2)*hMul;
      // Wispy drift — outer shells drift more
      const drift=li*0.03;
      layer.position.x=bx+sx+fnoise(t*.5+li*2.1,seed+i)*drift;
      layer.position.y=by+sy+fnoise(t*.42+li*1.7,seed+i+5)*drift;
      layer.position.z=bz+fnoise(t*.33+li*3,seed+i+10)*drift*.5;
    });

    // ── [PRIORITY] AI core pulse — blue heartbeat ──
    if(aiCore){
      const aiPulse=0.6+Math.sin(t*2.5*aiShimmerRate+seed)*0.4;
      aiCore.scale.setScalar((rad*0.18+r.aiRatio*0.12)*(1+aiPulse*0.15)*hoverBloom);
      aiCore.material.opacity=r.aiRatio*(0.4+aiPulse*0.35)*(aiM?1.5:1);
      aiCore.position.x=bx+sx;aiCore.position.y=by+sy;aiCore.position.z=bz;
      if(aiLight){aiLight.intensity=r.aiRatio*(0.4+aiPulse*0.4)*(aiM?2:1);aiLight.position.x=bx+sx;aiLight.position.y=by+sy;aiLight.position.z=bz+0.2}
    }

    // ── [PRIORITY] CP core warmth cycle ──
    if(cpCore){
      const cpWarm=0.7+Math.sin(t*1.2+seed*0.5)*0.3;
      cpCore.scale.setScalar((rad*0.25+r.cpRatio*0.15)*(1+cpWarm*0.1*cpBreathBoost));
      cpCore.material.opacity=(0.3+r.cpRatio*0.4)*cpWarm*(cpM?1.8:1);
      cpCore.position.x=bx+sx;cpCore.position.y=by+sy;cpCore.position.z=bz;
    }

    // Nebula noise update
    if(nebMat){nebMat.uniforms.uTime.value=t;nebMesh.position.x=bx+sx;nebMesh.position.y=by+sy;nebMesh.position.z=bz}

    // Shimmer update
    if(shimmerMat){shimmerMat.uniforms.uTime.value=t}

    // Fresnel pulse — gentle breathing + hover bloom
    if(fMat){
      const fPulse=0.85+fnoise(t*0.6,seed+20)*0.15;
      fMat.uniforms.uPulse.value=fPulse*hMul*hoverBloom;
    }

    // ── DARK FIGHTING NODES: phases beyond currentPhase ──
    const oa2=orbAnims[i];
    if(oa2.dimFactor<1&&!oa2._snagAllStalled){
      const fight=Math.pow(Math.max(0,Math.sin(t*2.0+seed*0.7)),8);
      const flicker=Math.random()>0.97?0.4:0;
      const intensity=fight*0.2+flicker;
      layers.forEach((l,li)=>{
        l.material.color.lerp(oa2.origColors[li],intensity);
        l.material.opacity=[0.25,0.15,0.06,0.03,0.02,0.01][li]+intensity*0.3;
      });
      if(fMat)fMat.uniforms.uPulse.value=0.08+fight*0.6+flicker*0.4;
      if(nebMat)nebMat.uniforms.uNoiseAmp.value=0.35+fight*0.15;
    }

    // ── SNAG VIEW: visual modifications for stalled/moving orbs ──
    const oa=orbAnims[i];
    if(oa._snagAllStalled){
      layers.forEach((layer,li)=>{
        layer.material.color.lerp(new THREE.Color(0xff3030),0.03);
        layer.material.opacity*=0.3;
      });
      if(nebMat){nebMat.uniforms.uTime.value=t*0.15}
      if(fMat){fMat.uniforms.uColor.value.lerp(new THREE.Color(0xff3030),0.05);fMat.uniforms.uPulse.value=0.5+Math.sin(t*0.8)*0.5}
    }else if(oa._snagStalled){
      layers.forEach((layer,li)=>{if(li>=3)layer.material.color.lerp(new THREE.Color(0xffaa30),0.02)});
    }
  });

  // ── CP mode animations ──
  if(cpMode===1){
    cpHighwaySparks.forEach(s=>{
      if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=0.6+Math.sin(t*4+s.userData.t*10)*0.35}
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
  }
  if(cpMode===2){
    orbAnims.forEach(o=>{
      const cpRatio=o.r.ut.filter(tk=>tk.cp).length/Math.max(o.r.ut.length,1);
      o.layers.forEach((l,li)=>{
        if(cpRatio>0.3)l.material.color.lerp(new THREE.Color(0xffd080),cpRatio*0.6);
        else l.material.color.lerp(new THREE.Color(0x1a2040),0.4);
      });
    });
  }
  if(cpMode===3){
    const xs=orbAnims.map(o=>o.bx);
    const minX=Math.min(...xs),maxX=Math.max(...xs);
    const range=maxX-minX||1;
    const wavePos=minX+((t*0.15)%1)*range;
    orbAnims.forEach(o=>{
      const proximity=Math.max(0,1-Math.abs(o.bx-wavePos)/(range*0.12));
      const bOps=GL.map(gl=>o.b*gl.op);
      o.layers.forEach((l,li)=>{
        if(o.r.cp){l.material.opacity=bOps[li]*(0.3+proximity*3);l.material.color.lerp(new THREE.Color(0xffd080),proximity*0.5);}
        else{l.material.opacity=bOps[li]*0.04;}
      });
    });
  }
  if(cpMode===4){
    orbAnims.forEach(o=>{
      const targetY=o.r.cp?2.5:-2;
      if(!o._cpRevealY)o._cpRevealY=0;
      o._cpRevealY+=(targetY-o._cpRevealY)*0.04;
      const bOps=GL.map(gl=>o.b*gl.op);
      o.layers.forEach((l,li)=>{
        l.position.y=o.by+o._cpRevealY;
        l.material.opacity+=(bOps[li]*(o.r.cp?2.5:0.03)-l.material.opacity)*0.04;
        if(o.r.cp)l.material.color.lerp(new THREE.Color(0xffd080),0.01);
      });
      if(o.nebMesh)o.nebMesh.position.y=o.by+o._cpRevealY;
    });
  }

  // ── Pillar aura float + breathe ──
  pillarAnims.forEach((a,i)=>{a.position.y=OY+.8+Math.sin(t*.6+i*.5)*.15;const br=1+Math.sin(t*.8+i*.7)*.08;a.scale.setScalar((i%2?0.6:0.35)*br)});

  // ── DfD aura pulse ──

  // ── Wisp movement + trail update ──
  wisps.forEach(w=>{
    const u=w.data;const a=t*u.speed+u.offset;
    // Track parent orb sway
    let ox=0,oy=0;
    for(const o of orbAnims){if(Math.abs(o.bx-u.cx)<.01&&Math.abs(o.by-u.cy)<.01){ox=o.hit.position.x-o.bx;oy=o.hit.position.y-o.by;break}}
    const nx=u.cx+ox+Math.cos(a)*u.orbit*Math.cos(u.tilt);
    const ny=u.cy+oy+Math.sin(a)*u.orbit*.6;
    const nz=(u.cz||0)+Math.sin(a)*u.orbit*Math.sin(u.tilt);
    w.mesh.position.set(nx,ny,nz);
    w.mesh.material.opacity=.4+Math.sin(t*2.5+u.offset*5)*.35;

    // Shift trail positions (newest at index 0)
    const tp=w.trailPositions;
    for(let j=w.trailLen-1;j>0;j--){tp[j*3]=tp[(j-1)*3];tp[j*3+1]=tp[(j-1)*3+1];tp[j*3+2]=tp[(j-1)*3+2]}
    tp[0]=nx;tp[1]=ny;tp[2]=nz;
    w.trail.attributes.position.needsUpdate=true;
  });

  // ── Hover pulse rings ──
  for(let i=pulseRings.length-1;i>=0;i--){
    const pr=pulseRings[i];const age=t-pr.userData.birth;
    if(age<0)continue;
    if(age>pr.userData.maxLife){scene.remove(pr);pr.geometry.dispose();pr.material.dispose();pulseRings.splice(i,1);continue}
    const prog=age/pr.userData.maxLife;
    const sc=pr.userData.startScale+(pr.userData.endScale-pr.userData.startScale)*prog;
    pr.scale.setScalar(sc);pr.material.opacity=0.5*(1-prog)*(1-prog);
    pr.lookAt(cam.position);
  }

  // ── God ray slow rotation + flicker ──
  godRays.forEach((r,i)=>{r.rotation.y+=(0.0003+i*0.00005);r.material.opacity=0.7+Math.sin(t*0.8+i*1.5)*0.3});

  // Spell sparks along chains
  sparks.forEach(s=>{if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;const pt=s.userData.curve.getPoint(s.userData.t);s.position.copy(pt);s.material.opacity=.7+Math.sin(t*5+s.userData.t*12)*.3}
  else if(s.userData.parent){s.position.copy(s.userData.parent.position)}});

  // Cold mist drift
  const mp=mG.attributes.position.array;
  for(let i=0;i<mC;i++){mp[i*3]+=Math.sin(t*.12+i*.4)*.002;mp[i*3+1]+=mSp[i]*.4;mp[i*3+2]+=Math.cos(t*.08+i)*.001;if(mp[i*3+1]>OY+11){mp[i*3+1]=OY-13;mp[i*3]=(Math.random()-.5)*55}}
  mG.attributes.position.needsUpdate=true;

  // Warm dust
  const dp=dG.attributes.position.array;
  for(let i=0;i<dC;i++){dp[i*3]+=Math.sin(t*.3+i*.7)*.003;dp[i*3+1]+=dSp[i];dp[i*3+2]+=Math.cos(t*.25+i)*.002;if(dp[i*3+1]>OY+10){dp[i*3+1]=OY-10;dp[i*3]=(Math.random()-.5)*40}}
  dG.attributes.position.needsUpdate=true;

  // Sparkle twinkle
  sparklePoints.material.opacity=.45+Math.sin(t*4)*.3;
  const sp2=sG.attributes.position.array;
  for(let i=0;i<sC;i++){sp2[i*3]+=Math.sin(t*.5+i)*.001;sp2[i*3+1]+=.001;if(sp2[i*3+1]>OY+8){sp2[i*3+1]=OY-6;sp2[i*3]=(Math.random()-.5)*35}}
  sG.attributes.position.needsUpdate=true;

  // ── Snag cascade sparks ──
  if(snagM){
    snagSparks.forEach(s=>{
      if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=.7+Math.sin(t*6+s.userData.t*15)*.3}
      else if(s.userData.parent){s.position.copy(s.userData.parent.position)}
    });
    // Punch list orbit
    punchOrbs.forEach(o=>{
      if(o.userData.pl){
        const a=t*o.userData.speed+o.userData.angle;
        o.position.x=o.userData.cx+Math.cos(a)*o.userData.orbitR;
        o.position.y=o.userData.cy+Math.sin(a)*o.userData.orbitR*0.5;
        // Pulse unresolved items
        if(!o.userData.pl.resolved){o.material.opacity=0.6+Math.sin(t*3+o.userData.angle)*0.35}
      }else if(o.userData.parentOrb){
        o.position.copy(o.userData.parentOrb.position);
      }else if(o.userData.fMat){
        o.position.copy(o.userData.parentOrb.position);
        o.userData.fMat.uniforms.uPulse.value=0.6+Math.sin(t*2)*0.4;
      }
    });
    if(punchTorusRing)punchTorusRing.scale.setScalar(1+Math.sin(t*0.8)*0.05);
  }

  // ── Phase Jump: lightning arc sparks + electric spines ──
  if(jumpM){
    // Lightning arc sparks — tiny, fast, phase-hopping on Y axis
    jumpArcSparks.forEach(s=>{
      if(s.userData.curve){
        s.userData.t=(s.userData.t+s.userData.speed)%1;
        s.position.copy(s.userData.curve.getPoint(s.userData.t));
        // Lightning flicker
        const flicker=Math.random()>0.85?1.0:0.4+Math.sin(t*12+s.userData.t*20)*0.35;
        s.material.opacity=flicker;
        // Phase-hop: big Y reach + small X jitter
        s.position.y+=(Math.random()-0.5)*1.8;
        s.position.x+=(Math.random()-0.5)*0.15;
        s.position.z+=(Math.random()-0.5)*0.3;
      }
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
    // Spine sparks — tiny, fast, far-reaching Y phase-hops
    jumpSpineSparks.forEach(s=>{
      if(s.userData.curve){
        s.userData.t=(s.userData.t+s.userData.speed)%1;
        s.position.copy(s.userData.curve.getPoint(s.userData.t));
        if(s.userData.isElectric){
          // Electric flicker + huge Y phase-hop
          const flicker=Math.random()>0.9?1.0:0.5+Math.sin(t*10+s.userData.t*16)*0.4;
          s.material.opacity=flicker;
          s.position.y+=(Math.random()-0.5)*2.2;
          s.position.x+=(Math.random()-0.5)*0.12;
          s.position.z+=(Math.random()-0.5)*0.25;
        }else{
          // Red risk sparks — also phase-hop but less extreme
          s.material.opacity=.5+Math.sin(t*5+s.userData.t*12)*.4;
          s.position.y+=(Math.random()-0.5)*1.4;
          s.position.x+=(Math.random()-0.5)*0.08;
        }
      }
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
    // Lightning bolt flicker on arc tubes
    jumpArcs.forEach(m=>{
      if(m.visible&&m.material.opacity>0.5){
        // Core bolts flicker like real lightning
        m.material.opacity=0.7+Math.random()*0.3+(Math.random()>0.92?0.2:0);
      }
    });
    // Yellow electric tint on jump-highlighted orbs
    orbAnims.forEach((oa,i)=>{
      if(oa._jumpAll){
        oa.layers.forEach((layer,li)=>{layer.material.color.lerp(new THREE.Color(0xFFE500),0.02)});
        if(oa.fMat)oa.fMat.uniforms.uColor.value.lerp(new THREE.Color(0xFFE500),0.03);
      }else if(oa._jumpHighlight){
        oa.layers.forEach((layer,li)=>{if(li>=2)layer.material.color.lerp(new THREE.Color(0xFFE500),0.01)});
      }
    });
  }

  // ── Wifi Web flicker ──
  if(typeof wifiSparks!=='undefined')wifiSparks.forEach(ws=>{
    if(ws.userData.curve){
      ws.userData.t=(ws.userData.t+ws.userData.speed)%1;
      ws.position.copy(ws.userData.curve.getPoint(ws.userData.t));
      const wifiStrike=Math.sin(t*6+ws.userData.wifiSeed)>0.9?1.4:1.0;
      ws.material.opacity=(0.4+Math.sin(t*3+ws.userData.wifiSeed)*0.3)*wifiStrike;
    }
  });

  // Semantic spine removed — single project

  // Equity transfer removed — single project

  // Ground rune pulse
  grnd.material.emissiveIntensity=.02+Math.sin(t*.4)*.01;

  rnd.render(scene,cam);
}
animate();
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;cam.aspect=W/H;cam.updateProjectionMatrix();rnd.setSize(W,H)});
</script>
</body>
</html>
