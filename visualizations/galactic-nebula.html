function computeSnagCascade(){
  const stalled=new Set(),depths={};
  const allTasks={},depOf={};
  P.forEach(ph=>{ph.t.forEach(t=>{allTasks[t.id]=t;t.dp.forEach(d=>{if(!depOf[d])depOf[d]=[];depOf[d].push(t.id)})})});
  const stalledPhases=new Set();
  SNAGS.forEach(s=>{
    stalled.add(s.task);depths[s.task]=0;
    const queue=[{id:s.task,depth:0}];
    while(queue.length){
      const{id,depth}=queue.shift();
      (depOf[id]||[]).forEach(did=>{
        if(!stalled.has(did)){stalled.add(did);depths[did]=depth+1;queue.push({id:did,depth:depth+1})}
      });
    }
    stalledPhases.add(s.phase);
  });
  P.forEach(ph=>{
    if(ph.bb.some(b=>stalledPhases.has(b))){
      stalledPhases.add(ph.id);
      const maxD=Math.max(...Object.values(depths),0);
      ph.t.forEach(t=>{if(!stalled.has(t.id)){stalled.add(t.id);depths[t.id]=maxD+1}});
    }
  });
  return{stalled,depths,stalledPhases};
}

function compute(){
  const pd={},ps={},pe={};P.forEach(p=>{pd[p.id]=Math.round((p.dr[0]+p.dr[1])/2)});
  ps[1]=1;pe[1]=pd[1];for(let i=2;i<=4;i++){ps[i]=pe[i-1]+1;pe[i]=ps[i]+pd[i]-1}
  ps[5]=pe[4]+1;pe[5]=ps[5]+pd[5]-1;ps[6]=pe[4]+1;pe[6]=ps[6]+pd[6]-1;
  ps[7]=Math.max(pe[5],pe[6])+1;pe[7]=ps[7]+pd[7]-1;ps[8]=pe[7]+1;pe[8]=ps[8]+pd[8]-1;ps[9]=pe[8]+1;pe[9]=ps[9]+pd[9]-1;
  const all=[];P.forEach(ph=>{const pS=ps[ph.id],tm={};ph.t.forEach(t=>{tm[t.id]=t});const ls={};
  function g(i){if(ls[i]!==undefined)return ls[i];const t=tm[i];if(!t.dp.length){ls[i]=0;return 0}let m=0;t.dp.forEach(d=>{if(tm[d]){const e=g(d)+tm[d].d;if(e>m)m=e}});ls[i]=m;return m}
  ph.t.forEach(t=>{const l=g(t.id);all.push({pi:ph.id,ti:t.id,n:t.n,s:pS+l,e:pS+l+t.d-1,d:t.d,cp:t.cp,df:t.df,ai:t.ai})})});
  return{ps,pe,td:pe[9],all};}
const S=compute();
const DG={};S.all.forEach(t=>{for(let d=t.s;d<=t.e;d++){const k=d+'-'+t.pi;if(!DG[k])DG[k]=[];DG[k].push(t)}});

function buildR(){
  const R=[];P.forEach(ph=>{let c=null;
  for(let d=S.ps[ph.id];d<=S.pe[ph.id];d++){const tk=DG[d+'-'+ph.id]||[],n=tk.length;
    if(!n){if(c){R.push(c);c=null}continue}
    const sp=c&&(n>c.pk*2.5||n<c.av*0.3);
    if(!c||sp){if(c)R.push(c);c={pi:ph.id,ds:d,de:d,bd:{[d]:tk},pk:n,tot:n,dc:1,av:n,cp:tk.some(t=>t.cp),df:tk.some(t=>t.df),ai:tk.some(t=>t.ai),ids:new Set(tk.map(t=>t.ti))}
    }else{c.de=d;c.bd[d]=tk;c.pk=Math.max(c.pk,n);c.tot+=n;c.dc++;c.av=c.tot/c.dc;if(tk.some(t=>t.cp))c.cp=1;if(tk.some(t=>t.df))c.df=1;if(tk.some(t=>t.ai))c.ai=1;tk.forEach(t=>c.ids.add(t.ti))}}
  if(c)R.push(c)});
  R.forEach(r=>{r.ut=[];const s=new Set();for(let d=r.ds;d<=r.de;d++){(r.bd[d]||[]).forEach(t=>{if(!s.has(t.ti)){s.add(t.ti);r.ut.push(t)}})}r.int=r.av});
  const mx=Math.max(...R.map(r=>r.int),1);R.forEach(r=>{r.br=0.12+(r.int/mx)*0.88});return R;}

const NOISE_GLSL=`
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
  i=mod(i,289.0);
  vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=1.0/7.0;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}`;

void main(){vN=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(position,1.0);vV=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;}`;

void main(){float f=pow(1.0-max(dot(vN,vV),0.0),uPower);gl_FragColor=vec4(uColor,f*uOpacity*uPulse);}`;

  const t=i/(SPIRAL_PHASES.length-1); // 0 to 1
  const angle=t*Math.PI*2*SPIRAL_TURNS-Math.PI/2;
  const x=Math.cos(angle)*SPIRAL_RADIUS;
  const y=t*SPIRAL_HEIGHT-SPIRAL_HEIGHT/2; // spread vertically within group

  PP[ph.id]={x,y,z,angle};
});

      const mx=(a.x+b2.x)/2,my=(a.by+b2.by)/2+1.2,mz=(a.z+b2.z)/2;
      const curve=new THREE.CatmullRomCurve3([
        new THREE.Vector3(a.x,a.by,a.z),

        new THREE.Vector3(b2.x,b2.by,b2.z)
      ]);
      const core=new THREE.Mesh(new THREE.TubeGeometry(curve,36,0.04,6,false),
        new THREE.MeshBasicMaterial({color:0xffd080,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending,depthWrite:false}));
      core.visible=false;projGroups[pi].add(core);cpHighway.push(core);
      const glow=new THREE.Mesh(new THREE.TubeGeometry(curve,36,0.15,6,false),
        new THREE.MeshBasicMaterial({color:0xd4a54a,transparent:true,opacity:0.08,blending:THREE.AdditiveBlending,depthWrite:false}));

        sgl.scale.setScalar(3);sgl.userData={parent:sp};sgl.visible=false;projGroups[pi].add(sgl);cpHighwaySparks.push(sgl);
      }
    }
  });
}

// ═══════════════════ WIFI WEB — Parabolic Arc Canopy (per-project) ═══════════════════
const wifiArcs=[];
function makeBoltCurve(p1,p2,segs,jAmt){
  const pts=[];
  for(let s=0;s<=segs;s++){const f=s/segs;const p=new THREE.Vector3().lerpVectors(p1,p2,f);
    if(s>0&&s<segs){p.x+=(Math.random()-0.5)*jAmt;p.y+=(Math.random()-0.5)*jAmt;p.z+=(Math.random()-0.5)*jAmt*0.4;}
    pts.push(p);}
  return new THREE.CatmullRomCurve3(pts);
}
function buildWifiWeb(group){
  const nodes=[];
  P.forEach(p=>{const pos=PP[p.id];nodes.push(new THREE.Vector3(pos.x,pos.y,pos.z));});
  nodes.push(new THREE.Vector3(0,0,0)); // core point
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const p1=nodes[i],p2=nodes[j];
      // Parabolic arc: Y height scales with distance between phases (canopy effect)
      const dist=p1.distanceTo(p2);
      const midY=1.0+dist*0.15; // longer connections arc higher
      const mid=new THREE.Vector3((p1.x+p2.x)/2,midY,(p1.z+p2.z)/2);
      const mainCurve=makeBoltCurve(p1,new THREE.Vector3(mid.x,mid.y,mid.z),10,0.5);
      // But we want full arc — use 3 control points
      const arcPts=[];
      for(let s=0;s<=10;s++){
        const f=s/10;
        const bx=p1.x+(p2.x-p1.x)*f+(Math.random()-0.5)*0.3*(s>0&&s<10?1:0);
        const by=p1.y+(p2.y-p1.y)*f+Math.sin(f*Math.PI)*midY+(Math.random()-0.5)*0.15*(s>0&&s<10?1:0);
        const bz=p1.z+(p2.z-p1.z)*f+(Math.random()-0.5)*0.2*(s>0&&s<10?1:0);
        arcPts.push(new THREE.Vector3(bx,by,bz));
      }
      const boltCurve=new THREE.CatmullRomCurve3(arcPts);
      const wc=new THREE.Mesh(new THREE.TubeGeometry(boltCurve,14,0.004,4,false),
        new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.45,blending:THREE.AdditiveBlending,depthWrite:false}));
      wc.userData={_baseOp:0.45,isBolt:true};group.add(wc);wifiArcs.push(wc);
      const wg=new THREE.Mesh(new THREE.TubeGeometry(boltCurve,14,0.020,4,false),
        new THREE.MeshBasicMaterial({color:0xFFE500,transparent:true,opacity:0.054,blending:THREE.AdditiveBlending,depthWrite:false}));
      wg.userData={_baseOp:0.054};group.add(wg);wifiArcs.push(wg);
      // 2 fork tendrils per connection
      for(let f=0;f<2;f++){
        const bt=0.15+Math.random()*0.7;
        const bStart=boltCurve.getPoint(bt);
        const tang=boltCurve.getTangent(bt);
        const side=Math.random()>0.5?1:-1;
        const bLen=0.2+Math.random()*0.5;
        const bEnd=new THREE.Vector3(
          bStart.x+tang.x*bLen*0.2+(Math.random()-0.5)*bLen*0.6,
          bStart.y+side*bLen*(0.3+Math.random()*0.4),
          bStart.z+(Math.random()-0.5)*bLen*0.4);
        const fg=new THREE.Mesh(new THREE.SphereGeometry(0.012,6,6),
          new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.3,blending:THREE.AdditiveBlending}));
        fg.position.copy(bStart);fg.userData={_baseOp:0.3,isFork:true};group.add(fg);wifiArcs.push(fg);

function buildCascadeTendrils(){
  const{stalled,depths,stalledPhases}=computeSnagCascade();
  const sortedPhases=[...stalledPhases].sort((a,b)=>a-b);
  for(let i=0;i<sortedPhases.length-1;i++){
    const a=sortedPhases[i],b=sortedPhases[i+1];
    const pA=PP[a],pB=PP[b];
    const depth=Math.min(...P.find(p=>p.id===b).t.map(t=>depths[t.id]||99));
    const col=new THREE.Color(cascadeColor(depth));
    const mx=(pA.x+pB.x)/2,my=(pA.y+pB.y)/2+1.5,mz=(pA.z+pB.z)/2;
    const curve=new THREE.CatmullRomCurve3([new THREE.Vector3(pA.x,pA.y,pA.z),new THREE.Vector3(mx,my,mz),new THREE.Vector3(pB.x,pB.y,pB.z)]);
    const tMesh=new THREE.Mesh(new THREE.TubeGeometry(curve,36,0.04,6,false),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false}));
    tMesh.visible=false;projGroups[0].add(tMesh);snagTendrils.push(tMesh);
    const gMesh=new THREE.Mesh(new THREE.TubeGeometry(curve,36,0.15,6,false),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.08,blending:THREE.AdditiveBlending,depthWrite:false}));
    gMesh.visible=false;projGroups[0].add(gMesh);snagTendrils.push(gMesh);
    for(let j=0;j<6;j++){
      const sG=new THREE.SphereGeometry(0.04,6,6);
      const sp=new THREE.Mesh(sG,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.9,blending:THREE.AdditiveBlending}));
      sp.userData={curve,t:j/6,speed:0.004+Math.random()*0.005};
      sp.position.copy(curve.getPoint(sp.userData.t));sp.visible=false;projGroups[0].add(sp);snagSparks2.push(sp);
      const sg=new THREE.Mesh(sG,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.35,blending:THREE.AdditiveBlending}));
      sg.scale.setScalar(3);sg.position.copy(sp.position);sg.userData={parent:sp};sg.visible=false;projGroups[0].add(sg);snagSparks2.push(sg);

  return{stalled,depths};
}

// ═══════════════════ VERTICAL SPINE — Semantic Connections ═══════════════════
const spineMeshes=[];const spineGlows=[];
function getSpineRelation(phaseId, piA, piB){
  const projA=PROJECTS[piA],projB=PROJECTS[piB];
  const aComplete=phaseId<=projA.currentPhase;
  const bComplete=phaseId<=projB.currentPhase;
  const phase=P.find(p=>p.id===phaseId);
  if(!phase)return{type:'none',color:0x7aa0ff,opacity:0.04,glowOp:0};
  const isSnagPhase=SNAGS.some(s=>s.phase===phaseId);
  const punchCount=PUNCH_LIST.filter(p=>p.phase===phaseId&&!p.resolved).length;
  const isPainPoint=isSnagPhase||punchCount>=2;
  const dfCount=phase.t.filter(t=>t.df).length;
  const cpCount2=phase.t.filter(t=>t.cp).length;
  const isBuilderCredit=dfCount>=2||cpCount2>=4;
  const isMilestone=aComplete&&bComplete;
  const oneComplete=aComplete||bComplete;
  if(isPainPoint&&oneComplete)return{type:'pain',color:0xff3030,opacity:0.25,glowOp:0.06};
  if(isBuilderCredit&&isMilestone)return{type:'credit',color:0xffd080,opacity:0.22,glowOp:0.05};
  if(isMilestone)return{type:'milestone',color:0x22C55E,opacity:0.18,glowOp:0.04};
  if(oneComplete)return{type:'partial',color:0x22C55E,opacity:0.07,glowOp:0};
  return{type:'none',color:0x7aa0ff,opacity:0.04,glowOp:0};
}

    })

  // Spark glow

  );
  sparkGlow.userData = { parent: spark };

  scene.add(sparkGlow); loanStrands.push(sparkGlow);

  // Store data for dynamic curve rebuilding
  loanStrandData.push({ core, glow, spark, sparkGlow, piFrom: pi, piTo: pi + 1 });
});

// ═══════════════════ ANIMATE ═══════════════════
const clk=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);const t=clk.getElapsedTime();

  // ── Orbital camera ──
  const autoOrbit=dragging?0:t*0.04;
  const angle=camOrbitAngle+autoOrbit;
  cam.position.x=Math.sin(angle)*Math.cos(camTilt)*camDist+tgt.x;
  cam.position.y=Math.sin(camTilt)*camDist+tgt.y;
  cam.position.z=Math.cos(angle)*Math.cos(camTilt)*camDist+tgt.z;
  cam.lookAt(tgt);

  // Core glow pulse
  coreGlow.intensity=0.6+Math.sin(t*0.5)*0.15;
  blueStar.intensity=0.8+Math.sin(t*1.2)*0.1;
  bStarPts.material.opacity=0.7+Math.sin(t*3)*0.25;

  // ── Aura breathing ──
  orbAnims.forEach((o,i)=>{
    const{layers,hit,r,rad,ph,bx,by,bz,b,seed,aiCore,aiLight,cpCore,nebMesh,nebMat,fMat,origColors,dimFactor}=o;
    const breathSpeed=dimFactor<1?0.1:0.3;
    const sx=fnoise(t*breathSpeed,seed)*0.2;
    const sy=fnoise(t*breathSpeed*1.3,seed+7)*0.12;
    const sz=fnoise(t*breathSpeed*0.9,seed+14)*0.15;
    hit.position.x=bx+sx;hit.position.y=by+sy;hit.position.z=bz+sz;

    const hMul=hit.userData.hovered?1.8:1;
    const hAge=hit.userData.hovered?t-hit.userData.hoverStart:0;
    const hBloom=hit.userData.hovered?1+Math.max(0,0.5-hAge*0.7):1;

    const bSizes=[0.35,0.6,0.9];

    layers.forEach((l,li)=>{
      const bri=fnoise(t*(dimFactor<1?0.15:0.4),seed+li*2.3);
      if(dimFactor>=1) l.material.color.copy(origColors[li]);
      const amp=0.045+li*0.022;
      l.scale.setScalar(rad*bSizes[li]*(1+bri*amp)*hBloom);
      if(!cpM&&!aiM){
        if(dimFactor>=1) l.material.opacity=GL[li].op*(1+bri*0.2)*hMul*dimFactor;
      }
      l.position.x=bx+sx+fnoise(t*0.5+li*2,seed+i)*li*0.02;
      l.position.y=by+sy+fnoise(t*0.4+li*1.8,seed+i+5)*li*0.02;
      l.position.z=bz+sz+fnoise(t*0.35+li*2.5,seed+i+10)*li*0.02;
    });

    // Dark fighting nodes animation
    if(dimFactor<1&&!o._snagAllStalled){
      const fight=Math.pow(Math.max(0,Math.sin(t*2.0+seed*0.7)),8);
      const flicker=Math.random()>0.97?0.4:0;
      const intensity=fight*0.2+flicker;
      layers.forEach((l,li)=>{
        l.material.color.lerp(origColors[li],intensity);
        l.material.opacity=[0.25,0.15,0.06][li]+intensity*0.3;
      });
      if(fMat)fMat.uniforms.uPulse.value=0.08+fight*0.6+flicker*0.4;
      if(nebMat)nebMat.uniforms.uNoiseAmp.value=0.35+fight*0.15;
    }

    // AI core pulse
    if(aiCore){
      const p=0.55+Math.sin(t*2.2+seed)*0.45;
      aiCore.scale.setScalar((rad*0.2+r.aiRatio*0.15)*(1+p*0.15));
      aiCore.material.opacity=r.aiRatio*(0.4+p*0.35)*(aiM?1.5:1)*(dimFactor<1?0.05:1);
      aiCore.position.set(bx+sx,by+sy,bz+sz);
      if(aiLight){aiLight.intensity=r.aiRatio*(0.35+p*0.4)*(aiM?2:1)*(dimFactor<1?0.05:1);aiLight.position.set(bx+sx,by+sy,bz+sz)}}
    if(cpCore){
      const w=0.65+Math.sin(t*1.1+seed*0.5)*0.35;
      cpCore.scale.setScalar((rad*0.25+r.cpRatio*0.15)*(1+w*0.1));cpCore.material.opacity=(0.3+r.cpRatio*0.35)*w*(cpM?1.8:1)*(dimFactor<1?0.05:1);
      cpCore.position.set(bx+sx,by+sy,bz+sz);}
    if(nebMat){nebMat.uniforms.uTime.value=t;nebMesh.position.set(bx+sx,by+sy,bz+sz)}
    if(fMat&&dimFactor>=1){fMat.uniforms.uPulse.value=(0.85+fnoise(t*0.55,seed+20)*0.15)*hMul*hBloom}

    // ── SNAG: red heartbeat ──
    if(o._snagAllStalled){
      const heartbeat=Math.pow(Math.max(0,Math.sin(t*3.5+seed)),8);
      const redPulse=0.4+heartbeat*0.6;
      layers.forEach((l,li)=>{
        const redShift=li>=1?heartbeat*0.08:heartbeat*0.03;
        l.material.color.lerp(new THREE.Color(0xff2020),redShift);
        const beatScale=1+heartbeat*(0.15+li*0.05);
        l.scale.setScalar(rad*bSizes[li]*beatScale);
        l.material.opacity=GL[li].op*(0.15+redPulse*0.6);
      });
      if(nebMat){nebMat.uniforms.uNoiseAmp.value=0.15+heartbeat*0.4;nebMat.uniforms.uColor.value.lerp(new THREE.Color(0xff3030),heartbeat*0.1)}
      if(fMat){fMat.uniforms.uColor.value.lerp(new THREE.Color(0xff2020),heartbeat*0.12);fMat.uniforms.uPulse.value=0.3+heartbeat*1.2}
    }else if(o._snagStalled){
      const flicker2=Math.random()>0.92?0.06:0;
      layers.forEach((l,li)=>{if(li>=1){l.material.color.lerp(new THREE.Color(0xff4040),0.015+flicker2);l.material.opacity*=(0.85+Math.sin(t*5+seed)*0.15)}});
    }
  });

  // ── CP mode animations ──
  if(cpMode===1){
    cpHighwaySparks.forEach(s=>{
      if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=0.6+Math.sin(t*4+s.userData.t*10)*0.35}
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
  }
  if(cpMode===2){
    orbAnims.forEach(o=>{
      const cpRatio=o.r.ut.filter(t2=>t2.cp).length/Math.max(o.r.ut.length,1);
      o.layers.forEach(l=>{l.material.color.lerp(new THREE.Color(0xffd080),cpRatio*0.5)});
    });
  }
  if(cpMode===3){
    const xs=orbAnims.map(o=>o.x);
    const minX=Math.min(...xs),maxX=Math.max(...xs);
    const range=maxX-minX||1;
    const wavePos=minX+((t*0.15)%1)*range;
    orbAnims.forEach(o=>{
      const proximity=Math.max(0,1-Math.abs(o.x-wavePos)/(range*0.12));
      o.layers.forEach((l,li)=>{
        const hasCp=o.r.cp;
        if(hasCp){l.material.opacity=GL[li].op*(0.3+proximity*3)*o.dimFactor;l.material.color.lerp(new THREE.Color(0xffd080),proximity*0.5);}
        else{l.material.opacity=GL[li].op*0.04*o.dimFactor;}
      });
    });
  }
  if(cpMode===4){
    orbAnims.forEach(o=>{
      const targetY=o.r.cp?2.5:-2;
      if(!o._cpRevealY)o._cpRevealY=0;
      o._cpRevealY+=(targetY-o._cpRevealY)*0.04;
      o.layers.forEach((l,li)=>{
        l.position.y=o.by+o._cpRevealY;
        const hasCp=o.r.cp;
        l.material.opacity+=(GL[li].op*(hasCp?2.5:0.03)*o.dimFactor-l.material.opacity)*0.04;
        if(hasCp)l.material.color.lerp(new THREE.Color(0xffd080),0.01);
      });
    });
  }

  // Connection sparks
  connSparks.forEach(s=>{if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=0.6+Math.sin(t*4+s.userData.t*10)*0.35}
  else if(s.userData.parent){s.position.copy(s.userData.parent.position)}});

  // Wifi web electrical flicker
  const wifiStrike=Math.sin(t*6)>0.9?1.4:1.0;
  wifiArcs.forEach(m=>{
    const base=m.userData._baseOp||0.1;
    if(m.userData.isBolt){m.material.opacity=base*(0.6+Math.random()*0.4)*wifiStrike;}
    else if(m.userData.isFork){m.material.opacity=base*(Math.random()>0.3?1.0:0.2)*wifiStrike;}
    else{m.material.opacity=base*(0.5+Math.random()*0.5)*wifiStrike;}
  });

  // Pulse rings
  for(let i=pulseRings.length-1;i>=0;i--){
    const pr=pulseRings[i];const age=t-pr.userData.birth;
    if(age<0)continue;
    if(age>pr.userData.maxLife){scene.remove(pr);pr.geometry.dispose();pr.material.dispose();pulseRings.splice(i,1);continue}
    const prog=age/pr.userData.maxLife;
    pr.scale.setScalar(pr.userData.startScale+(pr.userData.endScale-pr.userData.startScale)*prog);
    pr.material.opacity=0.4*(1-prog)*(1-prog);
    pr.lookAt(cam.position);
  }

  // Cosmic dust drift
  const dp=dG.attributes.position.array;
  for(let i=0;i<dC;i++){const a2=t*0.02+i*0.01;dp[i*3]+=Math.sin(a2)*0.002;dp[i*3+1]+=dSp[i]*0.3;dp[i*3+2]+=Math.cos(a2)*0.002;if(dp[i*3+1]>PROJECTS.length*PROJ_SPACING+10){dp[i*3+1]=-5}}
  dG.attributes.position.needsUpdate=true;
  sparklePts.material.opacity=0.4+Math.sin(t*3.5)*0.35;

  // ── Snag cascade sparks + punch list asteroids ──
  if(snagM){
    snagSparks2.forEach(s=>{
      if(s.userData.curve){s.userData.t=(s.userData.t+s.userData.speed)%1;s.position.copy(s.userData.curve.getPoint(s.userData.t));s.material.opacity=.7+Math.sin(t*6+s.userData.t*15)*.3}
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
    punchOrbs.forEach(o=>{
      if(o.userData.pl){
        const a=t*o.userData.speed+o.userData.angle;
        o.position.x=o.userData.cx+Math.cos(a)*o.userData.beltR;
        o.position.y=o.userData.cy+Math.sin(a+o.userData.tilt)*o.userData.beltR*0.3;
        o.position.z=o.userData.cz+Math.sin(a)*o.userData.beltR;
        o.rotation.x+=0.01;o.rotation.y+=0.015;
        if(!o.userData.pl.resolved)o.material.opacity=0.6+Math.sin(t*3+o.userData.angle)*0.35;
      }else if(o.userData.parentOrb)o.position.copy(o.userData.parentOrb.position);
    });
  }

  // ── Phase Jump: lightning sparks ──
  if(jumpM){
    jumpArcSparks.forEach(s=>{
      if(s.userData.curve){
        s.userData.t=(s.userData.t+s.userData.speed)%1;
        s.position.copy(s.userData.curve.getPoint(s.userData.t));
        const flicker=Math.random()>0.85?1.0:0.4+Math.sin(t*12+s.userData.t*20)*0.35;
        s.material.opacity=flicker;
        s.position.y+=(Math.random()-0.5)*1.8;
        s.position.x+=(Math.random()-0.5)*0.15;
        s.position.z+=(Math.random()-0.5)*0.3;
      }
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
    jumpArcs.forEach(m=>{
      if(m.visible&&m.material.opacity>0.5){
        m.material.opacity=0.65+Math.random()*0.35+(Math.random()>0.92?0.2:0);
      }
    });
    orbAnims.forEach(oa=>{
      if(oa._jumpHighlight){
        oa.layers.forEach((l,li)=>{if(li>=1)l.material.color.lerp(new THREE.Color(0xFFE500),0.01)});
      }
    });
  }

  // ── Project Intelligence node pulse + strand sparks ──
  if(aiM){
    const aiPulse=1+Math.sin(t*1.5)*0.12;
    aiNodeCore.scale.setScalar(1.2*aiPulse);
    aiNodeGlow.scale.setScalar(2.0*(1+Math.sin(t*0.8)*0.08));
    aiNodeCorona.scale.setScalar(3.5*(1+Math.sin(t*0.5)*0.05));
    aiNodeLight.intensity=1.2+Math.sin(t*1.5)*0.3;
    aiStrandSparks.forEach(s=>{
      if(s.userData.curve){
        s.userData.t=(s.userData.t+s.userData.speed)%1;
        s.position.copy(s.userData.curve.getPoint(s.userData.t));
        s.material.opacity=0.6+Math.sin(t*3+s.userData.t*8)*0.3;
      }
      else if(s.userData.parent)s.position.copy(s.userData.parent.position)
    });
  }

  // ── Semantic spine glow animation ──
  spineGlows.forEach(sg=>{
    const pulse=0.7+Math.sin(t*2+sg.phaseId*0.5)*0.3;
    sg.mesh.material.opacity=sg.baseOp*pulse;
    // Update glow Y positions for slider/equity split
    const y0=(sg.pi-1)*PROJ_SPACING*stackVal+eqSplitCurrent[sg.pi-1];
    const y1=sg.pi*PROJ_SPACING*stackVal+eqSplitCurrent[sg.pi];
    const pos=PP[sg.phaseId];
    sg.mesh.position.set(pos.x,(y0+y1)/2,pos.z);
    sg.mesh.scale.y=Math.abs(y1-y0)/PROJ_SPACING||0.01;
  });

  // ═══ Equity Transfer animations ═══
  if(eqM){
    // Lerp split positions
    let anyMoving=false;
    for(let pi=0;pi<PROJECTS.length;pi++){
      const diff=eqSplitTarget[pi]-eqSplitCurrent[pi];
      if(Math.abs(diff)>0.01){eqSplitCurrent[pi]+=diff*0.04;anyMoving=true;}
      else{eqSplitCurrent[pi]=eqSplitTarget[pi];}
    }
    if(anyMoving){
      projGroups.forEach((g,pi)=>{g.position.y=pi*PROJ_SPACING*stackVal+eqSplitCurrent[pi];});
      spineMeshes.forEach(s=>{
        const posAttr=s.line.geometry.getAttribute('position');
        posAttr.setY(0,(s.pi-1)*PROJ_SPACING*stackVal+eqSplitCurrent[s.pi-1]);
        posAttr.setY(1,s.pi*PROJ_SPACING*stackVal+eqSplitCurrent[s.pi]);
        posAttr.needsUpdate=true;
      });
    }
    // Value coronas pulse
    eqCoronas.forEach(ec=>{
      const pulse=0.7+Math.sin(t*1.2+ec.pi)*0.3;
      ec.inner.material.opacity=0.15*ec.completion*pulse;
      ec.outer.material.opacity=0.04*ec.completion*pulse;
    });
    // Equity thread position + pulse
    const sellerTopY=1*PROJ_SPACING*stackVal+eqSplitCurrent[1];
    const buyerBotY=2*PROJ_SPACING*stackVal+eqSplitCurrent[2];
    const threadLen=Math.abs(buyerBotY-sellerTopY)||0.1;
    const threadMidY=(sellerTopY+buyerBotY)/2;
    eqThread.position.set(0,threadMidY,0);eqThread.scale.set(1,threadLen,1);
    eqThreadGlow.position.copy(eqThread.position);eqThreadGlow.scale.copy(eqThread.scale);
    const threadPulse=0.5+Math.sin(t*2)*0.3;
    eqThread.material.opacity=0.4*threadPulse;
    eqThreadGlow.material.opacity=0.06*threadPulse;
    // Thread sparks
    eqThreadSparks.forEach(s=>{
      if(s.userData.speed){
        s.userData.t=(s.userData.t+s.userData.speed)%1;
        s.position.set(0,sellerTopY+(buyerBotY-sellerTopY)*s.userData.t,0);
        s.material.opacity=0.5+Math.sin(t*4+s.userData.t*12)*0.3;
      }else if(s.userData.parent)s.position.copy(s.userData.parent.position);
    });
    // Summary orb
    const summaryY=(PROJECTS.length-1)*PROJ_SPACING*stackVal+eqSplitCurrent[PROJECTS.length-1]+8;
    eqSummaryOrb.position.set(0,summaryY,0);
    const avgComp=PROJECTS.reduce((s,p)=>s+p.currentPhase,0)/PROJECTS.length/9;
    const summaryPulse=1+Math.sin(t*1.5)*0.12;
    eqSummaryOrb.scale.setScalar(1.5*avgComp*summaryPulse);eqSummaryOrb.material.opacity=0.3*avgComp;
    eqSummaryGlow.position.copy(eqSummaryOrb.position);eqSummaryGlow.scale.setScalar(2.5*avgComp);eqSummaryGlow.material.opacity=0.08*avgComp;
    eqSummaryFresnel.position.copy(eqSummaryOrb.position);eqSummaryFresnel.scale.setScalar(2*avgComp*summaryPulse);
    eqLSpr.position.set(0,summaryY+3,0);
    // Seller/buyer labels
    sellerSpr.position.set(PP[1].x+8,0*PROJ_SPACING*stackVal+eqSplitCurrent[0]-2,0);
    buyerSpr.position.set(PP[1].x+8,2*PROJ_SPACING*stackVal+eqSplitCurrent[2]-2,0);
    // Cash flow sparks on spines
    cashFlowSparks.forEach(s=>{
      if(s.userData.speed){
        s.userData.t=(s.userData.t+s.userData.speed)%1;
        const si=s.userData.spineIdx%spineMeshes.length;
        const spine=spineMeshes[si];
        if(spine){
          const posAttr=spine.line.geometry.getAttribute('position');
          const y0=posAttr.getY(0),y1=posAttr.getY(1);
          const x2=posAttr.getX(0),z2=posAttr.getZ(0);
          s.position.set(x2,y0+(y1-y0)*s.userData.t,z2);
          s.material.opacity=0.5+Math.sin(t*5+s.userData.t*10)*0.3;
        }
      }else if(s.userData.parent)s.position.copy(s.userData.parent.position);
    });
    // Dark nodes equity reinterpretation
    orbAnims.forEach(o=>{
      if(o.dimFactor>=1){
        // Completed phases glow gold in equity mode
        const goldTint=0.015;
        o.layers.forEach(l=>{l.material.color.lerp(new THREE.Color(0xffd080),goldTint)});
      }
    });
  }else{
    // Smoothly return split to zero
    let anyMoving=false;
    for(let pi=0;pi<PROJECTS.length;pi++){
      if(Math.abs(eqSplitCurrent[pi])>0.01){eqSplitCurrent[pi]*=0.94;anyMoving=true;}
      else{eqSplitCurrent[pi]=0;}
    }
    if(anyMoving){
      projGroups.forEach((g,pi)=>{g.position.y=pi*PROJ_SPACING*stackVal+eqSplitCurrent[pi];});
      spineMeshes.forEach(s=>{
        const posAttr=s.line.geometry.getAttribute('position');
        posAttr.setY(0,(s.pi-1)*PROJ_SPACING*stackVal+eqSplitCurrent[s.pi-1]);
        posAttr.setY(1,s.pi*PROJ_SPACING*stackVal+eqSplitCurrent[s.pi]);
        posAttr.needsUpdate=true;
      });
    }
  }

  // ═══ Loan Initiation Strands — dynamic curve rebuild + spark animation ═══
  loanStrandData.forEach(ld => {
    const p9 = PP[9], p1 = PP[1];
    const p9Y = ld.piFrom * PROJ_SPACING * stackVal + eqSplitCurrent[ld.piFrom] + p9.y;
    const p1Y = ld.piTo * PROJ_SPACING * stackVal + eqSplitCurrent[ld.piTo] + p1.y;
    const p9W = new THREE.Vector3(p9.x, p9Y, p9.z);
    const p1W = new THREE.Vector3(p1.x, p1Y, p1.z);
    const midW = new THREE.Vector3((p9W.x+p1W.x)/2, (p9W.y+p1W.y)/2, (p9W.z+p1W.z)/2);
    const newCurve = new THREE.CatmullRomCurve3([p9W, midW, p1W]);
    // Rebuild tube geometries
    ld.core.geometry.dispose();
    ld.core.geometry = new THREE.TubeGeometry(newCurve, 20, 0.06, 8, false);
    ld.glow.geometry.dispose();
    ld.glow.geometry = new THREE.TubeGeometry(newCurve, 20, 0.2, 8, false);
    // Animate spark along curve
    ld.spark.userData.curve = newCurve;
    ld.spark.userData.t = (ld.spark.userData.t + ld.spark.userData.speed) % 1;
    ld.spark.position.copy(newCurve.getPoint(ld.spark.userData.t));
    ld.spark.material.opacity = 0.6 + Math.sin(t * 2 + ld.spark.userData.t * 6) * 0.3;
    // Spark glow follows
    ld.sparkGlow.position.copy(ld.spark.position);
  });

  rnd.render(scene,cam);
}
animate();
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;cam.aspect=W/H;cam.updateProjectionMatrix();rnd.setSize(W,H)});
</script>
</body>
</html>
